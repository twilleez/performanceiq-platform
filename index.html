<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d1b3e">
  <meta name="description" content="PerformanceIQ – Elite Training. Smart Results.">
  <title>PerformanceIQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="piq-root">
    <!-- App mounts here via app.js -->
    <div id="piq-loader" aria-label="Loading PerformanceIQ" role="status">
      <div class="loader-ring">
        <svg viewBox="0 0 80 80" class="loader-svg">
          <circle cx="40" cy="40" r="34" fill="none" stroke="rgba(57,230,107,.15)" stroke-width="5"/>
          <circle cx="40" cy="40" r="34" fill="none" stroke="#39e66b" stroke-width="5"
            stroke-dasharray="214" stroke-dashoffset="160" stroke-linecap="round"
            class="loader-arc" transform="rotate(-90 40 40)"/>
        </svg>
        <span class="loader-wordmark">PIQ</span>
      </div>
    </div>
  </div>

  <!-- Module entry point -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
