  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #39e66b;
      --green-glow: rgba(57,230,107,0.12);
      --navy: #0d1a2e;
      --navy-mid: #0f1f35;
      --navy-light: #132540;
      --border: rgba(255,255,255,0.07);
      --text-primary: #ffffff;
      --text-secondary: rgba(232,237,245,0.65);
      --text-muted: rgba(232,237,245,0.38);
      --text-faint: rgba(232,237,245,0.22);
      --font-display: 'Oswald', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --font-label: 'Barlow Condensed', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--navy);
      font-family: var(--font-body);
      color: var(--text-secondary);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* \u2500\u2500 Background \u2500\u2500 */
    .bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .bg-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(57,230,107,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(57,230,107,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .bg-orb {
      position: absolute; border-radius: 50%; filter: blur(90px);
    }
    .orb1 { width: 560px; height: 560px; background: rgba(57,230,107,0.07); top: -160px; left: -160px; }
    .orb2 { width: 440px; height: 440px; background: rgba(13,26,46,0.95); top: 300px; right: -120px; }
    .orb3 { width: 360px; height: 360px; background: rgba(57,230,107,0.04); bottom: 60px; right: 28%; }

    /* \u2500\u2500 Page \u2500\u2500 */
    .page { position: relative; z-index: 1; display: flex; flex-direction: column; min-height: 100vh; }

    /* \u2500\u2500 Nav \u2500\u2500 */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px;
      height: 64px;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      background: rgba(13,26,46,0.82);
      position: sticky; top: 0; z-index: 100;
      flex-shrink: 0;
    }

    /* \u2500\u2500 Logo \u2500\u2500 */
    .logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none;
    }
    .logo-mark {
      position: relative; width: 36px; height: 36px;
    }
    /* Wing shape: navy body, green arrow tip */
    .logo-tagline {
      display: flex; flex-direction: column; gap: 1px;
    }
    .logo-name {
      font-family: var(--font-display);
      font-size: 22px; font-weight: 700;
      letter-spacing: 3px;
      line-height: 1;
      color: var(--text-primary);
    }
    .logo-name span { color: var(--green); }
    .logo-sub {
      font-family: var(--font-label);
      font-size: 9px; font-weight: 500;
      letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--text-faint);
      line-height: 1;
    }

    .nav-links {
      display: flex; align-items: center; gap: 28px; list-style: none;
    }
    .nav-links a {
      font-size: 13px; font-weight: 400;
      color: var(--text-muted); text-decoration: none; letter-spacing: 0.3px;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--green); }
    .nav-cta {
      background: var(--green-glow);
      color: var(--green) !important;
      border: 1px solid rgba(57,230,107,0.28);
      padding: 7px 20px;
      border-radius: 4px;
      font-weight: 500 !important;
      transition: background 0.2s, border-color 0.2s !important;
    }
    .nav-cta:hover { background: rgba(57,230,107,0.2) !important; border-color: rgba(57,230,107,0.5) !important; }

    /* \u2500\u2500 Hero \u2500\u2500 */
    .hero {
      padding: 72px 32px 60px;
      max-width: 880px;
    }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 12px;
      font-family: var(--font-label);
      font-size: 11px; font-weight: 500;
      letter-spacing: 4px; text-transform: uppercase;
      color: var(--green); margin-bottom: 24px;
      animation: up 0.5s ease both;
    }
    .eyebrow::before { content: ''; width: 24px; height: 1px; background: var(--green); display: block; }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(40px, 7vw, 68px);
      font-weight: 700; line-height: 1.0; letter-spacing: -1px;
      color: var(--text-primary);
      margin-bottom: 22px;
      animation: up 0.5s 0.08s ease both;
    }
    h1 .g { color: var(--green); }
