<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PerformanceIQ</title>

  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loadingScreen" style="
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0b1118;
  color:white;
  z-index:9999;">
  Loading PerformanceIQ...
</div>

<!-- APP SHELL -->
<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2 class="logo">PerformanceIQ</h2>

    <nav>
      <button data-view="dashboard">Dashboard</button>
      <button data-view="athletes">Athletes</button>
      <button data-view="train">Train</button>
      <button data-view="analytics">Analytics</button>
      <button data-view="schedule">Schedule</button>
    </nav>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">

    <!-- DASHBOARD -->
    <section id="dashboardView" class="view">
      <h1>Dashboard</h1>
      <div id="dashboardContent"></div>
    </section>

    <!-- ATHLETES -->
    <section id="athletesView" class="view" style="display:none">
      <h1>Athletes</h1>
      <div id="athleteCardGrid"></div>
    </section>

    <!-- TRAIN -->
    <section id="trainView" class="view" style="display:none">
      <h1>Training</h1>
      <div id="trainContent"></div>
    </section>

    <!-- ANALYTICS -->
    <section id="analyticsView" class="view" style="display:none">
      <h1>Analytics</h1>
      <div id="analyticsContent"></div>
    </section>

    <!-- SCHEDULE -->
    <section id="scheduleView" class="view" style="display:none">
      <h1>Schedule</h1>
      <div id="scheduleContent"></div>
    </section>

  </main>

</div>

<!-- TOAST CONTAINER -->
<div id="toastContainer"></div>

<!-- BOOT LOADER -->
<script type="module" src="./js/boot.js?v=3"></script>

</body>
</html>
