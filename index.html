<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#080c12" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PerformanceIQ" />
  <meta name="description" content="Athlete-first training. Coach-powered teams." />
  <link rel="manifest" href="./manifest.json">
  <title>PerformanceIQ</title>
<style>
:root {
  --bg:#080c12;--bg2:#0d1220;--surface:rgba(18,24,38,.80);--surface2:rgba(14,19,30,.95);
  --line:rgba(255,255,255,.075);--line2:rgba(255,255,255,.04);
  --text:#eef1f7;--muted:#8892a4;--muted2:#5a6475;
  --accent:#53b5ff;--accent2:#ff6b35;--green:#34d399;--yellow:#fbbf24;--red:#f87171;
  --shadow:0 20px 60px rgba(0,0,0,.35);--shadow-sm:0 4px 16px rgba(0,0,0,.2);
  --radius:22px;--radius-sm:14px;--nav-h:80px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent}
body{
  background:var(--bg);
  background-image:
    radial-gradient(ellipse 800px 500px at 75% -5%,rgba(83,181,255,.10) 0%,transparent 60%),
    radial-gradient(ellipse 600px 400px at 20% 80%,rgba(255,107,53,.06) 0%,transparent 55%),
    linear-gradient(180deg,#080c12 0%,#0c1120 40%,#080c12 100%);
  color:var(--text);
  font-family:"SF Pro Text",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  font-size:15px;line-height:1.5;min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.title-xl{font-size:clamp(26px,6vw,34px);font-weight:800;letter-spacing:-.03em;line-height:1.05}
.title-lg{font-size:22px;font-weight:760;letter-spacing:-.02em;line-height:1.1}
.title-md{font-size:17px;font-weight:700;letter-spacing:-.01em}
.muted{color:var(--muted)}.muted2{color:var(--muted2)}.small{font-size:12px}
.metric{font-size:44px;font-weight:820;letter-spacing:-.05em;line-height:1}
.metric-sm{font-size:28px;font-weight:780;letter-spacing:-.04em;line-height:1}
button{font:inherit;border:none;cursor:pointer;border-radius:var(--radius-sm);transition:all .15s ease;-webkit-tap-highlight-color:transparent}
button:active{transform:scale(.96);opacity:.85}
button:not(.secondary):not(.sm):not(.nav-btn){background:var(--accent);color:#05111e;font-weight:700;padding:13px 18px;border-radius:16px}
button:not(.secondary):not(.sm):not(.nav-btn):hover{background:#6ec4ff}
button.secondary{background:rgba(255,255,255,.04);color:var(--text);border:1px solid var(--line);font-weight:600;padding:11px 16px}
button.secondary:hover{background:rgba(255,255,255,.07)}
button.sm{padding:7px 12px;font-size:12px;font-weight:700;border-radius:10px;background:var(--accent);color:#05111e}
button.sm.secondary,button.secondary.sm{background:rgba(255,255,255,.05);color:var(--text);border:1px solid var(--line)}
input,select,textarea{font:inherit;color:var(--text);background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:12px;padding:10px 12px;width:100%;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:rgba(83,181,255,.45);background:rgba(83,181,255,.04)}
select{cursor:pointer}
.select-input{background:rgba(255,255,255,.05);color:var(--text);border:1px solid var(--line);border-radius:10px;padding:7px 10px;font:inherit;cursor:pointer;width:auto}
.app-shell{min-height:100vh}
.screen{padding:16px 14px 0;max-width:900px;margin:0 auto;padding-bottom:calc(var(--nav-h) + 36px)}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;padding-top:max(env(safe-area-inset-top,8px),8px)}
.grid{display:grid;gap:12px}.grid.two{grid-template-columns:1.1fr .9fr}.grid.three{grid-template-columns:repeat(3,1fr)}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.space{display:flex;justify-content:space-between;align-items:center;gap:12px}
.list{display:grid;gap:10px}.section{margin-top:14px}.center{text-align:center}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);backdrop-filter:blur(20px) saturate(150%);-webkit-backdrop-filter:blur(20px) saturate(150%);padding:16px}
.item,.exercise-card,.day-card{padding:12px 14px;border-radius:16px;background:var(--surface2);border:1px solid var(--line)}
.exercise-card{border-radius:18px;padding:14px}.exercise-done{border-color:rgba(52,211,153,.2)}
.pill{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid var(--line);font-size:12px;font-weight:600;white-space:nowrap}
.stat-chip{padding:6px 10px;border-radius:10px;background:rgba(255,255,255,.05);border:1px solid var(--line);font-size:12px;font-weight:500}
.role-badge{display:inline-flex;padding:5px 9px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid var(--line);font-size:11px;font-weight:700;text-transform:capitalize;letter-spacing:.03em}
.banner{padding:11px 14px;border-radius:14px;background:rgba(83,181,255,.08);border:1px solid rgba(83,181,255,.16);font-size:13px;line-height:1.5}
.set-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.set-tile{padding:10px 6px;border-radius:12px;background:rgba(255,255,255,.03);border:1px solid var(--line);text-align:center;cursor:pointer;transition:all .15s;color:var(--text)}
.set-tile:hover{background:rgba(255,255,255,.07)}.set-tile.done{background:rgba(52,211,153,.12);border-color:rgba(52,211,153,.35)}.set-tile:active{transform:scale(.94)}
.input-row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line2);cursor:pointer}
.input-row:last-child{border-bottom:none}
.sheet-backdrop{position:fixed;inset:0;background:rgba(3,6,12,.55);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:flex;align-items:flex-end;justify-content:center;padding:10px 10px max(env(safe-area-inset-bottom,10px),10px);z-index:70;animation:fade-in .18s ease}
.sheet{width:min(860px,100%);background:rgba(14,19,30,.97);border:1px solid var(--line);border-radius:26px 26px 20px 20px;box-shadow:0 -20px 60px rgba(0,0,0,.4);padding:18px 16px max(env(safe-area-inset-bottom,16px),16px);max-height:88vh;overflow-y:auto;animation:slide-up .22s cubic-bezier(.32,.72,0,1)}
.handle{width:40px;height:4px;border-radius:999px;background:rgba(255,255,255,.15);margin:0 auto 16px}
.readiness-hero{text-align:center;padding:8px 0}
.bottom-nav{position:fixed;left:10px;right:10px;bottom:max(env(safe-area-inset-bottom,8px),8px);height:var(--nav-h);display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px;border-radius:24px;background:rgba(12,17,28,.88);border:1px solid var(--line);backdrop-filter:blur(20px) saturate(150%);-webkit-backdrop-filter:blur(20px) saturate(150%);z-index:80;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.nav-btn{display:grid;place-items:center;gap:3px;border-radius:16px;background:transparent;color:var(--muted2);font-size:11px;font-weight:600;padding:6px 4px;transition:all .15s;letter-spacing:.02em}
.nav-btn:hover{color:var(--muted)}.nav-btn:active{transform:scale(.92)}
.nav-btn.active{background:rgba(83,181,255,.12);color:var(--accent);border:1px solid rgba(83,181,255,.18)}
.now-bar{position:fixed;left:12px;right:12px;bottom:calc(var(--nav-h) + max(env(safe-area-inset-bottom,8px),8px) + 8px);background:rgba(14,19,30,.92);border:1px solid var(--line);border-radius:18px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;gap:14px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);z-index:75;box-shadow:var(--shadow-sm)}
.login-wrap{min-height:100vh;display:grid;place-items:center;padding:20px}
.login-card{width:min(440px,100%);padding:28px 22px}
.day-card{padding:10px 12px}.day-card.today{border-color:rgba(83,181,255,.4);background:rgba(83,181,255,.08)}
.loading-spinner{width:36px;height:36px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
.toast{position:fixed;bottom:calc(var(--nav-h) + max(env(safe-area-inset-bottom,8px),8px) + 14px);left:50%;transform:translateX(-50%);padding:11px 18px;border-radius:14px;font-size:13px;font-weight:600;z-index:100;pointer-events:none;white-space:nowrap;animation:toast-in .22s ease}
.toast-success{background:rgba(52,211,153,.14);border:1px solid rgba(52,211,153,.4);color:#34d399}
.toast-error{background:rgba(248,113,113,.14);border:1px solid rgba(248,113,113,.4);color:#f87171}
.spark{height:44px}
.active-sport{background:rgba(83,181,255,.18)!important;border-color:rgba(83,181,255,.45)!important;color:var(--text)!important}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
@keyframes slide-up{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes toast-in{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@media(max-width:640px){.grid.two,.grid.three{grid-template-columns:1fr}.set-row{grid-template-columns:repeat(2,1fr)}.title-xl{font-size:26px}.metric{font-size:38px}}
@media(min-width:640px){.set-row{grid-template-columns:repeat(4,1fr)}}
@media(min-width:900px){.screen{padding-left:24px;padding-right:24px}.sheet{border-radius:28px}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
</style>

<body>
<div id="app"></div>
<script>
  // Unregister any stale service workers from old builds
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(r => r.unregister());
  });
}
// ─────────────────────────────────────────────────────────────────────────────
// EXERCISES DATA
// ─────────────────────────────────────────────────────────────────────────────
const EXERCISES = [
  {id:"lat_bound",sport:"basketball",pattern:"power",equipment:"bodyweight",title:"Lateral Bound",cue:"Stick the landing and own the hip. Drive knee up on each bound."},
  {id:"skater_jump",sport:"basketball",pattern:"power",equipment:"bodyweight",title:"Skater Jump",cue:"Push hard sideways and control the decel. Land on a single foot, absorb it."},
  {id:"goblet_squat",sport:"basketball",pattern:"strength_lower",equipment:"dumbbell",title:"Goblet Squat",cue:"Chest tall, full foot pressure. Elbows inside knees at bottom."},
  {id:"rfess",sport:"basketball",pattern:"strength_lower",equipment:"dumbbell",title:"Rear Foot Elevated Split Squat",cue:"Load the front leg and stay stacked. Front shin stays vertical."},
  {id:"sl_rdl",sport:"basketball",pattern:"hinge",equipment:"dumbbell",title:"Single Leg RDL",cue:"Long spine, square hips. Feel the hamstring load before you reverse."},
  {id:"sprint10",sport:"basketball",pattern:"speed",equipment:"bodyweight",title:"10 Yard Sprint",cue:"Violent first two steps. Stay low for 3 strides before you rise."},
  {id:"dead_bug",sport:"basketball",pattern:"core",equipment:"bodyweight",title:"Dead Bug",cue:"Ribs down, breathe behind the shield. Opposite arm and leg move together."},
  {id:"side_plank",sport:"basketball",pattern:"core",equipment:"bodyweight",title:"Side Plank Reach",cue:"Stay long through the side wall. Reach under and open to the ceiling."},
  {id:"broad_jump",sport:"football",pattern:"power",equipment:"bodyweight",title:"Broad Jump",cue:"Load fast, jump long, stick the landing. No extra steps on the catch."},
  {id:"med_slam",sport:"football",pattern:"power",equipment:"med_ball",title:"Med Ball Slam",cue:"Full extension up, violent hips down. Slam the floor through the ball."},
  {id:"trap_dl",sport:"football",pattern:"strength_lower",equipment:"barbell",title:"Trap Bar Deadlift",cue:"Push the floor away, keep the chest proud. Bar stays close to shins."},
  {id:"box_squat",sport:"football",pattern:"strength_lower",equipment:"barbell",title:"Box Squat",cue:"Sit back to the box, explode off. No bounce — pause and own the bottom."},
  {id:"kb_swing",sport:"football",pattern:"hinge",equipment:"kettlebell",title:"Kettlebell Swing",cue:"Hinge — not squat. Snap the hips at the top to lock out."},
  {id:"sled_push",sport:"football",pattern:"speed",equipment:"sled",title:"Sled Push",cue:"Low angle, short fast steps. Drive through the balls of your feet."},
  {id:"pallof_press",sport:"football",pattern:"core",equipment:"band",title:"Pallof Press",cue:"Fight rotation. Own the midline. Press and hold 1 second at full extension."},
  {id:"ab_rollout",sport:"football",pattern:"core",equipment:"bodyweight",title:"Ab Wheel Rollout",cue:"Ribs to hips. Don't let the low back arch at full extension."},
  {id:"plyometric_hop",sport:"soccer",pattern:"power",equipment:"bodyweight",title:"Single Leg Hop Series",cue:"Reactive ground contact — minimise contact time. Stiff ankle."},
  {id:"drop_jump",sport:"soccer",pattern:"power",equipment:"bodyweight",title:"Drop Jump",cue:"Land soft, explode immediately. Ground contact under 0.2 seconds."},
  {id:"bulgarian_ss",sport:"soccer",pattern:"strength_lower",equipment:"dumbbell",title:"Bulgarian Split Squat",cue:"Front knee tracks toe. Drive through heel, not just toes."},
  {id:"nordic_curl",sport:"soccer",pattern:"hinge",equipment:"bodyweight",title:"Nordic Curl",cue:"Eccentric focus. Lower as slow as you can — that's the whole point."},
  {id:"change_dir_drill",sport:"soccer",pattern:"speed",equipment:"bodyweight",title:"5-10-5 Shuttle",cue:"Low hips at plant. Drive off the outside edge of your foot."},
  {id:"plank_shoulder_tap",sport:"soccer",pattern:"core",equipment:"bodyweight",title:"Plank Shoulder Tap",cue:"Hips flat. Tap without rotating — the hips are the test."},
  {id:"rotary_med_throw",sport:"baseball",pattern:"power",equipment:"med_ball",title:"Rotational Med Ball Throw",cue:"Lead with the hip, not the shoulder. Wall it."},
  {id:"broad_jump_bb",sport:"baseball",pattern:"power",equipment:"bodyweight",title:"Broad Jump",cue:"Max horizontal intent. Stick clean, no shuffle steps."},
  {id:"db_split_squat",sport:"baseball",pattern:"strength_lower",equipment:"dumbbell",title:"DB Split Squat",cue:"Knee tracks toe, torso upright. No forward lean at the chest."},
  {id:"trap_rdl",sport:"baseball",pattern:"hinge",equipment:"barbell",title:"Trap Bar RDL",cue:"Feel the hamstring length at the bottom. Don't chase the floor."},
  {id:"sprint_bb",sport:"baseball",pattern:"speed",equipment:"bodyweight",title:"90 Ft Sprint",cue:"First step wins. Drive down and back — don't reach forward."},
  {id:"med_chop",sport:"baseball",pattern:"core",equipment:"med_ball",title:"Med Ball Chop",cue:"Diagonal pattern. Hips lead, arms follow — not the other way."},
  {id:"box_jump",sport:"volleyball",pattern:"power",equipment:"bodyweight",title:"Box Jump",cue:"Two-foot load, fast hips, tall landing. Step down — don't jump down."},
  {id:"depth_jump",sport:"volleyball",pattern:"power",equipment:"bodyweight",title:"Depth Jump",cue:"Minimal ground contact. Jump high immediately — treat the floor like it's hot."},
  {id:"back_squat",sport:"volleyball",pattern:"strength_lower",equipment:"barbell",title:"Back Squat",cue:"Brace the trunk, control the descent. Two seconds down, explode up."},
  {id:"shrug_carry",sport:"volleyball",pattern:"hinge",equipment:"dumbbell",title:"Farmer Carry",cue:"Tall posture, packed shoulders. Walk with intent, not waddling."},
  {id:"lateral_sprint",sport:"volleyball",pattern:"speed",equipment:"bodyweight",title:"Lateral Shuffle Sprint",cue:"Stay low, push off the outside foot. Don't cross your feet."},
  {id:"hollow_hold",sport:"volleyball",pattern:"core",equipment:"bodyweight",title:"Hollow Body Hold",cue:"Lower back pressed flat. Arms long, legs low. Breathe through it."},
  {id:"hang_power_clean",sport:"track",pattern:"power",equipment:"barbell",title:"Hang Power Clean",cue:"Triple extension — ankle, knee, hip. Catch high with fast elbows."},
  {id:"hurdle_hop",sport:"track",pattern:"power",equipment:"bodyweight",title:"Hurdle Hop Series",cue:"Stiff ankle. Quick off the ground — don't let the foot go flat."},
  {id:"front_squat",sport:"track",pattern:"strength_lower",equipment:"barbell",title:"Front Squat",cue:"Elbows up. Knees track over the 3rd toe. Bar rests on delts, not wrists."},
  {id:"romanian_dl",sport:"track",pattern:"hinge",equipment:"barbell",title:"Romanian Deadlift",cue:"Bar drags the shins. Hamstrings load fully — feel the stretch."},
  {id:"flying_sprint",sport:"track",pattern:"speed",equipment:"bodyweight",title:"Flying 20m Sprint",cue:"Full speed entry. Max velocity mechanics — high knee, dorsiflexed foot."},
  {id:"pallof_hold",sport:"track",pattern:"core",equipment:"band",title:"Pallof Hold",cue:"Tall spine. Resist the pull for full time — don't let the torso rotate."},
];

function getExercise(id) { return EXERCISES.find(x => x.id === id) || null; }
function getSwapOptions(exerciseId, sport) {
  const cur = getExercise(exerciseId);
  if (!cur) return [];
  return EXERCISES.filter(x => x.id !== cur.id && x.sport === sport && x.pattern === cur.pattern);
}
function swapExercise(workout, oldId, newId) {
  if (!workout?.exercises) return;
  workout.exercises = workout.exercises.map(ex => ex.id === oldId ? {...ex, id: newId} : ex);
}
function markSetDone(workout, exerciseId, setIndex) {
  if (!workout?.exercises) return;
  const ex = workout.exercises.find(x => x.id === exerciseId);
  if (!ex || !ex.sets[setIndex]) return;
  ex.sets[setIndex].done = !ex.sets[setIndex].done;
}
function progressPct(workout) {
  if (!workout) return 0;
  const sets = (workout.exercises ?? []).flatMap(ex => ex.sets ?? []);
  if (!sets.length) return 0;
  return Math.round((sets.filter(s => s.done).length / sets.length) * 100);
}
function buildWorkoutPayload(sport, readiness = 75) {
  const lib = EXERCISES.filter(x => x.sport === sport);
  if (!lib.length) return {title:"General Conditioning",sport,day_type:"recovery",notes:"Bodyweight session.",recovery_cue:"Move well.",exercises:[]};
  const recovery = readiness < 70;
  const setsMain = readiness >= 85 ? 4 : readiness >= 70 ? 3 : 2;
  const repsStr  = readiness >= 85 ? "4" : readiness >= 70 ? "5" : "6";
  const pick = p => lib.find(x => x.pattern === p)?.id;
  const exercises = [
    {id:pick("power"),          sets: Array(recovery ? 2 : setsMain).fill(null).map(()=>({target:`${recovery?2:setsMain} \u00d7 ${repsStr}`,done:false}))},
    {id:pick("strength_lower"), sets: Array(setsMain).fill(null).map(()=>({target:`${setsMain} \u00d7 6`,done:false}))},
    {id:pick("hinge"),          sets: Array(setsMain).fill(null).map(()=>({target:`${setsMain} \u00d7 6`,done:false}))},
    {id:pick("speed"),          sets: [{target:`${recovery?3:5} reps`,done:false}]},
    {id:pick("core"),           sets: Array(3).fill(null).map(()=>({target:"3 \u00d7 8/side",done:false}))},
  ].filter(e => !!e.id);
  const n = sport[0].toUpperCase() + sport.slice(1);
  return {
    title:`${n} ${recovery?"Recovery":readiness>=85?"Peak Performance":"Build"} Session`,
    sport, day_type:recovery?"recovery":readiness>=85?"power":"build",
    notes:recovery?"Auto-generated lower-strain session.":readiness>=85?"Auto-generated peak session — you're primed.":"Auto-generated build session.",
    recovery_cue:recovery?"Move well and leave fresher than you started.":readiness>=85?"Quality first. Chase clean outputs.":"Consistent quality. Build the habit.",
    exercises,
  };
}

// ─────────────────────────────────────────────────────────────────────────────
// MICROCYCLE
// ─────────────────────────────────────────────────────────────────────────────
const MICROCYCLE_TEMPLATES = {
  basketball:[{day:"Mon",label:"Explosive Lower"},{day:"Tue",label:"Recovery + Mobility"},{day:"Wed",label:"Upper Strength"},{day:"Thu",label:"Speed + COD"},{day:"Fri",label:"Flush + Reset"}],
  football:  [{day:"Mon",label:"Power + Strength"},{day:"Tue",label:"Film + Recovery"},{day:"Wed",label:"Conditioning"},{day:"Thu",label:"Speed + Agility"},{day:"Fri",label:"Activation + Rest"}],
  soccer:    [{day:"Mon",label:"Strength Lower"},{day:"Tue",label:"Aerobic Base"},{day:"Wed",label:"Speed Endurance"},{day:"Thu",label:"Tactical + COD"},{day:"Fri",label:"Flush + Mobility"}],
  baseball:  [{day:"Mon",label:"Rotational Power"},{day:"Tue",label:"Arm Care + Mobility"},{day:"Wed",label:"Lower Strength"},{day:"Thu",label:"Speed + Agility"},{day:"Fri",label:"Recovery"}],
  volleyball:[{day:"Mon",label:"Explosive Power"},{day:"Tue",label:"Upper Strength"},{day:"Wed",label:"Conditioning"},{day:"Thu",label:"Jump Training"},{day:"Fri",label:"Mobility + Flush"}],
  track:     [{day:"Mon",label:"Max Velocity"},{day:"Tue",label:"Strength Lower"},{day:"Wed",label:"Speed Endurance"},{day:"Thu",label:"Technical Work"},{day:"Fri",label:"Activation + Rest"}],
};
function buildMicrocycle(sport="basketball") {
  const t = MICROCYCLE_TEMPLATES[sport] ?? MICROCYCLE_TEMPLATES.basketball;
  const d = new Date().getDay(); const todayIdx = d>=1&&d<=5?d-1:-1;
  return t.map((x,i)=>({...x,status:i<todayIdx?"done":i===todayIdx?"today":"upcoming"}));
}

// ─────────────────────────────────────────────────────────────────────────────
// SOLO STORE (localStorage)
// ─────────────────────────────────────────────────────────────────────────────
const PIQ = {profile:"piq_profile",workouts:"piq_workouts",readiness:"piq_readiness",prs:"piq_prs"};
function lsGet(k,fb=null){try{const r=localStorage.getItem(k);return r?JSON.parse(r):fb;}catch{return fb;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function todayStr(){return new Date().toISOString().split("T")[0];}

const solo = {
  getProfile:()=>lsGet(PIQ.profile,null),
  saveProfile(p){const v={...p,id:"solo",role:p.role??"athlete"};lsSet(PIQ.profile,v);return v;},
  getTodaysReadiness(){const a=lsGet(PIQ.readiness,[]);return a.find(r=>r.log_date===todayStr())??null;},
  saveReadiness(vals){
    const all=lsGet(PIQ.readiness,[]);const t=todayStr();
    const entry={id:t,athlete_id:"solo",log_date:t,score:vals.score??75,hrv:vals.hrv??"",sleep_hrs:vals.sleep??7,soreness:vals.soreness??"Low",hydration:vals.hydration??"On target",body_battery:vals.bodyBattery??70,notes:""};
    const idx=all.findIndex(r=>r.log_date===t);
    if(idx>=0)all[idx]=entry;else all.push(entry);
    lsSet(PIQ.readiness,all);return entry;
  },
  getReadinessTrend(days=14){
    const all=lsGet(PIQ.readiness,[]);
    const since=new Date(Date.now()-days*86400000).toISOString().split("T")[0];
    return all.filter(r=>r.log_date>=since).sort((a,b)=>a.log_date.localeCompare(b.log_date));
  },
  getTodaysWorkout(){
    const all=lsGet(PIQ.workouts,[]);const t=todayStr();
    return all.filter(w=>w.scheduled_date===t).sort((a,b)=>b.created_at?.localeCompare(a.created_at??"")??0)[0]??null;
  },
  createWorkout(payload){
    const all=lsGet(PIQ.workouts,[]);
    const w={id:"solo_"+Date.now(),athlete_id:"solo",scheduled_date:todayStr(),created_at:new Date().toISOString(),completed_at:null,...payload};
    all.push(w);lsSet(PIQ.workouts,all);return w;
  },
  saveWorkoutProgress(workoutId,exercises){
    const all=lsGet(PIQ.workouts,[]);const idx=all.findIndex(w=>w.id===workoutId);
    if(idx>=0){all[idx].exercises=exercises;lsSet(PIQ.workouts,all);}
  },
  completeWorkout(workoutId,exercises){
    const all=lsGet(PIQ.workouts,[]);const idx=all.findIndex(w=>w.id===workoutId);
    if(idx>=0){all[idx].exercises=exercises;all[idx].completed_at=new Date().toISOString();lsSet(PIQ.workouts,all);}
  },
  getRecentWorkouts(days=30){
    const all=lsGet(PIQ.workouts,[]);
    const since=new Date(Date.now()-days*86400000).toISOString().split("T")[0];
    return all.filter(w=>w.scheduled_date>=since).sort((a,b)=>b.scheduled_date.localeCompare(a.scheduled_date));
  },
  getPRs(){return lsGet(PIQ.prs,[]).sort((a,b)=>b.set_at?.localeCompare(a.set_at??"")??0);},
  clearAll(){Object.values(PIQ).forEach(k=>localStorage.removeItem(k));},
};

function sparkline(values,color="#53b5ff",h=44) {
  if(!values||values.length<2)return"";
  const w=260,pad=4,min=Math.min(...values),max=Math.max(...values),range=max-min||1;
  const pts=values.map((v,i)=>`${(pad+(i/(values.length-1))*(w-pad*2)).toFixed(1)},${(h-pad-((v-min)/range)*(h-pad*2)).toFixed(1)}`);
  const [lx,ly]=pts[pts.length-1].split(",");
  const area=`M${pts[0].split(",")[0]},${h} L${pts.join(" L")} L${lx},${h} Z`;
  const gid="sg"+color.replace("#","");
  return `<svg width="100%" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="display:block;margin-top:10px;height:${h}px"><defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity=".22"/><stop offset="100%" stop-color="${color}" stop-opacity=".01"/></linearGradient></defs><path d="${area}" fill="url(#${gid})"/><polyline points="${pts.join(" ")}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="${lx}" cy="${ly}" r="4" fill="${color}" opacity=".9"/></svg>`;
}

function progressView(state) {
  const {prs,readinessTrend} = state;
  const recentWorkouts = state.recentWorkouts??[];
  const completed = recentWorkouts.filter(w=>w.completed_at);
  const avg = readinessTrend.length?Math.round(readinessTrend.reduce((s,r)=>s+r.score,0)/readinessTrend.length):null;
  const trendVals = readinessTrend.map(r=>r.score);
  const last = trendVals[trendVals.length-1]??null;
  const prev = trendVals[trendVals.length-2]??null;
  const arrow = last===null||prev===null?"":last>prev?" ↑":last<prev?" ↓":" →";
  let streak=0;
  const sorted=[...recentWorkouts].filter(w=>w.completed_at).sort((a,b)=>b.scheduled_date.localeCompare(a.scheduled_date));
  if(sorted.length){streak=1;let pr=sorted[0].scheduled_date;for(let i=1;i<sorted.length;i++){const diff=(new Date(pr)-new Date(sorted[i].scheduled_date))/86400000;if(diff<=2){streak++;pr=sorted[i].scheduled_date;}else break;}}
  const pillars=[
    {label:"Avg Readiness",value:avg!==null?`${avg}`:"—",sub:avg!==null?`${arrow} last 14 days`:"No data yet",color:avg===null?"var(--muted)":avg>=80?"#34d399":avg>=65?"#fbbf24":"#f87171",bar:avg},
    {label:"Sessions",value:completed.length||"0",sub:"completed this month",color:"#ff6b35",bar:null},
    {label:"Streak",value:streak?`${streak}`:"0",sub:streak?"days in a row 🔥":"start one today",color:streak>=5?"#fbbf24":"#53b5ff",bar:null},
  ];
  const pillarCards=pillars.map(p=>`<div class="card"><div class="muted small" style="margin-bottom:4px">${p.label}</div><div class="metric-sm" style="color:${p.color}">${p.value}</div><div class="muted small" style="margin-top:4px;font-size:11px">${p.sub}</div>${p.bar!==null?`<div style="margin-top:8px;height:3px;border-radius:3px;background:rgba(255,255,255,.07)"><div style="width:${p.bar}%;height:100%;border-radius:3px;background:${p.color};opacity:.7"></div></div>`:""}</div>`).join("");
  const trendCard=readinessTrend.length>=2?`<div class="card section"><div class="space"><div class="title-md">Readiness Trend</div><span class="muted small">14 days</span></div>${sparkline(trendVals)}<div class="row" style="justify-content:space-between;margin-top:10px;flex-wrap:wrap;gap:6px"><span class="stat-chip" style="font-size:11px">Low ${Math.min(...trendVals)}</span><span class="stat-chip" style="font-size:11px">High ${Math.max(...trendVals)}</span><span class="stat-chip" style="font-size:11px">Avg ${avg}</span><span class="stat-chip" style="font-size:11px">${trendVals.length} logs</span></div></div>`:`<div class="card section" style="opacity:.6;text-align:center;padding:24px 16px"><div style="font-size:32px;margin-bottom:8px">📈</div><div class="title-md">No Trend Yet</div><div class="muted" style="font-size:13px;margin-top:6px">Log readiness on 2+ days to see your trend chart.</div></div>`;
  const history=completed.length?completed.slice(0,8).map(w=>{const date=new Date(w.scheduled_date).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});const ex=w.exercises?.length??0;const c={power:"#fbbf24",recovery:"#34d399",build:"#53b5ff"}[w.day_type]??"var(--muted)";return`<div class="item space"><div><div style="font-weight:600;font-size:14px">${w.title}</div><div class="muted small">${date} · ${ex} exercise${ex!==1?"s":""}</div></div><span class="pill" style="font-size:11px;color:${c};border-color:${c}33">${w.day_type??"session"}</span></div>`;}).join(""):`<div class="item muted" style="text-align:center;padding:20px">No completed sessions yet.</div>`;
  const prItems=prs.length?prs.slice(0,10).map(pr=>`<div class="item space"><div><div style="font-weight:600">${pr.exercise_id.replace(/_/g," ")}</div><div class="muted small">${pr.label}</div></div><div style="text-align:right"><div style="font-weight:700;color:#34d399">${pr.value} ${pr.unit??""}</div><div class="muted small">${pr.set_at}</div></div></div>`).join(""):`<div class="item muted" style="text-align:center;padding:20px">No PRs logged yet.</div>`;
  return `<div class="screen"><div class="topbar"><div><div class="muted">Progress</div><div class="title-xl">Depth Over Noise</div></div></div><div class="grid three section">${pillarCards}</div>${trendCard}<div class="card section"><div class="space" style="margin-bottom:12px"><div class="title-md">Session History</div><span class="muted small">${completed.length} sessions</span></div><div class="list">${history}</div></div><div class="card section"><div class="space" style="margin-bottom:12px"><div class="title-md">Personal Records</div><span class="muted small">${prs.length} recorded</span></div><div class="list">${prItems}</div></div></div>`;
}

// RENDER ENGINE
// ─────────────────────────────────────────────────────────────────────────────
const app = document.getElementById("app");
let _scrollY = 0;

function computeReadinessScore(sleepHrs, soreness, battery) {
  let s=50;
  s+=Math.min(25,Math.round((sleepHrs/9)*25));
  s+=({None:25,Low:20,Moderate:10,High:0}[soreness]??15);
  s+=Math.round((battery/100)*25)-13;
  return Math.max(10,Math.min(99,s));
}

function navBtn(key,icon,label){const active=STATE.ui.tab===key;return`<button class="nav-btn${active?" active":""}" data-nav="${key}"><span style="font-size:18px">${icon}</span><span>${label}</span></button>`;}
function teamNavBtn(key,icon,label){const active=STATE.ui.teamTab===key;return`<button class="nav-btn${active?" active":""}" data-team-nav="${key}"><span style="font-size:18px">${icon}</span><span>${label}</span></button>`;}

function nowBar(){if(STATE.ui.tab!=="session"||isCoach()||!STATE.workout)return"";return`<div class="now-bar"><div><strong style="font-size:14px">${STATE.workout.title}</strong><div class="muted small">Active session</div></div><button class="sm" data-action="end-session" style="background:rgba(52,211,153,.15);color:#34d399;border:1px solid rgba(52,211,153,.3)">Finish</button></div>`;}

function bottomNav(){
  if(isCoach())return`<nav class="bottom-nav">${teamNavBtn("team-home","🏠","Home")}${teamNavBtn("schedule","📅","Schedule")}${teamNavBtn("roster","👥","Roster")}${teamNavBtn("activity","📊","Activity")}</nav>`;
  return`<nav class="bottom-nav">${navBtn("today","🏠","Today")}${navBtn("session","🏋️","Train")}${navBtn("progress","📈","Progress")}${navBtn("profile","👤","Profile")}</nav>`;
}

function renderScreen(){
  if(isCoach()){switch(STATE.ui.teamTab){case"schedule":return teamScheduleView?teamScheduleView(STATE):teamHomeView(STATE);case"roster":return rosterView?rosterView(STATE):teamHomeView(STATE);case"activity":return teamActivityView?teamActivityView(STATE):teamHomeView(STATE);default:return teamHomeView(STATE);}}
  switch(STATE.ui.tab){case"session":return sessionView(STATE);case"progress":return progressView(STATE);case"profile":return profileView(STATE);default:return athleteHomeView(STATE);}
}

function teamScheduleView(state){const team=state.team;if(!team)return`<div class="screen"><div class="muted" style="padding:40px">No team.</div></div>`;const days=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];const todayMon=new Date().getDay()===0?6:new Date().getDay()-1;return`<div class="screen"><div class="topbar"><div><div class="muted">Schedule</div><div class="title-xl">Weekly Plan</div></div><span class="pill">${team.name}</span></div><div class="card section"><div class="grid" style="grid-template-columns:repeat(7,1fr);gap:6px">${days.map((d,i)=>`<div style="min-height:80px;border-radius:14px;padding:8px;background:${i===todayMon?"rgba(83,181,255,.1)":"var(--surface2)"};border:1px solid ${i===todayMon?"rgba(83,181,255,.35)":"var(--line)"}"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:${i===todayMon?"var(--accent)":"var(--muted)"}">${d}</div></div>`).join("")}</div></div></div>`;}
function rosterView(state){const team=state.team;if(!team)return`<div class="screen"><div class="muted" style="padding:40px">No team.</div></div>`;const tr=state.teamReadiness??[];const items=tr.length?tr.map(r=>{const c=r.score>=80?"#34d399":r.score>=65?"#fbbf24":"#f87171";return`<div class="card"><div class="space"><div><div style="font-weight:700;font-size:16px">${r.profiles?.name??"Athlete"}</div><div class="muted small">${r.profiles?.position??"—"}</div></div><div style="font-weight:700;color:${c};font-size:20px">${r.score}</div></div></div>`;}).join(""):`<div class="card section" style="text-align:center;padding:32px 16px;opacity:.6"><div class="title-md">No athletes checked in</div></div>`;return`<div class="screen"><div class="topbar"><div><div class="muted">Roster</div><div class="title-xl">${team.name}</div></div></div><div class="list section">${items}</div></div>`;}
function teamActivityView(state){const team=state.team;if(!team)return`<div class="screen"><div class="muted" style="padding:40px">No team.</div></div>`;const tr=state.teamReadiness??[];const low=tr.filter(r=>r.score<65);const high=tr.filter(r=>r.score>=80);const signals=[];if(high.length)signals.push(`<div class="card" style="background:rgba(52,211,153,.07);border-color:rgba(52,211,153,.2)"><div style="font-weight:600;color:#34d399;margin-bottom:4px">🟢 ${high.length} athletes at full capacity</div><div class="muted small">${high.map(r=>r.profiles?.name??"Athlete").join(", ")}</div></div>`);if(low.length)signals.push(`<div class="card" style="background:rgba(248,113,113,.07);border-color:rgba(248,113,113,.2)"><div style="font-weight:600;color:#f87171;margin-bottom:4px">🔴 ${low.length} need modified sessions</div></div>`);if(!signals.length)signals.push(`<div class="card" style="text-align:center;padding:32px 16px;opacity:.6"><div style="font-size:36px;margin-bottom:10px">📊</div><div class="title-md">No signals yet today</div></div>`);return`<div class="screen"><div class="topbar"><div><div class="muted">Activity</div><div class="title-xl">Signal, Not Noise</div></div></div><div class="list section">${signals.join("")}</div></div>`;}

function render() {
  try {
    if(!STATE.session && !isSolo()){app.innerHTML=authView(STATE);bindAuth();return;}
    if(!STATE.profile&&!STATE.ui.loading){if(!STATE.ui.onboardingStep)STATE.ui.onboardingStep=1;if(!STATE.ui.onboardingDraft)STATE.ui.onboardingDraft={};app.innerHTML=onboardingSheet(STATE);bindOnboarding();return;}
    if(STATE.ui.loading){app.innerHTML=`<div style="min-height:100vh;display:grid;place-items:center"><div class="loading-spinner"></div></div>`;return;}
    const swapOptions=STATE.ui.activeSwapExerciseId?getSwapOptions(STATE.ui.activeSwapExerciseId,STATE.profile?.sport??"basketball"):[];
    const toast=STATE.ui.toast?`<div class="toast toast-${STATE.ui.toast.type}">${STATE.ui.toast.msg}</div>`:"";
    app.innerHTML=
      `<div class="app-shell">${renderScreen()}${nowBar()}${bottomNav()}</div>`+
      readinessSheet(STATE)+setLoggingSheet(STATE)+swapSheet(STATE,swapOptions)+detailSheet(STATE)+onboardingSheet(STATE)+toast;
    bindUI();
    requestAnimationFrame(()=>window.scrollTo(0,_scrollY));
  } catch(e) {
    console.error("Render error:",e);
    app.innerHTML=`<div style="min-height:100vh;display:grid;place-items:center;padding:20px"><div class="card" style="max-width:400px;text-align:center;padding:28px"><div style="font-size:40px;margin-bottom:12px">⚠️</div><div class="title-md" style="margin-bottom:8px">Something went wrong</div><div class="muted" style="font-size:13px;margin-bottom:16px">${e.message}</div><button onclick="window.location.reload()">Reload App</button></div></div>`;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// EVENT BINDING
// ─────────────────────────────────────────────────────────────────────────────
function bindAuth() {
  const $=id=>document.getElementById(id);
  $("btn-signin")?.addEventListener("click",async()=>{clearError();try{await signInSupabase($("auth-email").value,$("auth-password").value);}catch(e){setError(e.message);render();}});
  $("btn-signup")?.addEventListener("click",()=>{$("auth-email-form").hidden=true;$("signup-role-step").hidden=false;const doSU=async role=>{try{await signUpSupabase($("auth-email").value,$("auth-password").value,role);setToast("Account created! Check your email.","success");$("signup-role-step").hidden=true;$("auth-email-form").hidden=false;render();}catch(e){setError(e.message);render();}};$("btn-role-athlete")?.addEventListener("click",()=>doSU("athlete"));$("btn-role-coach")?.addEventListener("click",()=>doSU("coach"));});
  $("btn-solo")?.addEventListener("click",()=>{STATE.mode="solo";STATE.ui.onboardingStep=1;STATE.ui.onboardingDraft={};render();});
}

function bindOnboarding() {
  const draft=STATE.ui.onboardingDraft;
  document.querySelectorAll("[data-ob-sport]").forEach(b=>b.addEventListener("click",()=>{draft.sport=b.dataset.obSport;render();}));
  document.querySelectorAll("[data-ob-goal]").forEach(b=>b.addEventListener("click",()=>{draft.goal=b.dataset.obGoal;render();}));
  document.querySelectorAll("[data-ob-role]").forEach(b=>b.addEventListener("click",()=>{draft.role=b.dataset.obRole;render();}));
  document.querySelectorAll("[data-ob-equip]").forEach(b=>b.addEventListener("click",()=>{const eq=draft.equipment??[];const item=b.dataset.obEquip;draft.equipment=eq.includes(item)?eq.filter(e=>e!==item):[...eq,item];render();}));
  document.querySelector("[data-action='ob-step-2']")?.addEventListener("click",()=>{const n=document.getElementById("ob-name");if(n)draft.name=n.value.trim();if(!draft.name){alert("Please enter your name.");return;}if(!draft.sport){alert("Please select a sport.");return;}STATE.ui.onboardingStep=2;render();});
  document.querySelector("[data-action='ob-step-1']")?.addEventListener("click",()=>{STATE.ui.onboardingStep=1;render();});
  document.querySelector("[data-action='ob-step-3']")?.addEventListener("click",()=>{const pos=document.getElementById("ob-position");if(pos)draft.position=pos.value;if(!draft.goal){alert("Please select a goal.");return;}if(!draft.role)draft.role="athlete";STATE.ui.onboardingStep=3;render();});
  document.querySelector("[data-action='ob-finish']")?.addEventListener("click",()=>{
    const profile={name:draft.name??"Athlete",sport:draft.sport??"basketball",position:draft.position??"",goal:draft.goal??"General Fitness",role:draft.role??"athlete",equipment:draft.equipment??[]};
    STATE.profile=solo.saveProfile(profile);
    STATE.ui.onboardingStep=null;STATE.ui.onboardingDraft=null;
    loadSoloData();setToast("Welcome, "+profile.name.split(" ")[0]+"! 🎉","success");render();
  });
}

function bindUI() {
  const on=(sel,fn)=>document.querySelectorAll(sel).forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();fn(e.currentTarget);}));
  on("[data-nav]",b=>{_scrollY=window.scrollY;STATE.ui.tab=b.dataset.nav;render();});
  on("[data-team-nav]",b=>{_scrollY=window.scrollY;STATE.ui.teamTab=b.dataset.teamNav;render();});
  on("[data-action='start-session']",()=>{STATE.ui.tab="session";render();});
  on("[data-action='end-session']",()=>{if(STATE.workout){solo.completeWorkout(STATE.workout.id,STATE.workout.exercises);setToast("Session complete. Great work. 💪","success");loadSoloData();}STATE.ui.tab="today";render();});
  on("[data-action='sign-out']",()=>{STATE.session=null;STATE.profile=null;STATE.mode="solo";render();});
  on("[data-action='sign-in-prompt']",()=>{STATE.mode="connected";STATE.session=null;render();});
  on("[data-action='open-readiness']",()=>{STATE.ui.activeReadinessSheet=true;render();});
  on("[data-action='close-readiness']",()=>{STATE.ui.activeReadinessSheet=false;render();});
  on("[data-action='save-readiness']",()=>{
    const sleep=parseFloat(document.getElementById("ri-sleep")?.value)||7;
    const soreness=document.getElementById("ri-soreness")?.value||"Low";
    const hydration=document.getElementById("ri-hydration")?.value||"On target";
    const battery=parseInt(document.getElementById("ri-battery")?.value)||70;
    const score=computeReadinessScore(sleep,soreness,battery);
    STATE.readiness=solo.saveReadiness({sleep,soreness,hydration,bodyBattery:battery,score,hrv:""});
    STATE.readinessTrend=solo.getReadinessTrend(14);
    STATE.ui.activeReadinessSheet=false;setToast("Check-in saved. Score: "+score,"success");render();
  });
  on("[data-action='open-sets']",b=>{STATE.ui.activeSetExerciseId=b.dataset.ex;render();});
  on("[data-action='close-set-sheet']",()=>{STATE.ui.activeSetExerciseId=null;render();});
  on("[data-action='toggle-set']",b=>{if(!STATE.workout)return;markSetDone(STATE.workout,b.dataset.ex,Number(b.dataset.set));solo.saveWorkoutProgress(STATE.workout.id,STATE.workout.exercises);render();});
  on("[data-action='swap']",b=>{STATE.ui.activeSwapExerciseId=b.dataset.ex;render();});
  on("[data-action='close-swap-sheet']",()=>{STATE.ui.activeSwapExerciseId=null;render();});
  on("[data-action='pick-swap']",b=>{if(!STATE.workout)return;swapExercise(STATE.workout,STATE.ui.activeSwapExerciseId,b.dataset.new);STATE.ui.activeSwapExerciseId=null;solo.saveWorkoutProgress(STATE.workout.id,STATE.workout.exercises);render();});
  on("[data-action='detail']",b=>{STATE.ui.activeDetailExerciseId=b.dataset.ex;render();});
  on("[data-action='close-detail-sheet']",()=>{STATE.ui.activeDetailExerciseId=null;render();});
  on("[data-action='auto-workout']",()=>{const payload=buildWorkoutPayload(STATE.profile?.sport??"basketball",STATE.readiness?.score??75);STATE.workout=solo.createWorkout(payload);STATE.ui.tab="session";setToast("Workout generated. Let's go.","success");render();});
  on("[data-action='save-profile']",()=>{const n=document.getElementById("p-name")?.value;const s=document.getElementById("p-sport")?.value;const pos=document.getElementById("p-position")?.value;const g=document.getElementById("p-goal")?.value;STATE.profile=solo.saveProfile({...STATE.profile,name:n||STATE.profile.name,sport:s||STATE.profile.sport,position:pos||STATE.profile.position,goal:g||STATE.profile.goal});setToast("Profile saved.","success");render();});
  on("[data-action='reset-solo']",()=>{if(!confirm("Clear ALL local data? This cannot be undone."))return;solo.clearAll();STATE.profile=null;STATE.workout=null;STATE.readiness=null;STATE.prs=[];STATE.readinessTrend=[];STATE.recentWorkouts=[];STATE.ui.onboardingStep=1;STATE.ui.onboardingDraft={};render();});
}

// ─────────────────────────────────────────────────────────────────────────────
// DATA LOADING (Solo mode — Supabase optional)
// ─────────────────────────────────────────────────────────────────────────────
function loadSoloData() {
  STATE.profile        = solo.getProfile();
  STATE.workout        = solo.getTodaysWorkout();
  STATE.readiness      = solo.getTodaysReadiness();
  STATE.prs            = solo.getPRs();
  STATE.readinessTrend = solo.getReadinessTrend(14);
  STATE.recentWorkouts = solo.getRecentWorkouts(30);
  STATE.team           = null;
  STATE.teamReadiness  = [];
}

// Minimal Supabase stubs (only needed if you configure env vars via meta tags or window globals)
async function signInSupabase(email, password) {
  if(window.SUPABASE_CLIENT){const{data,error}=await window.SUPABASE_CLIENT.auth.signInWithPassword({email,password});if(error)throw error;return data;}
  throw new Error("Supabase not configured. Use Solo mode.");
}
async function signUpSupabase(email, password, role) {
  if(window.SUPABASE_CLIENT){const{data,error}=await window.SUPABASE_CLIENT.auth.signUp({email,password,options:{data:{role}}});if(error)throw error;return data;}
  throw new Error("Supabase not configured. Use Solo mode.");
}

// ─────────────────────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────────────────────
function boot() {
  // Always start in solo mode for GitHub Pages (no build step, no env vars)
  STATE.mode = "solo";
  loadSoloData();
  // If no profile saved, onboarding will trigger automatically in render()
  render();
}

boot();
</script>
</body>
</html>
