<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0A0A0F" />
  <meta name="description" content="PerformanceIQ — Sports Performance Platform" />
  <title>PerformanceIQ</title>

  <!-- PWA — manifest and icons only linked when files exist in repo -->
  <!-- <link rel="manifest" href="manifest.json" /> -->
  <!-- Inline SVG favicon — no file dependency -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236EE040'/><text y='.9em' font-size='70' font-family='sans-serif' font-weight='bold' fill='%23060D12' x='18'>P</text></svg>" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Design tokens first, then component styles -->
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="css/boot-loader.css" />
  <link rel="stylesheet" href="css/nav-bar.css" />
  <link rel="stylesheet" href="css/tooltips.css" />
  <link rel="stylesheet" href="css/empty-states.css" />
  <link rel="stylesheet" href="css/session-ready.css" />

  <!-- Boot loader failsafe: if app.js never loads, show retry after 10s -->
  <script>
    window.__piqBootTimeout = setTimeout(function() {
      var loader = document.getElementById('piq-boot-loader');
      if (!loader) return;
      var inner = loader.querySelector('.piq-boot-inner');
      if (inner) {
        inner.innerHTML = [
          '<div style="text-align:center;padding:20px;max-width:280px;">',
            '<div style="font-size:28px;margin-bottom:14px;">⚠️</div>',
            '<div style="font-family:Oswald,sans-serif;font-size:15px;color:#FF6B35;',
                 'margin-bottom:8px;letter-spacing:0.04em;">LOAD ERROR</div>',
            '<div style="font-family:DM Sans,sans-serif;font-size:12px;',
                 'color:rgba(255,255,255,0.45);line-height:1.5;margin-bottom:18px;">',
              'Something took too long to load. Check your connection and try again.',
            '</div>',
            '<button onclick="location.reload()" style="background:#FF6B35;color:#fff;',
                'border:none;padding:10px 24px;border-radius:8px;font-family:Oswald,sans-serif;',
                'font-size:14px;font-weight:600;letter-spacing:0.06em;cursor:pointer;">',
              'RELOAD',
            '</button>',
          '</div>'
        ].join('');
      }
    }, 10000);
  </script>
</head>
<body>

  <!-- ═══════════════════════════════════════════════════
       FIX 01 — CSS-only boot loader.
       Renders immediately (no JS required).
       Removed by bootLoader.hide() in js/core/boot.js
       after first render completes.
  ════════════════════════════════════════════════════ -->
  <div id="piq-boot-loader" aria-hidden="true">
    <div class="piq-boot-inner">
      <div class="piq-boot-ring"></div>
      <div class="piq-boot-logo">PIQ</div>
    </div>
  </div>

  <!-- Logo — inline SVG data URI, no file dependency -->
  <img id="piq-logo-src"
       src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23FF6B35'/><text y='.9em' font-size='70' font-family='sans-serif' font-weight='bold' fill='white' x='15'>P</text></svg>"
       alt="PerformanceIQ"
       style="display:none"
       aria-hidden="true" />

  <!-- App root — all views mount here -->
  <div id="app" role="main"></div>

  <!-- Bottom nav — injected by js/components/nav-bar.js -->
  <!-- (placeholder so nav renders in correct DOM order relative to app) -->

  <!-- Module entry point -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
