<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="PerformanceIQ — Athlete Intelligence Platform. Train Smart. Recover Faster. Get Results.">
  <meta name="theme-color" content="#0d1b3e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PIQ">

  <!-- Open Graph -->
  <meta property="og:title" content="PerformanceIQ">
  <meta property="og:description" content="Athlete Intelligence Platform">
  <meta property="og:type" content="website">

  <title>PerformanceIQ — Athlete Intelligence Platform</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Brand Fonts: Oswald (display) · DM Sans (body) · Barlow Condensed (data) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="piq-root">
    <!-- ── LOADER ── -->
    <div id="piq-loader" aria-label="Loading PerformanceIQ" role="status">
      <div class="loader-ring">
        <!-- PIQ Logo Mark SVG inline -->
        <svg viewBox="0 0 80 80" class="loader-svg" xmlns="http://www.w3.org/2000/svg">
          <!-- Track -->
          <circle cx="40" cy="40" r="30" fill="none" stroke="rgba(57,230,107,0.12)" stroke-width="4" class="loader-track"/>
          <!-- Spinning arc -->
          <circle cx="40" cy="40" r="30" fill="none" stroke="#39e66b" stroke-width="4"
            stroke-dasharray="100 89" stroke-dashoffset="0"
            stroke-linecap="round" class="loader-arc"
            transform="rotate(-90 40 40)"/>
          <!-- Blue accent arc -->
          <circle cx="40" cy="40" r="30" fill="none" stroke="#2a9df4" stroke-width="3"
            stroke-dasharray="30 159" stroke-dashoffset="-80"
            stroke-linecap="round" opacity="0.5"
            transform="rotate(-90 40 40)"/>
        </svg>
        <span class="loader-wordmark">PIQ</span>
      </div>
      <span class="loader-tagline">Athlete Intelligence</span>
    </div>

    <!-- App views mount here via router -->
  </div>

  <!-- Toast container -->
  <div id="piq-toast-container" aria-live="polite"></div>

  <!-- Module entry point -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
