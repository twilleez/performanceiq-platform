<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0b1020">
  <title>PerformanceIQ</title>
  <link rel="icon" href="favicon.ico">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="app.css">
  <link rel="stylesheet" href="onboarding.css">
  <link rel="stylesheet" href="eliteTraining.css">
</head>
<body>
  <div id="appShell" class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">PIQ</div>
        <div>
          <div class="brand-title">PerformanceIQ</div>
          <div class="brand-subtitle" id="brandSubtitle">Elite Training Platform</div>
        </div>
      </div>
      <nav class="nav-list">
        <button class="nav-tab active" data-view="dashboard">Dashboard</button>
        <button class="nav-tab" data-view="train">Train</button>
        <button class="nav-tab" data-view="wellness">Wellness</button>
        <button class="nav-tab" data-view="team">Team</button>
        <button class="nav-tab" data-view="athletes">Athletes</button>
        <button class="nav-tab" data-view="analytics">Analytics</button>
        <button class="nav-tab" data-view="settings">Settings</button>
      </nav>
      <div class="sidebar-card">
        <div class="muted small">Mode</div>
        <div id="modeBadge" class="badge">Solo athlete</div>
        <div id="savePill" class="save-pill"><span id="saveDot" class="dot saved"></span><span id="saveText">Saved</span></div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1 id="viewTitle">Dashboard</h1>
          <div id="viewSubtitle" class="muted">Performance-driven training system</div>
        </div>
        <div class="topbar-actions">
          <button id="quickGenerateBtn" class="btn primary">Generate workout</button>
          <button id="quickResetBtn" class="btn ghost">Reset demo data</button>
        </div>
      </header>

      <section id="onboardingGate" class="panel hidden"></section>

      <section id="dashboardView" class="view active"></section>
      <section id="trainView" class="view hidden"></section>
      <section id="wellnessView" class="view hidden"></section>
      <section id="teamView" class="view hidden"></section>
      <section id="athletesView" class="view hidden"></section>
      <section id="analyticsView" class="view hidden"></section>
      <section id="settingsView" class="view hidden"></section>
    </main>
  </div>

  <dialog id="swapModal" class="modal">
    <form method="dialog" class="modal-card">
      <div class="modal-header">
        <h3>Swap exercise</h3>
        <button class="icon-btn">✕</button>
      </div>
      <div id="swapModalBody"></div>
    </form>
  </dialog>

  <dialog id="restModal" class="modal">
    <form method="dialog" class="modal-card modal-sm">
      <div class="modal-header">
        <h3>Rest timer</h3>
        <button class="icon-btn">✕</button>
      </div>
      <div class="rest-display" id="restDisplay">01:00</div>
      <div class="timer-actions">
        <button type="button" class="btn ghost" data-rest="45">45s</button>
        <button type="button" class="btn ghost" data-rest="60">60s</button>
        <button type="button" class="btn ghost" data-rest="90">90s</button>
        <button type="button" class="btn primary" id="restStartBtn">Start</button>
      </div>
    </form>
  </dialog>

  <div id="toast" class="toast hidden"></div>

  <script src="config.js"></script>
  <script src="authStore.js"></script>
  <script src="cloudSync.js"></script>
  <script src="supabaseClient.js"></script>
  <script src="dataStore.js"></script>
  <script src="exerciseLibrary.js"></script>
  <script src="sportEngine.js"></script>
  <script src="periodizationEngine.js"></script>
  <script src="nutritionEngine.js"></script>
  <script src="riskEngine.js"></script>
  <script src="analyticsEngine.js"></script>
  <script src="performanceEngine.js"></script>
  <script src="eliteTrainingEngine.js"></script>
  <script src="workoutEngine.js"></script>
  <script src="heatmapRenderer.js"></script>
  <script src="dashboardView.js"></script>
  <script src="onboarding.js"></script>
  <script src="progressivePrompts.js"></script>
  <script src="automationEngine.js"></script>
  <script src="piq_engines.js"></script>
  <script src="core.js"></script>
  <script src="legacy.app.js"></script>
  <script src="legacy.boot.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
