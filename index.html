// ── Haptics ───────────────────────────────────────────────────────────────────
const Haptics = {
  light()  { try { navigator.vibrate && navigator.vibrate(8);  } catch {} },
  medium() { try { navigator.vibrate && navigator.vibrate(18); } catch {} },
  heavy()  { try { navigator.vibrate && navigator.vibrate([12,8,12]); } catch {} },
  success(){ try { navigator.vibrate && navigator.vibrate([8,4,8,4,16]); } catch {} },
  error()  { try { navigator.vibrate && navigator.vibrate([20,10,20]); } catch {} },
  pr()     { try { navigator.vibrate && navigator.vibrate([8,4,8,4,8,4,32]); } catch {} },
};

// ── Pull to Refresh ───────────────────────────────────────────────────────────
const PTR = {
  startY: 0,
  pulling: false,
  threshold: 72,
  init() {
    let el = document.getElementById('app');
    el.addEventListener('touchstart', e => {
      if (window.scrollY === 0) { this.startY = e.touches[0].clientY; this.pulling = true; }
    }, { passive: true });
    el.addEventListener('touchmove', e => {
      if (!this.pulling) return;
      const dy = e.touches[0].clientY - this.startY;
      if (dy > 20 && window.scrollY === 0) {
        const ind = document.getElementById('ptr-indicator');
        if (ind) {
          ind.classList.add('visible');
          ind.querySelector('.ptr-label').textContent = dy > this.threshold ? 'Release to refresh' : 'Pull to refresh';
        }
      }
    }, { passive: true });
    el.addEventListener('touchend', async e => {
      if (!this.pulling) return;
      const dy = e.changedTouches[0].clientY - this.startY;
      this.pulling = false;
      if (dy > this.threshold && window.scrollY === 0) {
        const ind = document.getElementById('ptr-indicator');
        if (ind) { ind.classList.add('refreshing'); ind.querySelector('.ptr-label').textContent = 'Refreshing...'; ind.querySelector('.ptr-icon').classList.add('ptr-spin'); }
        Haptics.medium();
        if (!isSolo() && STATE.session) { await loadCloudData(STATE.session.user.id); }
        else { loadSoloData(); refreshIntelReport(); }
        setTimeout(() => { const ind=document.getElementById('ptr-indicator'); if(ind){ind.classList.remove('visible','refreshing');} render(); }, 400);
      } else {
        const ind = document.getElementById('ptr-indicator');
        if (ind) ind.classList.remove('visible');
      }
    }, { passive: true });
  }
};

function ptrIndicatorHTML() {
  return '<div id="ptr-indicator" class="ptr-indicator"><span class="ptr-icon">↓</span><span class="ptr-label">Pull to refresh</span></div>';
}

// ── Swipe Navigation ──────────────────────────────────────────────────────────
const SwipeNav = {
  startX: 0,
  startY: 0,
  tabs: ['today','session','videos','progress','profile'],
  init() {
    document.getElementById('app').addEventListener('touchstart', e => {
      this.startX = e.touches[0].clientX;
      this.startY = e.touches[0].clientY;
    }, { passive: true });
    document.getElementById('app').addEventListener('touchend', e => {
      if (isCoach()) return; // coach has different nav
      const dx = e.changedTouches[0].clientX - this.startX;
      const dy = e.changedTouches[0].clientY - this.startY;
      if (Math.abs(dx) < 60 || Math.abs(dy) > Math.abs(dx) * 0.8) return; // not a horizontal swipe
      if (Math.abs(dx) < Math.abs(dy)) return;
      // Only swipe from edge zones to avoid conflict with scrollable content
      const fromEdge = this.startX < 32 || this.startX > window.innerWidth - 32;
      if (!fromEdge && Math.abs(dx) < 100) return;
      const cur = this.tabs.indexOf(STATE.ui.tab);
      if (cur < 0) return;
      if (dx < -60 && cur < this.tabs.length - 1) {
        STATE.ui._slideDir = 'left';
        STATE.ui.tab = this.tabs[cur + 1];
        Haptics.light();
        render();
      } else if (dx > 60 && cur > 0) {
        STATE.ui._slideDir = 'right';
        STATE.ui.tab = this.tabs[cur - 1];
        Haptics.light();
        render();
      }
    }, { passive: true });
  }
};

function readinessSummaryCard(trend, avg) {
  if (!trend.length) return '';

  const hi = Math.max(...scores), lo = Math.min(...scores);
  const last7 = trend.slice(-7);
  const trendDir = scores.length >= 4 ? (scores.slice(-3).reduce((s,v)=>s+v,0)/3) - (scores.slice(0,3).reduce((s,v)=>s+v,0)/3) : 0;
  const trendLabel = trendDir > 3 ? 'improving' : trendDir < -3 ? 'declining' : 'stable';
  const trendClass = trendDir > 3 ? 'trend-up' : trendDir < -3 ? 'trend-down' : 'trend-flat';
  const trendIcon = trendDir > 3 ? '↑' : trendDir < -3 ? '↓' : '→';

  const bars = last7.map(r => {
    const c = r.score>=80?'#34d399':r.score>=65?'#fbbf24':'#f87171';
    const pct = Math.round((r.score/100)*100);
    const day = new Date(r.log_date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short'});

      </div>
      <div style="font-size:9px;color:var(--muted2);text-transform:uppercase;letter-spacing:.04em">${day}</div>
    </div>`;
  }).join('');

  return `<div class="card section">
    <div class="space" style="margin-bottom:14px">
      <div class="title-md">Readiness Overview</div>
      <span class="trend-chip ${trendClass}">${trendIcon} ${trendLabel}</span>
    </div>
    <div style="display:flex;gap:6px;align-items:flex-end;height:80px">${bars}</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px">
      <div style="text-align:center;padding:10px;border-radius:12px;background:rgba(255,255,255,.03);border:1px solid var(--line)">
        <div class="muted" style="font-size:10px;margin-bottom:4px">7-DAY AVG</div>
        <div style="font-size:20px;font-weight:800;color:${avg>=80?'#34d399':avg>=65?'#fbbf24':'#f87171'}">${avg||'—'}</div>
      </div>
      <div style="text-align:center;padding:10px;border-radius:12px;background:rgba(255,255,255,.03);border:1px solid var(--line)">
        <div class="muted" style="font-size:10px;margin-bottom:4px">PEAK</div>
        <div style="font-size:20px;font-weight:800;color:#34d399">${hi}</div>
      </div>
      <div style="text-align:center;padding:10px;border-radius:12px;background:rgba(255,255,255,.03);border:1px solid var(--line)">
        <div class="muted" style="font-size:10px;margin-bottom:4px">LOW</div>
        <div style="font-size:20px;font-weight:800;color:#f87171">${lo}</div>
      </div>

  </div>`;
}

function computeReadinessScore(sleepHrs,soreness,battery){
  let s=50;

function bindOnboarding(){
  // Always work from STATE directly — never cache draft reference
  function getDraft(){ return STATE.ui.onboardingDraft||(STATE.ui.onboardingDraft={}); }

  // Sport buttons — toggle active class in place, no full render
  document.querySelectorAll("[data-ob-sport]").forEach(b=>{
    b.addEventListener("click",()=>{
      getDraft().sport=b.dataset.obSport;
      document.querySelectorAll("[data-ob-sport]").forEach(x=>{
        x.classList.toggle("active-sport", x.dataset.obSport===getDraft().sport);
      });
    });
  });

  // Goal buttons — same in-place toggle
  document.querySelectorAll("[data-ob-goal]").forEach(b=>{
    b.addEventListener("click",()=>{
      getDraft().goal=b.dataset.obGoal;
      document.querySelectorAll("[data-ob-goal]").forEach(x=>{
        x.classList.toggle("active-sport", x.dataset.obGoal===getDraft().goal);
      });
    });
  });

  // Role buttons
  document.querySelectorAll("[data-ob-role]").forEach(b=>{
    b.addEventListener("click",()=>{
      getDraft().role=b.dataset.obRole;
      document.querySelectorAll("[data-ob-role]").forEach(x=>{
        x.classList.toggle("active-sport", x.dataset.obRole===getDraft().role);
      });
    });
  });

  // Equipment buttons
  document.querySelectorAll("[data-ob-equip]").forEach(b=>{
    b.addEventListener("click",()=>{
      const d=getDraft();
      const eq=d.equipment??[];
      const item=b.dataset.obEquip;
      d.equipment=eq.includes(item)?eq.filter(e=>e!==item):[...eq,item];
      b.classList.toggle("active-sport", d.equipment.includes(item));
    });
  });

  // Step 1 → 2
  document.querySelector("[data-action='ob-step-2']")?.addEventListener("click",()=>{
    const d=getDraft();
    const n=document.getElementById("ob-name");
    if(n) d.name=n.value.trim();
    if(!d.name){alert("Please enter your name.");return;}
    if(!d.sport){alert("Please select a sport.");return;}
    STATE.ui.onboardingStep=2;
    render();
  });

  // Step 2 → 1
  document.querySelector("[data-action='ob-step-1']")?.addEventListener("click",()=>{
    STATE.ui.onboardingStep=1;render();
  });

  // Step 2 → 3
  document.querySelector("[data-action='ob-step-3']")?.addEventListener("click",()=>{
    const d=getDraft();
    const pos=document.getElementById("ob-position");
    if(pos) d.position=pos.value;
    if(!d.goal){alert("Please select a goal.");return;}
    if(!d.role) d.role="athlete";
    STATE.ui.onboardingStep=3;
    render();
  });

  // Finish
  document.querySelector("[data-action='ob-finish']")?.addEventListener("click",async()=>{
    const d=getDraft();
    const profile={
      name:d.name||"Athlete",
      sport:d.sport||"basketball",
      position:d.position||"",
      goal:d.goal||"General Fitness",
      role:d.role||"athlete",
      equipment:d.equipment||[]
    };
    if(isSolo()){
      STATE.profile=solo.saveProfile(profile);
    } else {
      try{STATE.profile=await DB.upsertProfile({...profile,id:STATE.session.user.id,email:STATE.session.user.email});}
      catch(e){STATE.profile=solo.saveProfile(profile);}
    }
    STATE.ui.onboardingStep=null;
    STATE.ui.onboardingDraft=null;
    loadSoloData();
    refreshIntelReport();
    setToast("Welcome, "+profile.name.split(" ")[0]+"! 🎉","success");
    render();
  });
}

function bindUI(){
  const on=(sel,fn)=>document.querySelectorAll(sel).forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();fn(e.currentTarget);}));
  on("[data-nav]",b=>{_scrollY=window.scrollY;STATE.ui.tab=b.dataset.nav;if(b.dataset.nav==='today')Realtime.clearFeedBadge();render();});
  on("[data-team-nav]",b=>{_scrollY=window.scrollY;STATE.ui.teamTab=b.dataset.teamNav;render();});
  on("[data-action='start-session']",()=>{STATE.ui.tab="session";render();});
  on("[data-action='end-session']",async()=>{if(STATE.workout){solo.completeWorkout(STATE.workout.id,STATE.workout.exercises);PWA.notifySessionComplete(STATE.workout.title);
      setToast("Session complete. Great work. 💪","success");loadSoloData();refreshIntelReport();}STATE.ui.tab="today";render();});
  on("[data-action='sign-out']",async()=>{Realtime.stop();await DB.signOut();STATE.session=null;STATE.profile=null;STATE.mode='solo';STATE.intelReport=null;loadSoloData();render();});
  on("[data-action='sign-in-prompt']",()=>{STATE.mode="connected";STATE.session=null;render();});
  on("[data-action='open-readiness']",()=>{STATE.ui.activeReadinessSheet=true;render();});
  on("[data-action='close-readiness']",()=>{STATE.ui.activeReadinessSheet=false;render();});
  on("[data-action='save-readiness']",async()=>{
    const sleep=parseFloat(document.getElementById("ri-sleep")?.value)||7;
    const soreness=document.getElementById("ri-soreness")?.value||"Low";
    const hydration=document.getElementById("ri-hydration")?.value||"On target";
    const battery=parseInt(document.getElementById("ri-battery")?.value)||70;
    const score=computeReadinessScore(sleep,soreness,battery);
    const rEntry={athlete_id:isSolo()?"solo":STATE.session?.user.id,log_date:todayStr(),score,hrv:"",sleep_hrs:sleep,soreness,hydration,body_battery:battery,notes:""};
    if(isSolo()){STATE.readiness=solo.saveReadiness({sleep,soreness,hydration,bodyBattery:battery,score,hrv:""});STATE.readinessTrend=solo.getReadinessTrend(14);}
    else if(!STATE.ui.isOnline){
      STATE.readiness=solo.saveReadiness({sleep,soreness,hydration,bodyBattery:battery,score,hrv:""});
      STATE.readinessTrend=solo.getReadinessTrend(14);
      solo.addToQueue({type:'upsert_readiness',data:rEntry});
    } else {try{STATE.readiness=await DB.upsertReadiness(rEntry);STATE.readinessTrend=await DB.getReadinessTrend(STATE.session.user.id,14);}catch(e){STATE.readiness=solo.saveReadiness({sleep,soreness,hydration,bodyBattery:battery,score,hrv:""});STATE.readinessTrend=solo.getReadinessTrend(14);solo.addToQueue({type:'upsert_readiness',data:rEntry});}}
    STATE.ui.activeReadinessSheet=false;
    refreshIntelReport();
    if(STATE.intelReport?.risk?.level==='High') PWA.notifyHighRisk('High');
    PWA.scheduleDailyReminder();
    setToast("Check-in saved. Score: "+score,"success");render();
  });
  on("[data-action='close-migration']",()=>{STATE.ui.migrationSheetOpen=false;STATE.ui.migrationResults=null;render();});
  on("[data-action='open-intel-sheet']",()=>{STATE.ui.intelSheetOpen=true;render();});
  on("[data-action='close-intel-sheet']",()=>{STATE.ui.intelSheetOpen=false;render();});
  on("[data-action='open-sets']",b=>{STATE.ui.activeSetExerciseId=b.dataset.ex;render();});
  on("[data-action='close-set-sheet']",()=>{STATE.ui.activeSetExerciseId=null;render();});
  on("[data-action='toggle-set']",async b=>{
    if(!STATE.workout)return;
    markSetDone(STATE.workout,b.dataset.ex,Number(b.dataset.set));
    if(isSolo()){solo.saveWorkoutProgress(STATE.workout.id,STATE.workout.exercises);}
    else{try{await DB.updateWorkout(STATE.workout.id,{exercises:STATE.workout.exercises});}catch(e){solo.saveWorkoutProgress(STATE.workout.id,STATE.workout.exercises);}}
    render();
  });
  on("[data-action='swap']",b=>{STATE.ui.activeSwapExerciseId=b.dataset.ex;render();});
  on("[data-action='close-swap-sheet']",()=>{STATE.ui.activeSwapExerciseId=null;render();});
  on("[data-action='pick-swap']",async b=>{if(!STATE.workout)return;swapExercise(STATE.workout,STATE.ui.activeSwapExerciseId,b.dataset.new);STATE.ui.activeSwapExerciseId=null;solo.saveWorkoutProgress(STATE.workout.id,STATE.workout.exercises);render();});
  on("[data-action='detail']",b=>{STATE.ui.activeDetailExerciseId=b.dataset.ex;render();});
  on("[data-action='close-detail-sheet']",()=>{STATE.ui.activeDetailExerciseId=null;render();});
  on("[data-action='auto-workout']",async()=>{
    const uid=isSolo()?"solo":STATE.session?.user.id;
    const payload={...buildWorkoutPayload(STATE.profile?.sport??"basketball",STATE.readiness?.score??75),athlete_id:uid,scheduled_date:todayStr(),created_at:new Date().toISOString(),completed_at:null};
    if(isSolo()){STATE.workout=solo.createWorkout(payload);}
    else{try{STATE.workout=await DB.createWorkout(payload);}catch(e){STATE.workout=solo.createWorkout(payload);}}
    STATE.ui.tab="session";setToast("Workout generated. Let's go.","success");render();
  });
  on("[data-action='save-profile']",async()=>{const n=document.getElementById("p-name")?.value;const s=document.getElementById("p-sport")?.value;const pos=document.getElementById("p-position")?.value;const g=document.getElementById("p-goal")?.value;STATE.profile=solo.saveProfile({...STATE.profile,name:n||STATE.profile.name,sport:s||STATE.profile.sport,position:pos||STATE.profile.position,goal:g||STATE.profile.goal});refreshIntelReport();setToast("Profile saved.","success");render();});
  on("[data-action='reset-solo']",()=>{if(!confirm("Clear ALL local data? This cannot be undone."))return;solo.clearAll();STATE.profile=null;STATE.workout=null;STATE.readiness=null;STATE.prs=[];STATE.readinessTrend=[];STATE.recentWorkouts=[];STATE.intelReport=null;STATE.ui.onboardingStep=1;STATE.ui.onboardingDraft={};render();});

  // ── Builder bindings ─────────────────────────────────────────────────────
  // Open builder tab — init draft
  const builderNavEl=document.querySelector("[data-team-nav='builder']");
  if(builderNavEl){
    builderNavEl.addEventListener('click',()=>{
      if(!STATE.ui.builderDraft)STATE.ui.builderDraft=null; // reset handled by getBuilderDraft
      // Load templates
      loadTemplates();
    });
  }

  // Exercise picker — toggle selection
  document.querySelectorAll('[data-pick-ex]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const draft=getBuilderDraft();
      STATE.ui.builderDraft=draft;
      const id=btn.dataset.pickEx;
      const idx=draft.exercises.findIndex(e=>e.id===id);
      if(idx>=0){draft.exercises.splice(idx,1);}
      else{draft.exercises.push({id,sets:[{reps:'5',weight:'',target:'5 reps',done:false}],rest_sec:60});}
      // Sync title/sport from form
      const t=document.getElementById('b-title');if(t)draft.title=t.value;
      const s=document.getElementById('b-sport');if(s)draft.sport=s.value;
      const dt=document.getElementById('b-daytype');if(dt)draft.day_type=dt.value;
      render();
    });
  });

  // Sport filter change
  const sportFilter=document.getElementById('b-sport-filter');
  if(sportFilter){
    sportFilter.addEventListener('change',()=>{
      const draft=getBuilderDraft();STATE.ui.builderDraft=draft;
      draft.sport=sportFilter.value;draft.exercises=[];render();
    });
  }

  // Remove exercise from builder
  document.querySelectorAll('[data-remove-ex]').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const draft=getBuilderDraft();STATE.ui.builderDraft=draft;
      draft.exercises.splice(Number(btn.dataset.removeEx),1);render();
    });
  });

  // Drag-to-reorder
  let dragSrcIdx=null;
  document.querySelectorAll('[data-drag-idx]').forEach(el=>{
    el.addEventListener('dragstart',()=>{dragSrcIdx=Number(el.dataset.dragIdx);el.classList.add('dragging');});
    el.addEventListener('dragend',()=>{el.classList.remove('dragging');document.querySelectorAll('.builder-exercise').forEach(e=>e.classList.remove('drag-over'));});
    el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('drag-over');});
    el.addEventListener('dragleave',()=>el.classList.remove('drag-over'));
    el.addEventListener('drop',e=>{
      e.preventDefault();el.classList.remove('drag-over');
      const targetIdx=Number(el.dataset.dragIdx);
      if(dragSrcIdx===null||dragSrcIdx===targetIdx)return;
      const draft=getBuilderDraft();STATE.ui.builderDraft=draft;
      const moved=draft.exercises.splice(dragSrcIdx,1)[0];
      draft.exercises.splice(targetIdx,0,moved);
      dragSrcIdx=null;render();
    });
  });

  // Next: step 1 → 2
  document.querySelector("[data-action='builder-next-1']")?.addEventListener('click',()=>{
    const draft=getBuilderDraft();STATE.ui.builderDraft=draft;
    const t=document.getElementById('b-title');if(t)draft.title=t.value;
    const s=document.getElementById('b-sport');if(s)draft.sport=s.value;
    const dt=document.getElementById('b-daytype');if(dt)draft.day_type=dt.value;
    const n=document.getElementById('b-notes');if(n)draft.notes=n.value;
    const c=document.getElementById('b-cue');if(c)draft.recovery_cue=c.value;
    if(!draft.exercises.length){setToast('Add at least one exercise.','error');return;}
    if(!draft.title.trim()){setToast('Give the workout a title.','error');return;}
    // Init sets if needed
    draft.exercises=draft.exercises.map(ex=>({...ex,sets:ex.sets&&ex.sets.length?ex.sets:[{reps:'5',weight:'',target:'5 reps',done:false}]}));
    STATE.ui.builderStep=2;render();
  });

  // Back: step 2 → 1
  document.querySelector("[data-action='builder-back-2']")?.addEventListener('click',()=>{STATE.ui.builderStep=1;render();});

  // Set config changes
  document.querySelectorAll('[data-ex-idx][data-set-idx]').forEach(inp=>{
    inp.addEventListener('input',()=>{
      const draft=getBuilderDraft();STATE.ui.builderDraft=draft;
      const ei=Number(inp.dataset.exIdx),si=Number(inp.dataset.setIdx),field=inp.dataset.field;
      if(!draft.exercises[ei])return;
      if(!draft.exercises[ei].sets[si])return;
      draft.exercises[ei].sets[si][field]=inp.value;
      if(field==='reps')draft.exercises[ei].sets[si].target=inp.value;
    });
  });

  // Rest sec change
  document.querySelectorAll('[data-ex-idx][data-field="rest_sec"]').forEach(inp=>{
    inp.addEventListener('input',()=>{
      const draft=getBuilderDraft();STATE.ui.builderDraft=draft;
      const ei=Number(inp.dataset.exIdx);
      if(draft.exercises[ei])draft.exercises[ei].rest_sec=Number(inp.value)||60;
    });
  });

  // Add set
  document.querySelectorAll('[data-add-set]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const draft=getBuilderDraft();STATE.ui.builderDraft=draft;
      const ei=Number(btn.dataset.addSet);
      if(!draft.exercises[ei])return;
      const last=draft.exercises[ei].sets.slice(-1)[0];
      draft.exercises[ei].sets.push({...(last||{}),reps:last?.reps||'5',weight:last?.weight||'',target:last?.reps||'5 reps',done:false});
      render();
    });
  });

  // Remove set
  document.querySelectorAll('[data-remove-set]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const draft=getBuilderDraft();STATE.ui.builderDraft=draft;
      const[ei,si]=btn.dataset.removeSet.split('-').map(Number);
      if(!draft.exercises[ei]||draft.exercises[ei].sets.length<=1)return;
      draft.exercises[ei].sets.splice(si,1);render();
    });
  });

  // Next: step 2 → 3
  document.querySelector("[data-action='builder-next-2']")?.addEventListener('click',async()=>{
    const draft=getBuilderDraft();STATE.ui.builderDraft=draft;
    STATE.ui.builderStep=3;
    // Load team members
    if(!STATE.ui.teamMembers&&STATE.team&&!isSolo()){
      try{STATE.ui.teamMembers=await DB.getTeamMembers(STATE.team.id);}catch{STATE.ui.teamMembers=[];}
    }
    render();
  });

  // Back: step 3 → 2
  document.querySelector("[data-action='builder-back-3']")?.addEventListener('click',()=>{STATE.ui.builderStep=2;render();});

  // Athlete chip toggle
  document.querySelectorAll('[data-assign-athlete]').forEach(chip=>{
    chip.addEventListener('click',()=>{
      const draft=getBuilderDraft();STATE.ui.builderDraft=draft;
      const id=chip.dataset.assignAthlete;
      const idx=(draft.assignTo||[]).indexOf(id);
      if(idx>=0)draft.assignTo.splice(idx,1);else draft.assignTo.push(id);
      render();
    });
  });

  // Select all athletes
  document.querySelector("[data-action='assign-all']")?.addEventListener('click',()=>{
    const draft=getBuilderDraft();STATE.ui.builderDraft=draft;
    const members=STATE.ui.teamMembers||[];
    const allIds=members.map(m=>m.profiles?.id).filter(Boolean);
    const allSelected=allIds.every(id=>(draft.assignTo||[]).includes(id));
    draft.assignTo=allSelected?[]:allIds;
    render();
  });

  // Save template toggle
  document.getElementById('b-save-template')?.addEventListener('change',e=>{
    const draft=getBuilderDraft();STATE.ui.builderDraft=draft;
    draft.saveAsTemplate=e.target.checked;render();
  });
  document.getElementById('b-template-name')?.addEventListener('input',e=>{
    const draft=getBuilderDraft();STATE.ui.builderDraft=draft;
    draft.templateName=e.target.value;
  });

  // Date change
  document.getElementById('b-date')?.addEventListener('change',e=>{
    const draft=getBuilderDraft();STATE.ui.builderDraft=draft;
    draft.assignDate=e.target.value;
  });

  // Assign workout
  document.querySelector("[data-action='builder-assign']")?.addEventListener('click',async()=>{
    const draft=getBuilderDraft();
    const btn=document.querySelector("[data-action='builder-assign']");
    if(btn){btn.disabled=true;btn.textContent='Assigning...';}

    try{
      // Normalise exercises for storage
      const exercises=draft.exercises.map(ex=>({
        id:ex.id,
        rest_sec:ex.rest_sec||60,
        sets:(ex.sets||[]).map(s=>({target:s.reps||s.target||'5 reps',weight:s.weight||'',done:false}))
      }));

      const payload={
        title:draft.title,sport:draft.sport,day_type:draft.day_type,
        notes:draft.notes,recovery_cue:draft.recovery_cue,
        exercises,scheduled_date:draft.assignDate,
        created_at:new Date().toISOString(),completed_at:null,
      };

      // Save template if requested
      if(draft.saveAsTemplate){
        const tplPayload={...payload,title:draft.templateName||draft.title,created_by:STATE.session?.user.id||'solo'};
        if(isSolo())solo.saveTemplate(tplPayload);
        else try{await DB.saveTemplate(tplPayload);}catch(e){solo.saveTemplate(tplPayload);}
      }

      // Assign to each athlete
      let assigned=0;
      for(const athleteId of (draft.assignTo||[])){
        if(isSolo()){solo.createWorkout({...payload,athlete_id:'solo'});assigned++;}
        else{try{await DB.assignWorkout({...payload,athlete_id:athleteId,assigned_by:STATE.session?.user.id});assigned++;}catch(e){console.warn('assign err:',e);}}
      }

      setToast('Assigned to '+assigned+' athlete'+(assigned!==1?'s':'')+'. 🚀','success');
      // Notify coach device for confirmation
      PWA.notify('Workout Assigned 🚀', draft.title+' assigned to '+assigned+' athlete'+(assigned!==1?'s':'')+'.');
      STATE.ui.builderDraft=null;STATE.ui.builderStep=1;STATE.ui.teamTab='team-home';
      await loadTemplates();
      render();
    }catch(e){
      setToast('Assignment failed: '+e.message,'error');
      if(btn){btn.disabled=false;btn.textContent='🚀 Assign Workout';}
    }
  });

  // Template picker
  document.querySelector("[data-action='close-template-picker']")?.addEventListener('click',()=>{STATE.ui.templatePickerOpen=false;render();});
  document.querySelectorAll('[data-load-template]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const tplId=btn.dataset.loadTemplate;
      const tpl=(STATE.ui.savedTemplates||[]).find(t=>String(t.id)===String(tplId));
      if(!tpl)return;
      STATE.ui.builderDraft={
        title:tpl.title,sport:tpl.sport,day_type:tpl.day_type,
        notes:tpl.notes||'',recovery_cue:tpl.recovery_cue||'',
        exercises:(tpl.exercises||[]).map(e=>({...e,sets:(e.sets||[]).map(s=>({...s,done:false}))})),
        assignTo:[],assignDate:todayStr(),saveAsTemplate:false,templateName:''
      };
      STATE.ui.templatePickerOpen=false;STATE.ui.builderStep=1;STATE.ui.teamTab='builder';
      render();
    });
  });



  // ── Set logging ───────────────────────────────────────────────────────────
  document.querySelectorAll('[data-log-ex]').forEach(inp => {
    inp.addEventListener('change', () => {
      if (!STATE.workout) return;
      const ei = inp.dataset.logEx;
      const si = Number(inp.dataset.logSet);
      const field = inp.dataset.logField;
      const ex = STATE.workout.exercises?.find(x => x.id === ei);
      if (!ex || !ex.sets[si]) return;
      ex.sets[si][field] = inp.value;
    });
  });

  // ── Log set done + PR check + rest timer ──────────────────────────────────
  document.querySelectorAll("[data-action='log-set-done']").forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!STATE.workout) return;
      const exId = btn.dataset.ex;
      const si = Number(btn.dataset.set);
      const ex = STATE.workout.exercises?.find(x => x.id === exId);
      if (!ex || !ex.sets[si]) return;

      // Read current input values
      const rowEls = btn.closest('.set-log-row');
      const weightEl = rowEls?.querySelector('[data-log-field="weight"]');
      const repsEl = rowEls?.querySelector('[data-log-field="reps"]');
      const rpeEl = rowEls?.querySelector('[data-log-field="rpe"]');
      if (weightEl) ex.sets[si].weight = weightEl.value;
      if (repsEl) ex.sets[si].reps = repsEl.value;
      if (rpeEl) ex.sets[si].rpe = rpeEl.value;

      ex.sets[si].done = !ex.sets[si].done;

      if (ex.sets[si].done) {
        // PR check
        const isPR = checkAndRecordPR(exId, ex.sets[si].weight, ex.sets[si].reps, STATE.session?.user.id || 'solo');
        if (isPR) {
          ex.sets[si].is_pr = true;
          setToast('🏆 New PR! ' + ex.sets[si].weight + 'lb × ' + ex.sets[si].reps, 'success');
          PWA.notify('New PR! 🏆', getExercise(exId)?.title + ' — ' + ex.sets[si].weight + 'lb × ' + ex.sets[si].reps);
        }
        // Start rest timer
        const restSec = ex.rest_sec || 60;
        RestTimer.start(restSec);
      }

      // Save progress
      if (isSolo()) solo.saveWorkoutProgress(STATE.workout.id, STATE.workout.exercises);
      else { try { await DB.updateWorkout(STATE.workout.id, {exercises: STATE.workout.exercises}); } catch {} }
      render();
    });
  });

  // ── Video library ─────────────────────────────────────────────────────────
  on("[data-action='open-video']", b => { STATE.ui.activeVideoId = b.dataset.videoId; render(); });
  on("[data-action='close-video']", () => { STATE.ui.activeVideoId = null; render(); });

  // ── Messaging ─────────────────────────────────────────────────────────────
  document.querySelectorAll("[data-action='open-msg-thread']").forEach(el => {
    el.addEventListener('click', () => {
      STATE.ui.activeMsgThread = {
        id: el.dataset.threadId,
        name: el.dataset.threadName,
        role: el.dataset.threadRole,
      };
      render();
      // Scroll to bottom
      setTimeout(() => {
        const thread = document.querySelector('.msg-thread');
        if (thread) thread.scrollTop = thread.scrollHeight;
      }, 100);
    });
  });
  on("[data-action='close-msg-thread']", () => { STATE.ui.activeMsgThread = null; render(); });
  document.querySelector("[data-action='send-msg']")?.addEventListener('click', () => {
    const inp = document.getElementById('msg-input');
    if (!inp || !inp.value.trim() || !STATE.ui.activeMsgThread) return;
    const thread = STATE.ui.activeMsgThread;
    const msgs = lsGetMsgs(thread.id);
    msgs.push({
      id: Date.now(),
      thread_id: thread.id,
      sender_id: STATE.profile?.id || 'solo',
      sender_name: STATE.profile?.name || 'You',
      body: inp.value.trim(),
      created_at: new Date().toISOString(),
    });
    lsSaveMsgs(thread.id, msgs);
    inp.value = '';
    render();
    setTimeout(() => {
      const t = document.querySelector('.msg-thread');
      if (t) t.scrollTop = t.scrollHeight;
    }, 50);
  });

  // ── Health integrations ───────────────────────────────────────────────────
  on("[data-action='connect-apple-health']", async () => {
    const r = await HealthKit.requestAppleHealth();
    setToast(r.success ? 'Apple Health connected!' : r.reason, r.success ? 'success' : 'error');
  });
  on("[data-action='connect-google-fit']", async () => {
    const r = await HealthKit.requestGoogleFit();
    setToast(r.reason, 'error');
  });

  // ── PDF Export ────────────────────────────────────────────────────────────
  on("[data-action='export-pdf']", () => {
    setToast('Preparing report…', 'success');
    setTimeout(() => window.print(), 400);
  });


  // ── Team create / join ────────────────────────────────────────────────────
  on("[data-action='open-team-create']",()=>{STATE.ui.teamCreateOpen=true;STATE.ui.teamJoinCode=null;render();});
  on("[data-action='close-team-create']",()=>{STATE.ui.teamCreateOpen=false;render();});
  on("[data-action='open-team-join']",()=>{STATE.ui.teamJoinOpen=true;render();});
  on("[data-action='close-team-join']",()=>{STATE.ui.teamJoinOpen=false;render();});
  document.querySelector("[data-action='create-team-submit']")?.addEventListener('click',async()=>{
    const name=document.getElementById('tc-name')?.value?.trim();
    const sport=document.getElementById('tc-sport')?.value||'basketball';
    if(!name){setToast('Enter a team name.','error');return;}
    const btn=document.querySelector("[data-action='create-team-submit']");
    if(btn){btn.disabled=true;btn.textContent='Creating...';}
    try{
      const team=await DB.createTeamWithCode(name,sport,STATE.session?.user.id,STATE.org?.id||null);
      STATE.team=team;STATE.ui.teamJoinCode=team.join_code;
      setToast('Team created! Code: '+team.join_code,'success');
    }catch(e){handleDBError(e,'createTeam');}
    finally{if(btn){btn.disabled=false;btn.textContent='Create Team';}}
    render();
  });
  document.querySelector("[data-action='join-team-submit']")?.addEventListener('click',async()=>{
    const code=document.getElementById('tj-code')?.value?.trim();
    if(!code||code.length<4){setToast('Enter a valid team code.','error');return;}
    const btn=document.querySelector("[data-action='join-team-submit']");
    if(btn){btn.disabled=true;btn.textContent='Joining...';}
    try{
      const team=await DB.joinTeamByCode(code,STATE.session?.user.id);
      STATE.team=team;STATE.ui.teamJoinOpen=false;
      setToast('Joined '+team.name+'!','success');
    }catch(e){handleDBError(e,'joinTeam');}
    finally{if(btn){btn.disabled=false;btn.textContent='Join Team';}}
    render();
  });
  const orgNavEl=document.querySelector("[data-team-nav='org']");
  if(orgNavEl){orgNavEl.addEventListener('click',async()=>{
    if(!STATE.org||isSolo())return;
    try{const s=await DB.getOrgSummary(STATE.org.id);STATE.ui.orgSummary=s;STATE.orgTeams=s.teams||[];}
    catch(e){handleDBError(e,'orgSummary',true);}
    render();
  });}


  on("[data-action='export-csv-readiness']",()=>exportReadinessCSV());
  on("[data-action='export-csv-sessions']",()=>exportWorkoutsCSV());
  on("[data-action='export-prs-csv']",()=>exportPRsCSV());


  // ── Exercise collapse toggle ──────────────────────────────────────────────
  document.querySelectorAll("[data-action='toggle-ex-collapse']").forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const exId = el.dataset.ex;
      if (!STATE.ui.collapsedExercises) STATE.ui.collapsedExercises = {};
      const cur = STATE.ui.collapsedExercises[exId];
      STATE.ui.collapsedExercises[exId] = cur === false ? true : false;
      Haptics.light();
      // Toggle DOM directly without full re-render
      // Re-render to toggle collapse state
      render();
    });
  });

  // ── Haptic feedback on key actions ───────────────────────────────────────
  // Nav taps
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => Haptics.light());
  });
  // Primary buttons
  document.querySelectorAll('button:not(.nav-btn):not(.secondary):not(.sm)').forEach(btn => {
    btn.addEventListener('click', () => Haptics.medium());
  });

  // ── PWA bindings ─────────────────────────────────────────────────────────
  on("[data-action='request-notify']",async()=>{
    const result=await PWA.requestNotifyPermission();
    if(result==='granted'){
      setToast('Notifications enabled! 🔔','success');
      PWA.scheduleDailyReminder();
    } else {
      setToast('Notifications blocked in browser settings.','error');
    }
  });
  on("[data-action='install-app']",()=>PWA.triggerInstall());
  document.getElementById('btn-confirm-migrate')?.addEventListener('click',async()=>{
    const userId=STATE.session?.user.id;if(!userId)return;
    const btn=document.getElementById('btn-confirm-migrate');
    if(btn){btn.disabled=true;btn.textContent='Migrating...';}
    const soloData={profile:solo.getProfile(),readiness:solo.getAllReadiness(),workouts:solo.getAllWorkouts(),prs:solo.getAllPRs()};
    const results=await DB.migrateSoloData(userId,soloData);
    STATE.ui.migrationResults=results;
    await loadCloudData(userId);
    render();
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// DATA LOADING
// ─────────────────────────────────────────────────────────────────────────────
async function loadTemplates(){
  if(isSolo()){STATE.ui.savedTemplates=solo.getTemplates();}
  else if(STATE.session){try{STATE.ui.savedTemplates=await DB.getTemplates(STATE.session.user.id);}catch{STATE.ui.savedTemplates=[];}}
}
async function loadCloudData(userId){
  STATE.syncStatus='syncing';render();
  try{
    const[profile,readiness,readinessTrend,workout,recentWorkouts,prs]=await Promise.all([DB.getProfile(userId),DB.getTodaysReadiness(userId),DB.getReadinessTrend(userId,14),DB.getTodaysWorkout(userId),DB.getRecentWorkouts(userId,30),DB.getPRs(userId)]);
    STATE.profile=profile;STATE.readiness=readiness;STATE.readinessTrend=readinessTrend;STATE.workout=workout;STATE.recentWorkouts=recentWorkouts;STATE.prs=prs;
    if(!STATE.profile){STATE.ui.onboardingStep=1;STATE.ui.onboardingDraft={};}
    STATE.team=profile?.role==='coach'?await DB.getCoachTeam(userId):await DB.getAthleteTeam(userId);
    STATE.teamReadiness=[];
  // Load team members for builder
  if(STATE.team){try{const members=await DB.getTeamMembers(STATE.team.id);STATE.ui.teamMembers=members;}catch{STATE.ui.teamMembers=[];}}
  STATE.syncStatus='synced';refreshIntelReport();
  }catch(e){console.error('Cloud load:',e);STATE.syncStatus='offline';STATE.ui.error='Sync error.';}
}
function syncBar(){
  if(isSolo())return'';
  const s=STATE.syncStatus;
  const label={syncing:'Syncing...',synced:'Synced to cloud',offline:'Offline'}[s];
  return '<div class="sync-banner section"><div class="sync-dot '+s+'"></div><span style="font-size:13px;color:var(--muted)">'+label+'</span>'+(s==='synced'?'<span style="margin-left:auto;font-size:11px;color:var(--muted2)">&#x2601;&#xFE0F; '+(STATE.profile?.email||'')+'</span>':'')+'</div>';
}
function migrationSheet(state){
  if(!state.ui.migrationSheetOpen)return'';
  const r=state.ui.migrationResults;
  if(r){
    return '<div class="sheet-backdrop"><div class="sheet" style="max-width:440px;border-radius:28px;padding:28px;margin:auto"><div class="handle"></div><div style="text-align:center;margin-bottom:20px"><div style="font-size:40px">&#x2705;</div><div class="title-lg" style="margin-top:10px">Data Migrated</div><div class="muted" style="font-size:13px;margin-top:6px">Your solo data has been uploaded to your account.</div></div><div class="list" style="margin-bottom:20px"><div class="item space"><span>Profile</span><span style="color:#34d399;font-weight:700">'+(r.profile?'Synced':'Skipped')+'</span></div><div class="item space"><span>Readiness logs</span><span style="color:#34d399;font-weight:700">'+r.readiness+' entries</span></div><div class="item space"><span>Workouts</span><span style="color:#34d399;font-weight:700">'+r.workouts+' sessions</span></div><div class="item space"><span>Personal records</span><span style="color:#34d399;font-weight:700">'+r.prs+' PRs</span></div></div><button style="width:100%" data-action="close-migration">Done</button></div></div>';
  }
  const sp=solo.getProfile(),sr=solo.getAllReadiness(),sw=solo.getAllWorkouts(),sp2=solo.getAllPRs();
  if(!sp&&!sr.length&&!sw.length&&!sp2.length)return'';
  return '<div class="sheet-backdrop"><div class="sheet" style="max-width:440px;border-radius:28px;padding:28px;margin:auto"><div class="handle"></div><div class="title-lg" style="margin-bottom:8px">Migrate Local Data</div><div class="muted" style="font-size:13px;margin-bottom:20px">We found existing data on this device. Upload it to your new account?</div><div class="list" style="margin-bottom:20px">'+(sp?'<div class="item space"><span>Profile</span><span class="muted small">1 profile</span></div>':'')+(sr.length?'<div class="item space"><span>Readiness logs</span><span class="muted small">'+sr.length+' entries</span></div>':'')+(sw.length?'<div class="item space"><span>Workouts</span><span class="muted small">'+sw.length+' sessions</span></div>':'')+(sp2.length?'<div class="item space"><span>Personal records</span><span class="muted small">'+sp2.length+' PRs</span></div>':'')+'</div><button style="width:100%;margin-bottom:10px" id="btn-confirm-migrate">Upload to Account</button><button class="secondary" style="width:100%" data-action="close-migration">Skip</button></div></div>';
}

function loadSoloData(){
  // Preserve active onboarding state
  const _step=STATE.ui.onboardingStep;
  const _draft=STATE.ui.onboardingDraft;
  STATE.profile=solo.getProfile();
  STATE.workout=solo.getTodaysWorkout();
  STATE.readiness=solo.getTodaysReadiness();
  STATE.prs=solo.getPRs();
  STATE.readinessTrend=solo.getReadinessTrend(14);
  STATE.recentWorkouts=solo.getRecentWorkouts(30);
  STATE.team=null;
  STATE.teamReadiness=[];
  STATE.syncStatus='offline';
  // Restore onboarding if it was active
  if(_step){STATE.ui.onboardingStep=_step;STATE.ui.onboardingDraft=_draft;}
}

async function signInSupabase(email,password){
  if(window.SUPABASE_CLIENT){const{data,error}=await window.SUPABASE_CLIENT.auth.signInWithPassword({email,password});if(error)throw error;return data;}
  throw new Error("Supabase not configured. Use Solo mode.");
}
async function signUpSupabase(email,password,role){
  if(window.SUPABASE_CLIENT){const{data,error}=await window.SUPABASE_CLIENT.auth.signUp({email,password,options:{data:{role}}});if(error)throw error;return data;}
  throw new Error("Supabase not configured. Use Solo mode.");
}

// ─────────────────────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────────────────────
async function boot(){
  PWA.initNetworkDetection();
  PWA.initInstallPrompt();
  PWA.registerSW();
  // Init UX engines after first render
  setTimeout(()=>{ PTR.init(); SwipeNav.init(); }, 300);
  showPremiumLoader('Initialising…');
  const session=await DB.getSession();
  if(session){
    updateLoaderStatus('Syncing your data…');
    STATE.session=session;STATE.mode='cloud';
    await loadCloudData(session.user.id);
  } else {
    updateLoaderStatus('Loading offline data…');
    STATE.mode='solo';
    loadSoloData();
    if(!STATE.profile){STATE.ui.onboardingStep=1;STATE.ui.onboardingDraft={};}
  }
  // Get device battery level
  HealthKit.getBatteryLevel().then(b=>{ if(b!==null){STATE.ui.deviceBattery=b;} });
  await loadTemplates();
  // Load org for coach
  if(STATE.session&&isCoach()){
    try{STATE.org=await DB.getOrgForUser(STATE.session.user.id);}catch{}
  }
  refreshIntelReport();
  // Start realtime subscriptions
  if(STATE.session){
    const teamId=STATE.team?.id||null;
    Realtime.start(STATE.session.user.id,teamId);
  }
  // Schedule reminder if permission already granted
  if(PWA.getNotifyPermission()==='granted') PWA.scheduleDailyReminder();
  sb.auth.onAuthStateChange(async(event,session)=>{
    // Ignore noisy initial events during onboarding
    if((event==='INITIAL_SESSION'||event==='SIGNED_OUT')&&STATE.ui.onboardingStep) return;
    if(event==='SIGNED_IN'&&session&&STATE.mode==='solo'){
      STATE.session=session;STATE.mode='cloud';STATE.ui.loading=true;render();
      await loadCloudData(session.user.id);
      STATE.ui.loading=false;
      const hasLocal=solo.getProfile()||solo.getAllReadiness().length||solo.getAllWorkouts().length;
      if(hasLocal){STATE.ui.migrationSheetOpen=true;}
      refreshIntelReport();render();
    } else if(event==='SIGNED_OUT'){
      // Don't interrupt active onboarding flow
      if(STATE.ui.onboardingStep) return;
      STATE.session=null;STATE.mode='solo';STATE.profile=null;STATE.intelReport=null;
      loadSoloData();render();
    }
  });
  render();
}

(async()=>{await boot();})();
</script>
</body>
</html>
