<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PerformanceIQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-role="athlete" data-athlete-id="1">

  <nav id="sidebar">
    <div class="sidebar-logo">
      <span class="logo-mark">PIQ</span>
      <span class="logo-text">PerformanceIQ</span>
    </div>
    <div class="nav-links">
      <a href="#dashboard" class="nav-item active" data-view="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
        <span>Dashboard</span>
      </a>
      <a href="#train" class="nav-item" data-view="train">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
        <span>Train</span>
      </a>
      <a href="#wellness" class="nav-item" data-view="wellness">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 000-7.78z"/></svg>
        <span>Wellness</span>
      </a>
      <a href="#team" class="nav-item" data-view="team" data-coach-only>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        <span>Team</span>
      </a>
      <a href="#athletes" class="nav-item" data-view="athletes" data-coach-only>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a4 4 0 014-4h4a4 4 0 014 4v2"/></svg>
        <span>Athletes</span>
      </a>
      <a href="#analytics" class="nav-item" data-view="analytics">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>
        <span>Analytics</span>
      </a>
    </div>
    <div class="sidebar-footer">
      <div class="role-switcher">
        <button class="role-btn active" data-role="athlete">Athlete</button>
        <button class="role-btn" data-role="coach">Coach</button>
      </div>
      <div class="user-profile">
        <div class="avatar">JD</div>
        <div class="user-info">
          <span class="user-name">Jordan Davis</span>
          <span class="user-role">Forward · Basketball</span>
        </div>
      </div>
    </div>
  </nav>

  <header id="topbar">
    <button id="menu-toggle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <span class="topbar-title">PerformanceIQ</span>
    <div class="topbar-piq" id="topbar-piq-score"></div>
  </header>

  <main id="main-content">
    <div id="view-container"></div>
  </main>

  <div id="nav-overlay"></div>
<!-- Entry point: js/app.js. legacy.*.js are unused. -->
 <script type="module" src="js/boot.js"></script>

  <!-- Add this service worker registration -->
  <script type="module">
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(console.error);
      });
    }
  </script>
</body>
</html>
