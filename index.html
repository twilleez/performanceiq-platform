<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#080c12" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PerformanceIQ" />
  <meta name="description" content="Athlete-first training. Coach-powered teams." />
  <link rel="manifest" href="./manifest.json">
  <title>PerformanceIQ</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root {
  /* PerformanceIQ Design Tokens */
  --bg:#080c12;           /* Deep navy */
  --bg2:#141926;          /* Slate blue */
  --surface:rgba(20,25,38,.85);
  --surface2:rgba(20,25,38,.97);
  --line:rgba(255,255,255,.08);--line2:rgba(255,255,255,.045);
  --text:#eef1f7;         /* Soft gray text */
  --muted:#8892a4;--muted2:#5a6475;
  --accent:#53b5ff;       /* Electric cyan */
  --accent2:#ff6b35;      /* Warm orange */
  --green:#34d399;--yellow:#fbbf24;--red:#f87171;
  --intel:#a78bfa;--intel2:#7c3aed;--intel-bg:rgba(167,139,250,.08);--intel-line:rgba(167,139,250,.2);
  --shadow:0 20px 60px rgba(0,0,0,.4);--shadow-sm:0 4px 16px rgba(0,0,0,.22);
  --radius:22px;--radius-sm:14px;--nav-h:80px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent}
body{
  background:var(--bg);
  background-image:
    radial-gradient(ellipse 900px 600px at 75% -5%,rgba(83,181,255,.12) 0%,transparent 60%),
    radial-gradient(ellipse 600px 400px at 15% 85%,rgba(255,107,53,.07) 0%,transparent 55%),
    radial-gradient(ellipse 500px 400px at 50% 50%,rgba(20,25,38,.6) 0%,transparent 70%),
    linear-gradient(180deg,#080c12 0%,#141926 50%,#080c12 100%);
  color:var(--text);
  font-family:"SF Pro Text",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  font-size:15px;line-height:1.5;min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.title-xl{font-size:clamp(26px,6vw,34px);font-weight:800;letter-spacing:-.03em;line-height:1.05}
.title-lg{font-size:22px;font-weight:760;letter-spacing:-.02em;line-height:1.1}
.title-md{font-size:17px;font-weight:700;letter-spacing:-.01em}
.muted{color:var(--muted)}.muted2{color:var(--muted2)}.small{font-size:12px}
.metric{font-size:44px;font-weight:820;letter-spacing:-.05em;line-height:1}
.metric-sm{font-size:28px;font-weight:780;letter-spacing:-.04em;line-height:1}
button{font:inherit;border:none;cursor:pointer;border-radius:var(--radius-sm);transition:all .15s ease;-webkit-tap-highlight-color:transparent}
button:active{transform:scale(.96);opacity:.85}
button:not(.secondary):not(.sm):not(.nav-btn):not(.intel-btn){background:var(--accent);color:#05111e;font-weight:700;padding:13px 18px;border-radius:16px}
button:not(.secondary):not(.sm):not(.nav-btn):not(.intel-btn):hover{background:#6ec4ff}
button.secondary{background:rgba(255,255,255,.04);color:var(--text);border:1px solid var(--line);font-weight:600;padding:11px 16px}
button.secondary:hover{background:rgba(255,255,255,.07)}
button.sm{padding:7px 12px;font-size:12px;font-weight:700;border-radius:10px;background:var(--accent);color:#05111e}
button.sm.secondary,button.secondary.sm{background:rgba(255,255,255,.05);color:var(--text);border:1px solid var(--line)}
button.intel-btn{background:rgba(167,139,250,.15);color:var(--intel);border:1px solid var(--intel-line);font-weight:700;padding:9px 14px;border-radius:12px;font-size:13px}
button.intel-btn:hover{background:rgba(167,139,250,.25)}
input,select,textarea{font:inherit;color:var(--text);background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:12px;padding:10px 12px;width:100%;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:rgba(83,181,255,.45);background:rgba(83,181,255,.04)}
select{cursor:pointer}
.select-input{background:rgba(255,255,255,.05);color:var(--text);border:1px solid var(--line);border-radius:10px;padding:7px 10px;font:inherit;cursor:pointer;width:auto}
.app-shell{min-height:100vh}
.screen{padding:16px 14px 0;max-width:900px;margin:0 auto;padding-bottom:calc(var(--nav-h) + 36px)}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;padding-top:max(env(safe-area-inset-top,8px),8px)}
.grid{display:grid;gap:12px}.grid.two{grid-template-columns:1.1fr .9fr}.grid.three{grid-template-columns:repeat(3,1fr)}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.space{display:flex;justify-content:space-between;align-items:center;gap:12px}
.list{display:grid;gap:10px}.section{margin-top:14px}.center{text-align:center}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);backdrop-filter:blur(20px) saturate(150%);-webkit-backdrop-filter:blur(20px) saturate(150%);padding:16px}
.intel-card{background:var(--intel-bg);border:1px solid var(--intel-line);border-radius:var(--radius);padding:16px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.item,.exercise-card,.day-card{padding:12px 14px;border-radius:16px;background:var(--surface2);border:1px solid var(--line)}
.exercise-card{border-radius:18px;padding:14px}.exercise-done{border-color:rgba(52,211,153,.2)}
.pill{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid var(--line);font-size:12px;font-weight:600;white-space:nowrap}
.pill.intel{background:rgba(167,139,250,.1);border-color:var(--intel-line);color:var(--intel)}
.stat-chip{padding:6px 10px;border-radius:10px;background:rgba(255,255,255,.05);border:1px solid var(--line);font-size:12px;font-weight:500}
.role-badge{display:inline-flex;padding:5px 9px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid var(--line);font-size:11px;font-weight:700;text-transform:capitalize;letter-spacing:.03em}
.banner{padding:11px 14px;border-radius:14px;background:rgba(83,181,255,.08);border:1px solid rgba(83,181,255,.16);font-size:13px;line-height:1.5}
.intel-banner{padding:12px 14px;border-radius:14px;background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.2);font-size:13px;line-height:1.6}
.set-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.set-tile{padding:10px 6px;border-radius:12px;background:rgba(255,255,255,.03);border:1px solid var(--line);text-align:center;cursor:pointer;transition:all .15s;color:var(--text)}
.set-tile:hover{background:rgba(255,255,255,.07)}.set-tile.done{background:rgba(52,211,153,.12);border-color:rgba(52,211,153,.35)}.set-tile:active{transform:scale(.94)}
.input-row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line2);cursor:pointer}
.input-row:last-child{border-bottom:none}
.sheet-backdrop{position:fixed;inset:0;background:rgba(3,6,12,.55);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:flex;align-items:flex-end;justify-content:center;padding:10px 10px calc(var(--nav-h) + max(env(safe-area-inset-bottom,10px),10px) + 8px);z-index:70;animation:fade-in .18s ease}
.sheet{width:min(860px,100%);background:rgba(20,25,38,.98);border:1px solid var(--line);border-radius:26px 26px 20px 20px;box-shadow:0 -20px 60px rgba(0,0,0,.4);padding:18px 16px max(env(safe-area-inset-bottom,24px),24px);max-height:calc(100vh - var(--nav-h) - 32px);overflow-y:auto;animation:slide-up .22s cubic-bezier(.32,.72,0,1)}
.handle{width:40px;height:4px;border-radius:999px;background:rgba(255,255,255,.15);margin:0 auto 16px}
.readiness-hero{text-align:center;padding:8px 0}
.bottom-nav{position:fixed;left:10px;right:10px;bottom:max(env(safe-area-inset-bottom,8px),8px);height:var(--nav-h);display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px;border-radius:24px;background:rgba(20,25,38,.92);border:1px solid var(--line);backdrop-filter:blur(20px) saturate(150%);-webkit-backdrop-filter:blur(20px) saturate(150%);z-index:80;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.nav-btn{display:grid;place-items:center;gap:3px;border-radius:16px;background:transparent;color:var(--muted2);font-size:11px;font-weight:600;padding:6px 4px;transition:all .15s;letter-spacing:.02em}
.nav-btn:hover{color:var(--muted)}.nav-btn:active{transform:scale(.92)}
.nav-btn.active{background:rgba(83,181,255,.12);color:var(--accent);border:1px solid rgba(83,181,255,.18)}
.nav-btn.active.intel-nav{background:rgba(167,139,250,.12);color:var(--intel);border-color:var(--intel-line)}
.now-bar{position:fixed;left:12px;right:12px;bottom:calc(var(--nav-h) + max(env(safe-area-inset-bottom,8px),8px) + 8px);background:rgba(20,25,38,.94);border:1px solid var(--line);border-radius:18px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;gap:14px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);z-index:75;box-shadow:var(--shadow-sm)}
.login-wrap{min-height:100vh;display:grid;place-items:center;padding:20px}
.login-card{width:min(440px,100%);padding:28px 22px}
.day-card{padding:10px 12px}.day-card.today{border-color:rgba(83,181,255,.4);background:rgba(83,181,255,.08)}
.loading-spinner{width:36px;height:36px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
.intel-spinner{width:28px;height:28px;border:2px solid var(--intel-line);border-top-color:var(--intel);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
.toast{position:fixed;bottom:calc(var(--nav-h) + max(env(safe-area-inset-bottom,8px),8px) + 14px);left:50%;transform:translateX(-50%);padding:11px 18px;border-radius:14px;font-size:13px;font-weight:600;z-index:100;pointer-events:none;white-space:nowrap;animation:toast-in .22s ease}
.toast-success{background:rgba(52,211,153,.14);border:1px solid rgba(52,211,153,.4);color:#34d399}
.toast-error{background:rgba(248,113,113,.14);border:1px solid rgba(248,113,113,.4);color:#f87171}
.active-sport{background:rgba(83,181,255,.18)!important;border-color:rgba(83,181,255,.45)!important;color:var(--text)!important}
/* Risk level indicators */
.risk-low{color:#34d399}.risk-medium{color:#fbbf24}.risk-high{color:#f87171}
.risk-bar{height:6px;border-radius:6px;background:rgba(255,255,255,.07);overflow:hidden;margin-top:6px}
.risk-fill{height:100%;border-radius:6px;transition:width .5s ease}
/* Intelligence pulsing glow */
.intel-glow{box-shadow:0 0 20px rgba(167,139,250,.15),0 4px 16px rgba(0,0,0,.2)}
/* Load zone badges */
.load-zone{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.load-zone.green{background:rgba(52,211,153,.12);color:#34d399;border:1px solid rgba(52,211,153,.25)}
.load-zone.yellow{background:rgba(251,191,36,.12);color:#fbbf24;border:1px solid rgba(251,191,36,.25)}
.load-zone.red{background:rgba(248,113,113,.12);color:#f87171;border:1px solid rgba(248,113,113,.25)}
/* Spark/trend line */
.spark{height:44px}
/* Periodization phase pill */
.phase-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}

.sync-banner{padding:10px 14px;border-radius:14px;background:rgba(52,211,153,.07);border:1px solid rgba(52,211,153,.2);font-size:13px;line-height:1.5;display:flex;align-items:center;gap:10px}
.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sync-dot.synced{background:#34d399}
.sync-dot.syncing{background:#fbbf24;animation:pulse 1s infinite}
.sync-dot.offline{background:#8892a4}
button:disabled{opacity:.45;cursor:not-allowed;transform:none}
.loading-full{min-height:100vh;display:grid;place-items:center}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Builder */
.builder-exercise{padding:14px;border-radius:16px;background:var(--surface2);border:1px solid var(--line);margin-bottom:10px;position:relative}
.builder-exercise.dragging{opacity:.4;border-style:dashed}
.builder-exercise.drag-over{border-color:var(--accent);background:rgba(83,181,255,.06)}
.drag-handle{cursor:grab;padding:4px 8px;color:var(--muted2);font-size:18px;user-select:none;flex-shrink:0}
.drag-handle:active{cursor:grabbing}
.set-config-row{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--line2)}
.set-config-row:last-child{border-bottom:none}
.mini-input{background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:8px;padding:6px 8px;color:var(--text);font:inherit;font-size:12px;width:100%;text-align:center;outline:none}
.mini-input:focus{border-color:rgba(83,181,255,.4)}
.ex-picker-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.ex-picker-item{padding:10px 12px;border-radius:12px;background:rgba(255,255,255,.03);border:1px solid var(--line);cursor:pointer;transition:all .15s}
.ex-picker-item:hover{background:rgba(83,181,255,.08);border-color:rgba(83,181,255,.3)}
.ex-picker-item.selected{background:rgba(83,181,255,.12);border-color:rgba(83,181,255,.4)}
.athlete-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid var(--line);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.athlete-chip.selected{background:rgba(83,181,255,.15);border-color:rgba(83,181,255,.4);color:var(--accent)}
.template-item{padding:12px 14px;border-radius:14px;background:var(--surface2);border:1px solid var(--line);cursor:pointer;transition:all .15s}
.template-item:hover{border-color:rgba(83,181,255,.3);background:rgba(83,181,255,.05)}
.tag{display:inline-flex;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}

/* PWA / Offline */
.offline-banner{position:fixed;top:0;left:0;right:0;z-index:200;padding:10px 16px;background:rgba(251,191,36,.12);border-bottom:1px solid rgba(251,191,36,.3);display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;color:#fbbf24;animation:slide-down .25s ease}
.notify-prompt{padding:14px 16px;border-radius:16px;background:rgba(83,181,255,.07);border:1px solid rgba(83,181,255,.2);font-size:13px;margin-top:14px}
.install-prompt{padding:14px 16px;border-radius:16px;background:rgba(52,211,153,.07);border:1px solid rgba(52,211,153,.2);font-size:13px;margin-top:14px}
@keyframes slide-down{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}

/* ── Premium Loading Screen ─────────────────────────────────────────────── */
.piq-loader{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;background:#080c12;background-image:radial-gradient(ellipse 900px 600px at 60% 20%,rgba(83,181,255,.14) 0%,transparent 60%),radial-gradient(ellipse 500px 400px at 15% 85%,rgba(255,107,53,.08) 0%,transparent 55%),linear-gradient(180deg,#080c12 0%,#141926 100%)}
.piq-loader-card{text-align:center;padding:48px 40px;border-radius:32px;background:rgba(20,25,38,.75);border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);box-shadow:0 32px 80px rgba(0,0,0,.4),0 0 0 1px rgba(83,181,255,.06);animation:loader-in .5s cubic-bezier(.32,.72,0,1) both}
.piq-logo{width:72px;height:72px;border-radius:22px;background:linear-gradient(135deg,#53b5ff 0%,#3a8fd4 50%,#ff6b35 100%);display:grid;place-items:center;margin:0 auto 20px;box-shadow:0 8px 32px rgba(83,181,255,.35);animation:logo-pulse 2s ease-in-out infinite}
.piq-loader-title{font-size:28px;font-weight:800;letter-spacing:-.04em;color:#eef1f7;margin-bottom:4px}
.piq-loader-sub{font-size:13px;color:#8892a4;margin-bottom:28px;font-weight:500}
.piq-progress-track{width:220px;height:3px;border-radius:3px;background:rgba(255,255,255,.07);margin:0 auto;overflow:hidden}
.piq-progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#53b5ff,#ff6b35);animation:progress-fill 1.8s cubic-bezier(.4,0,.2,1) forwards}
.piq-loader-status{font-size:11px;color:#5a6475;margin-top:10px;letter-spacing:.04em;text-transform:uppercase;font-weight:600}
@keyframes loader-in{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes logo-pulse{0%,100%{box-shadow:0 8px 32px rgba(83,181,255,.35)}50%{box-shadow:0 8px 48px rgba(83,181,255,.6),0 0 0 8px rgba(83,181,255,.08)}}
@keyframes progress-fill{0%{width:0%}60%{width:75%}80%{width:88%}100%{width:100%}}

/* ── Set Logging ─────────────────────────────────────────────────────────── */
.set-log-row{display:grid;grid-template-columns:28px 1fr 1fr 1fr 36px;gap:6px;align-items:center;padding:8px 0;border-bottom:1px solid var(--line2)}
.set-log-row:last-child{border-bottom:none}
.set-log-row.completed{opacity:.6}
.set-num{font-size:11px;font-weight:700;color:var(--muted);text-align:center}
.log-input{background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:8px;padding:7px 6px;color:var(--text);font:inherit;font-size:13px;font-weight:600;text-align:center;width:100%;outline:none;transition:border-color .15s}
.log-input:focus{border-color:rgba(83,181,255,.5);background:rgba(83,181,255,.06)}
.log-input.pr-set{border-color:rgba(251,191,36,.5);background:rgba(251,191,36,.06)}
.set-done-btn{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;font-size:14px;cursor:pointer;border:1px solid var(--line);background:rgba(255,255,255,.04);transition:all .15s;flex-shrink:0}
.set-done-btn.done{background:rgba(52,211,153,.15);border-color:rgba(52,211,153,.4);color:#34d399}
.rpe-badge{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;font-size:11px;font-weight:800}

/* ── Rest Timer ──────────────────────────────────────────────────────────── */
.rest-timer-bar{position:fixed;left:12px;right:12px;bottom:calc(var(--nav-h) + max(env(safe-area-inset-bottom,8px),8px) + 60px);background:rgba(20,25,38,.97);border:1px solid rgba(83,181,255,.25);border-radius:18px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;gap:14px;backdrop-filter:blur(20px);z-index:74;box-shadow:0 8px 32px rgba(0,0,0,.3);animation:slide-up .2s ease}
.timer-ring{position:relative;width:44px;height:44px;flex-shrink:0}
.timer-ring svg{transform:rotate(-90deg)}
.timer-ring-val{position:absolute;inset:0;display:grid;place-items:center;font-size:13px;font-weight:800;color:var(--accent)}

/* ── PR Badge ────────────────────────────────────────────────────────────── */
.pr-flash{animation:pr-pop .4s cubic-bezier(.32,.72,0,1)}
@keyframes pr-pop{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
.pr-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.35);color:#fbbf24;font-size:11px;font-weight:800}

/* ── Messaging ───────────────────────────────────────────────────────────── */
.msg-bubble{padding:10px 14px;border-radius:16px;max-width:78%;font-size:14px;line-height:1.5;word-break:break-word}
.msg-bubble.sent{background:var(--accent);color:#05111e;border-bottom-right-radius:4px;align-self:flex-end}
.msg-bubble.received{background:var(--surface2);border:1px solid var(--line);border-bottom-left-radius:4px;align-self:flex-start}
.msg-thread{display:flex;flex-direction:column;gap:8px;padding:12px 0}
.msg-input-row{display:flex;gap:8px;padding:12px 0 0;border-top:1px solid var(--line)}
.msg-input-row input{flex:1;border-radius:12px}
.unread-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0}

/* ── Video Library ───────────────────────────────────────────────────────── */
.video-card{border-radius:16px;overflow:hidden;background:var(--surface2);border:1px solid var(--line);cursor:pointer;transition:all .15s}
.video-card:hover{border-color:rgba(83,181,255,.3);transform:translateY(-2px)}
.video-thumb{width:100%;aspect-ratio:16/9;background:rgba(0,0,0,.4);display:grid;place-items:center;position:relative}
.play-btn{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.9);display:grid;place-items:center;font-size:16px;box-shadow:0 4px 16px rgba(0,0,0,.3)}
.video-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}

/* ── Health Integration ──────────────────────────────────────────────────── */

// ── DB Error Classifier ───────────────────────────────────────────────────────
function classifyDBError(e, context) {
  const msg = e?.message || String(e);
  const code = e?.code || '';
  if (code === 'PGRST116') return null; // not found — not an error
  if (msg.includes('JWT') || msg.includes('auth')) return { type: 'auth', user: 'Session expired. Please sign in again.', raw: msg };
  if (msg.includes('network') || msg.includes('fetch')) return { type: 'network', user: 'Network error — working offline.', raw: msg };
  if (msg.includes('duplicate') || code === '23505') return { type: 'duplicate', user: 'This record already exists.', raw: msg };
  if (msg.includes('permission') || code === '42501') return { type: 'permission', user: 'You do not have permission to do that.', raw: msg };
  return { type: 'unknown', user: 'Something went wrong. Try again.', raw: msg };
}

function handleDBError(e, context, silent = false) {
  const classified = classifyDBError(e, context);
  if (!classified) return null; // not-found is not an error
  console.error('[PIQ DB]', context, classified.raw);
  if (!silent) setToast(classified.user, 'error');
  if (classified.type === 'auth') {
    STATE.session = null; STATE.mode = 'solo'; loadSoloData(); render();
  }
  return classified;
}

    const { data: members } = await sb.from('team_members').select('athlete_id').in('team_id', teamIds);
    const athleteIds = [...new Set((members||[]).map(m => m.athlete_id))];
    const today = todayStr();
    const { data: readiness } = await sb.from('readiness_logs').select('score').in('athlete_id', athleteIds).eq('log_date', today);
    const avgReadiness = readiness?.length ? Math.round(readiness.reduce((s,r)=>s+r.score,0)/readiness.length) : null;
    return { teams, athleteCount: athleteIds.length, avgReadiness };
  },
  async migrateSoloData(userId,d){
    const r={profile:false,readiness:0,workouts:0,prs:0};
    try{
      if(d.profile){await DB.upsertProfile({id:userId,name:d.profile.name||'',sport:d.profile.sport||'basketball',position:d.profile.position||'',goal:d.profile.goal||'',equipment:d.profile.equipment||[],email:''});r.profile=true;}
      for(const x of d.readiness||[]){try{await sb.from('readiness_logs').upsert({...x,id:undefined,athlete_id:userId},{onConflict:'athlete_id,log_date',ignoreDuplicates:true});r.readiness++;}catch{}}
      for(const x of d.workouts||[]){try{await sb.from('workouts').insert({...x,id:undefined,athlete_id:userId});r.workouts++;}catch{}}
      for(const x of d.prs||[]){try{await sb.from('personal_records').insert({...x,id:undefined,athlete_id:userId});r.prs++;}catch{}}
    }catch(e){console.warn('migrate partial:',e);}
    return r;
  }
};

const INTEL = {
  // ── Injury Risk Engine ──────────────────────────────────────────────────
  assessInjuryRisk(profile, readinessTrend, recentWorkouts) {
    const factors = [];
    let riskScore = 0;

    // Readiness trend analysis
    if (readinessTrend.length >= 3) {
      const recent3 = readinessTrend.slice(-3).map(r => r.score);
      const avg3 = recent3.reduce((s,v) => s+v, 0) / 3;
      const allAvg = readinessTrend.reduce((s,r) => s+r.score, 0) / readinessTrend.length;
      if (avg3 < allAvg - 10) {
        riskScore += 25;
        factors.push({ label: "Readiness declining", detail: `Down ${Math.round(allAvg - avg3)} pts vs baseline`, severity: "high" });
      }
      // Consecutive low days
      const lowDays = recent3.filter(s => s < 65).length;
      if (lowDays >= 2) { riskScore += 20; factors.push({ label: "Multiple low-readiness days", detail: `${lowDays} of last 3 days below 65`, severity: "high" }); }
    }

    // Soreness pattern
    if (readinessTrend.length >= 1) {
      const lastR = readinessTrend[readinessTrend.length - 1];
      if (lastR?.soreness === "High") { riskScore += 20; factors.push({ label: "High soreness reported", detail: "Muscular stress elevated", severity: "high" }); }
      else if (lastR?.soreness === "Moderate") { riskScore += 10; factors.push({ label: "Moderate soreness", detail: "Monitor closely today", severity: "medium" }); }
    }

    // Training frequency / overload
    const last7 = recentWorkouts.filter(w => {
      const diff = (Date.now() - new Date(w.scheduled_date)) / 86400000;
      return diff <= 7 && w.completed_at;
    });
    if (last7.length >= 6) { riskScore += 20; factors.push({ label: "High training frequency", detail: `${last7.length} sessions in 7 days`, severity: "high" }); }
    else if (last7.length >= 5) { riskScore += 10; factors.push({ label: "Elevated training load", detail: `${last7.length} sessions this week`, severity: "medium" }); }

    // Sleep deprivation pattern
    const recentSleep = readinessTrend.slice(-3).filter(r => r.sleep_hrs < 6);
    if (recentSleep.length >= 2) { riskScore += 15; factors.push({ label: "Sleep deficit detected", detail: "Under 6hrs on recent nights", severity: "medium" }); }

    const level = riskScore >= 50 ? "High" : riskScore >= 25 ? "Medium" : "Low";
    const color = level === "High" ? "#f87171" : level === "Medium" ? "#fbbf24" : "#34d399";
    return { score: Math.min(100, riskScore), level, color, factors };
  },

  // ── Load Management & Periodization ─────────────────────────────────────
  analyzeLoad(recentWorkouts, readinessTrend) {
    const completed = recentWorkouts.filter(w => w.completed_at);
    const last7 = completed.filter(w => (Date.now() - new Date(w.scheduled_date)) / 86400000 <= 7);
    const last14 = completed.filter(w => (Date.now() - new Date(w.scheduled_date)) / 86400000 <= 14);
    const prev7 = last14.filter(w => {
      const d = (Date.now() - new Date(w.scheduled_date)) / 86400000;
      return d > 7 && d <= 14;
    });

    const acuteLoad = last7.length;
    const chronicLoad = last14.length / 2;
    const acwr = chronicLoad > 0 ? acuteLoad / chronicLoad : 1;

    let zone, zoneClass, zoneMsg;
    if (acwr < 0.8) { zone = "Underloaded"; zoneClass = "yellow"; zoneMsg = "Training load is below your baseline. Consider increasing volume."; }
    else if (acwr <= 1.3) { zone = "Optimal"; zoneClass = "green"; zoneMsg = "Load is well-managed. Keep this range for peak adaptation."; }
    else { zone = "Overloaded"; zoneClass = "red"; zoneMsg = "Acute load spike detected. Reduce intensity to protect against injury."; }

    // Periodization phase detection
    const weekNum = Math.ceil((Date.now() - new Date(new Date().getFullYear(), 0, 1)) / (7 * 86400000));
    const phaseWeek = ((weekNum - 1) % 4) + 1;
    const phases = ["Accumulation", "Intensification", "Realization", "Deload"];
    const phaseColors = ["rgba(83,181,255,.15)", "rgba(251,191,36,.15)", "rgba(255,107,53,.15)", "rgba(52,211,153,.15)"];
    const phaseBorders = ["rgba(83,181,255,.3)", "rgba(251,191,36,.3)", "rgba(255,107,53,.3)", "rgba(52,211,153,.3)"];
    const phaseIdx = phaseWeek - 1;
    const phase = phases[phaseIdx];
    const phaseColor = phaseColors[phaseIdx];
    const phaseBorder = phaseBorders[phaseIdx];

    return { acuteLoad, chronicLoad: chronicLoad.toFixed(1), acwr: acwr.toFixed(2), zone, zoneClass, zoneMsg, phase, phaseColor, phaseBorder, weekInBlock: phaseWeek };
  },

  // ── Performance Trend Analysis ───────────────────────────────────────────
  analyzeTrends(readinessTrend, recentWorkouts) {
    const completed = recentWorkouts.filter(w => w.completed_at);
    const scores = readinessTrend.map(r => r.score);

    // Readiness momentum
    let momentum = "stable";
    if (scores.length >= 4) {
      const firstHalf = scores.slice(0, Math.floor(scores.length / 2));
      const secondHalf = scores.slice(Math.floor(scores.length / 2));
      const firstAvg = firstHalf.reduce((s,v) => s+v, 0) / firstHalf.length;
      const secondAvg = secondHalf.reduce((s,v) => s+v, 0) / secondHalf.length;
      if (secondAvg > firstAvg + 5) momentum = "improving";
      else if (secondAvg < firstAvg - 5) momentum = "declining";
    }

    // Consistency score (% of days with check-in in last 14)
    const consistency = Math.min(100, Math.round((readinessTrend.length / 14) * 100));

    // Session completion rate
    const last30 = recentWorkouts.filter(w => (Date.now() - new Date(w.scheduled_date)) / 86400000 <= 30);
    const completionRate = last30.length ? Math.round((completed.filter(w => (Date.now() - new Date(w.scheduled_date)) / 86400000 <= 30).length / last30.length) * 100) : 0;

    // Peak readiness day
    const peakEntry = scores.length ? readinessTrend[scores.indexOf(Math.max(...scores))] : null;

    return { momentum, consistency, completionRate, peakScore: peakEntry?.score ?? null, peakDate: peakEntry?.log_date ?? null, totalSessions: completed.length };
  },

  // ── AI Recommendation Engine ─────────────────────────────────────────────
  generateRecommendations(profile, readiness, readinessTrend, recentWorkouts, riskAssessment, loadAnalysis) {
    const recs = [];
    const score = readiness?.score ?? 75;
    const sport = profile?.sport ?? "basketball";

    // Training intensity recommendation
    if (riskAssessment.level === "High") {
      recs.push({ type: "warning", icon: "⚠️", title: "Reduce Training Intensity", body: "Your injury risk is elevated. Today's session should be low-intensity movement only — no max effort work.", priority: 1 });
    } else if (score >= 85) {
      recs.push({ type: "peak", icon: "⚡", title: "Prime Window Detected", body: `Readiness is at ${score}. This is a high-quality training day — prioritize power and skill work while your CNS is primed.`, priority: 1 });
    } else if (score < 65) {
      recs.push({ type: "recovery", icon: "🔄", title: "Recovery Session Recommended", body: "Low readiness detected. A recovery session — mobility, light aerobic work, and soft tissue care — will serve you better than a hard training day.", priority: 1 });
    }

    // Load management
    if (loadAnalysis.zone === "Overloaded") {
      recs.push({ type: "warning", icon: "📊", title: "Load Spike Detected", body: `ACWR of ${loadAnalysis.acwr} is above optimal range. Schedule a rest day or deload session in the next 48 hours.`, priority: 2 });
    } else if (loadAnalysis.zone === "Underloaded") {
      recs.push({ type: "info", icon: "📈", title: "Increase Training Volume", body: "Your recent load is below your chronic baseline. Gradually add a session or increase volume to continue adaptation.", priority: 3 });
    }

    // Periodization guidance
    const phaseGuidance = {
      "Accumulation": "Focus on volume and technique. Build your base this week — more sets, moderate intensity.",
      "Intensification": "Increase load, reduce volume. Fewer sets but push closer to your working max.",
      "Realization": "Peak performance week. Low volume, high intensity, full recovery between sessions.",
      "Deload": "Reduce everything by 40-50%. Let your body absorb the last 3 weeks of work."
    };
    recs.push({ type: "phase", icon: "🗓️", title: `${loadAnalysis.phase} Phase`, body: phaseGuidance[loadAnalysis.phase], priority: 4 });

    // Sleep recommendation
    const avgSleep = readinessTrend.length ? readinessTrend.slice(-3).reduce((s,r) => s + r.sleep_hrs, 0) / Math.min(3, readinessTrend.length) : 7;
    if (avgSleep < 7) {
      recs.push({ type: "warning", icon: "😴", title: "Sleep Quality Alert", body: `Averaging ${avgSleep.toFixed(1)} hours recently. Athletes need 8-9 hours for full recovery. Prioritize sleep tonight.`, priority: 2 });
    }

    // Sport-specific recommendation
    const sportTips = {
      basketball: "COD and lateral quickness are your performance differentiators. Protect them with consistent hip mobility work.",
      football: "Explosive power output drops fast under fatigue. Keep CNS-demanding work early in your sessions.",
      soccer: "Aerobic base directly impacts your late-game quality. Don't skip tempo runs on recovery days.",
      baseball: "Rotational velocity is injury-sensitive. Arm care and thoracic mobility should be daily non-negotiables.",
      volleyball: "Jump training volume accumulates joint stress fast. Monitor knee soreness closely on high-volume weeks.",
      track: "Speed work requires full CNS recovery. 48-72 hours between max velocity sessions is minimum."
    };
    recs.push({ type: "sport", icon: "🏆", title: `${sport.charAt(0).toUpperCase() + sport.slice(1)} Insight`, body: sportTips[sport] ?? "Consistency is the most underrated performance variable. Show up every day.", priority: 5 });

    return recs.sort((a,b) => a.priority - b.priority).slice(0, 4);
  },

  // ── Full Intelligence Report ─────────────────────────────────────────────
  generateReport(profile, readiness, readinessTrend, recentWorkouts) {
    const risk = this.assessInjuryRisk(profile, readinessTrend, recentWorkouts);
    const load = this.analyzeLoad(recentWorkouts, readinessTrend);
    const trends = this.analyzeTrends(readinessTrend, recentWorkouts);
    const recs = this.generateRecommendations(profile, readiness, readinessTrend, recentWorkouts, risk, load);
    return { risk, load, trends, recs, generatedAt: new Date().toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" }) };
  },

  generateCoachReport(team, teamReadiness, recentWorkouts) {
    const tr = teamReadiness || [];
    const flagged = tr.filter(r => r.score < 65);
    const ready = tr.filter(r => r.score >= 80);
    const moderate = tr.filter(r => r.score >= 65 && r.score < 80);
    const avgScore = tr.length ? Math.round(tr.reduce((s,r)=>s+r.score,0)/tr.length) : null;
    const athleteRisks = tr.map(r => ({
      name: r.profiles&&r.profiles.name ? r.profiles.name : 'Athlete',
      score: r.score,
      risk: r.score < 65 ? 'High' : r.score < 80 ? 'Medium' : 'Low',
      flags: [r.sleep_hrs < 6 && 'Low sleep', r.soreness === 'High' && 'High soreness', r.body_battery < 40 && 'Low energy'].filter(Boolean),
    }));
    const load = this.analyzeLoad(recentWorkouts || []);
    const signals = [];
    if (flagged.length >= Math.ceil(tr.length * 0.4) && tr.length > 0)
      signals.push({ level: 'high', msg: Math.round((flagged.length/tr.length)*100)+'% of team below threshold.' });
    if (flagged.length > 0 && flagged.length < Math.ceil(tr.length * 0.4))
      signals.push({ level: 'medium', msg: flagged.length+' athlete'+(flagged.length>1?'s':'')+' flagged for modified sessions.' });
    if (ready.length === tr.length && tr.length > 0)
      signals.push({ level: 'low', msg: 'Full team at capacity. High-intensity session appropriate.' });
    if (!signals.length) signals.push({ level: 'info', msg: 'Awaiting check-ins.' });
    return { avgScore, flagged, ready, moderate, load, signals, athleteRisks };
  }
};

function lsGet(k,fb=null){try{const r=localStorage.getItem(k);return r?JSON.parse(r):fb;}catch{return fb;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function todayStr(){return new Date().toISOString().split("T")[0];}

const solo={
  getProfile:()=>lsGet(PIQ.profile,null),
  saveProfile(p){const v={...p,id:"solo",role:p.role??"athlete"};lsSet(PIQ.profile,v);return v;},
  getTodaysReadiness(){const a=lsGet(PIQ.readiness,[]);return a.find(r=>r.log_date===todayStr())??null;},
  saveReadiness(vals){
    const all=lsGet(PIQ.readiness,[]);const t=todayStr();
    const entry={id:t,athlete_id:"solo",log_date:t,score:vals.score??75,hrv:vals.hrv??"",sleep_hrs:vals.sleep??7,soreness:vals.soreness??"Low",hydration:vals.hydration??"On target",body_battery:vals.bodyBattery??70,notes:""};
    const idx=all.findIndex(r=>r.log_date===t);
    if(idx>=0)all[idx]=entry;else all.push(entry);
    lsSet(PIQ.readiness,all);return entry;
  },
  getReadinessTrend(days=14){const all=lsGet(PIQ.readiness,[]);const since=new Date(Date.now()-days*86400000).toISOString().split("T")[0];return all.filter(r=>r.log_date>=since).sort((a,b)=>a.log_date.localeCompare(b.log_date));},
  getTodaysWorkout(){const all=lsGet(PIQ.workouts,[]);const t=todayStr();return all.filter(w=>w.scheduled_date===t).sort((a,b)=>b.created_at?.localeCompare(a.created_at??"")??0)[0]??null;},
  createWorkout(payload){const all=lsGet(PIQ.workouts,[]);const w={id:"solo_"+Date.now(),athlete_id:"solo",scheduled_date:todayStr(),created_at:new Date().toISOString(),completed_at:null,...payload};all.push(w);lsSet(PIQ.workouts,all);return w;},
  saveWorkoutProgress(workoutId,exercises){const all=lsGet(PIQ.workouts,[]);const idx=all.findIndex(w=>w.id===workoutId);if(idx>=0){all[idx].exercises=exercises;lsSet(PIQ.workouts,all);}},
  completeWorkout(workoutId,exercises){const all=lsGet(PIQ.workouts,[]);const idx=all.findIndex(w=>w.id===workoutId);if(idx>=0){all[idx].exercises=exercises;all[idx].completed_at=new Date().toISOString();lsSet(PIQ.workouts,all);}},
  getRecentWorkouts(days=30){const all=lsGet(PIQ.workouts,[]);const since=new Date(Date.now()-days*86400000).toISOString().split("T")[0];return all.filter(w=>w.scheduled_date>=since).sort((a,b)=>b.scheduled_date.localeCompare(a.scheduled_date));},
  getTemplates:()=>lsGet('piq_templates',[]),
  saveTemplate(t){const all=lsGet('piq_templates',[]);all.unshift({...t,id:'tpl_'+Date.now(),created_at:new Date().toISOString()});lsSet('piq_templates',all);return all[0];},
  getOfflineQueue:()=>lsGet('piq_offline_queue',[]),
  addToQueue(op){const q=lsGet('piq_offline_queue',[]);q.push({...op,queuedAt:new Date().toISOString()});lsSet('piq_offline_queue',q);},
  clearQueue(){lsSet('piq_offline_queue',[]);},
  getAllReadiness:()=>lsGet(PIQ.readiness,[]),getAllWorkouts:()=>lsGet(PIQ.workouts,[]),getAllPRs:()=>lsGet(PIQ.prs,[]),getPRs(){return lsGet(PIQ.prs,[]).sort((a,b)=>b.set_at?.localeCompare(a.set_at??"")??0);},
  clearAll(){Object.values(PIQ).forEach(k=>localStorage.removeItem(k));},
};

// SPARKLINE
// ─────────────────────────────────────────────────────────────────────────────
function sparkline(values,color="#53b5ff",ht=44){
  if(!values||values.length<2)return"";
  const w=260,pad=4,min=Math.min(...values),max=Math.max(...values),range=max-min||1;
  const pts=values.map((v,i)=>`${(pad+(i/(values.length-1))*(w-pad*2)).toFixed(1)},${(ht-pad-((v-min)/range)*(ht-pad*2)).toFixed(1)}`);
  const[lx,ly]=pts[pts.length-1].split(",");
  const area=`M${pts[0].split(",")[0]},${ht} L${pts.join(" L")} L${lx},${ht} Z`;
  const gid="sg"+color.replace("#","");
  return`<svg width="100%" viewBox="0 0 ${w} ${ht}" preserveAspectRatio="none" style="display:block;margin-top:10px;height:${ht}px"><defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity=".22"/><stop offset="100%" stop-color="${color}" stop-opacity=".01"/></linearGradient></defs><path d="${area}" fill="url(#${gid})"/><polyline points="${pts.join(" ")}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="${lx}" cy="${ly}" r="4" fill="${color}" opacity=".9"/></svg>`;
}

function coachIntelView(state) {
  const team = state.team;
  const tr = state.teamReadiness ?? [];

  // Generate team-level intelligence
  const flagged = tr.filter(r => r.score < 65);
  const moderate = tr.filter(r => r.score >= 65 && r.score < 80);
  const ready = tr.filter(r => r.score >= 80);
  const avgTeamScore = tr.length ? Math.round(tr.reduce((s, r) => s + r.score, 0) / tr.length) : null;

  // Team risk signals
  const signals = [];
  if (flagged.length >= Math.ceil(tr.length * 0.4) && tr.length > 0) signals.push({ level: "high", msg: `${Math.round((flagged.length/tr.length)*100)}% of team below readiness threshold — consider a team recovery day.` });
  if (flagged.length > 0 && flagged.length < Math.ceil(tr.length * 0.4)) signals.push({ level: "medium", msg: `${flagged.length} athlete${flagged.length>1?"s":""} flagged. Review their load and assign modified sessions.` });
  if (ready.length === tr.length && tr.length > 0) signals.push({ level: "low", msg: "Full team at capacity. High-intensity training day is appropriate." });
  if (!signals.length) signals.push({ level: "info", msg: "Awaiting check-ins. Send a reminder to your athletes." });

  const signalColors = { high: "#f87171", medium: "#fbbf24", low: "#34d399", info: "#53b5ff" };
  const signalBgs = { high: "rgba(248,113,113,.08)", medium: "rgba(251,191,36,.08)", low: "rgba(52,211,153,.08)", info: "rgba(83,181,255,.08)" };

  const athleteCards = tr.slice(0, 8).map(r => {
    // Mini risk assessment per athlete
    const sleepFlag = r.sleep_hrs < 6;
    const sorenessFlag = r.soreness === "High";
    const batteryFlag = r.body_battery < 40;
    const riskFlags = [sleepFlag && "💤 Low sleep", sorenessFlag && "⚠️ High soreness", batteryFlag && "🔋 Low energy"].filter(Boolean);
    const c = r.score >= 80 ? "#34d399" : r.score >= 65 ? "#fbbf24" : "#f87171";
    return `<div class="card" style="padding:14px">
      <div class="space">
        <div>
          <div style="font-weight:700;font-size:15px">${r.profiles?.name ?? "Athlete"}</div>
          <div class="muted small">${r.profiles?.position ?? "—"} · ${r.soreness ?? "—"} soreness</div>
          ${riskFlags.length ? `<div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap">${riskFlags.map(f=>`<span style="font-size:10px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);color:#f87171;padding:2px 8px;border-radius:999px;font-weight:600">${f}</span>`).join("")}</div>` : ""}
        </div>
        <div style="text-align:right">
          <div style="font-size:26px;font-weight:800;color:${c}">${r.score}</div>
          <div style="height:3px;width:60px;border-radius:3px;background:rgba(255,255,255,.07);margin-top:4px"><div style="width:${r.score}%;height:100%;border-radius:3px;background:${c}"></div></div>
        </div>
      </div>
    </div>`;
  }).join("");

  return `<div class="screen">
    <div class="topbar">
      <div><div class="muted">Intelligence</div><div class="title-xl">Team Command</div></div>
      ${team ? `<span class="pill intel">${team.name}</span>` : ""}
    </div>

function sessionView(state){
  const workout=state.workout;
  if(!workout)return`<div class="screen"><div class="topbar"><div><div class="muted">Train</div><div class="title-xl">No Session</div></div></div><div class="card section" style="text-align:center;padding:40px 16px"><div style="font-size:48px;margin-bottom:14px">🏋️</div><div class="title-md" style="margin-bottom:8px">No workout assigned yet</div><div class="muted" style="margin-bottom:20px;font-size:14px">Generate a session from the Today tab.</div><button data-action="auto-workout">⚡ Generate Workout</button></div></div>`;
  const pct=progressPct(workout);
  const totalSets=(workout.exercises??[]).flatMap(e=>e.sets??[]).length;
  const doneSets=(workout.exercises??[]).flatMap(e=>e.sets??[]).filter(s=>s.done).length;
  const collapsed = STATE.ui.collapsedExercises || {};
  const exCards=(workout.exercises??[]).map(ex=>{
    const meta=getExercise(ex.id);
    const exDone=(ex.sets??[]).filter(s=>s.done).length;
    const exTotal=(ex.sets??[]).length;
    const allDone=exDone===exTotal&&exTotal>0;
    const pct=exTotal?Math.round((exDone/exTotal)*100):0;
    const isCollapsed=collapsed[ex.id]===true||(allDone&&collapsed[ex.id]!==false);
    const progColor=allDone?'#34d399':pct>0?'var(--accent)':'rgba(255,255,255,.1)';
    const patIcon={power:'⚡',strength_lower:'🏋️',hinge:'🔄',speed:'💨',core:'🎯'}[meta?.pattern]||'💪';

    const setRows=(ex.sets??[]).map((s,idx)=>{
      const isPR=s.is_pr;
      const rpeOpts=[6,7,7.5,8,8.5,9,9.5,10].map(r=>`<option value="${r}"${s.rpe==r?' selected':''}>${r}</option>`).join('');
      return `<tr class="set-row-new${s.done?' done-row':''}">
        <td>${idx+1}${isPR?'<span class="pr-tag" style="font-size:9px;margin-left:2px">PR</span>':''}</td>
        <td><input class="log-field${s.is_pr?' pr-glow':''}" type="number" inputmode="decimal" placeholder="lbs" value="${s.weight||''}" min="0" step="2.5" data-log-ex="${ex.id}" data-log-set="${idx}" data-log-field="weight"/></td>
        <td><input class="log-field" type="number" inputmode="numeric" placeholder="reps" value="${s.reps||s.target_reps||''}" min="0" data-log-ex="${ex.id}" data-log-set="${idx}" data-log-field="reps"/></td>
        <td><select class="log-field rpe-field" data-log-ex="${ex.id}" data-log-set="${idx}" data-log-field="rpe"><option value="">—</option>${rpeOpts}</select></td>
        <td><button class="check-btn${s.done?' checked':''}" data-action="log-set-done" data-ex="${ex.id}" data-set="${idx}">${s.done?'✓':'○'}</button></td>
      </tr>`;
    }).join('');

    return `<div class="ex-card">
      <div class="ex-card-header" data-action="toggle-ex-collapse" data-ex="${ex.id}">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:40px;height:40px;border-radius:12px;background:${allDone?'rgba(52,211,153,.15)':'rgba(83,181,255,.08)'};border:1px solid ${allDone?'rgba(52,211,153,.3)':'rgba(83,181,255,.15)'};display:grid;place-items:center;font-size:18px;flex-shrink:0">${allDone?'✓':patIcon}</div>
          <div style="flex:1;min-width:0">
            <div class="ex-card-title" style="color:${allDone?'#34d399':'var(--text)'}">${meta?.title||ex.id}</div>
            <div class="ex-card-meta">
              <span>${meta?.equipment||'bodyweight'}</span>
              <span style="color:var(--muted2)">·</span>
              <span>${exDone}/${exTotal} sets</span>
              ${allDone?'<span class="pill" style="font-size:10px;padding:2px 8px;background:rgba(52,211,153,.12);border-color:rgba(52,211,153,.25);color:#34d399">Done</span>':''}
            </div>
          </div>
          <span style="color:var(--muted2);font-size:13px">${isCollapsed?'▸':'▾'}</span>
        </div>
        <div class="ex-card-prog"><div class="ex-card-prog-fill" style="width:${pct}%;background:${progColor}"></div></div>
      </div>
      ${isCollapsed?'':
        `<div class="ex-card-body">
          ${meta?.cue?`<div class="ex-card-cue">"${meta.cue}"</div>`:''}
          <table class="set-table">
            <thead class="set-table-head"><tr>
              <th>#</th><th>Weight</th><th>Reps</th><th>RPE</th><th></th>
            </tr></thead>
            <tbody>${setRows}</tbody>
          </table>
          <div class="ex-actions">
            <button class="secondary sm" data-action="detail" data-ex="${ex.id}">ℹ Info</button>
            <button class="secondary sm" data-action="swap" data-ex="${ex.id}">↔ Swap</button>
          </div>
        </div>`
      }
    </div>`;
  }).join('');
  return`<div class="screen">
    <div class="topbar"><div><div class="muted">Train</div><div class="title-xl">${workout.title}</div></div><div class="pill" style="${pct===100?"background:rgba(52,211,153,.12);border-color:rgba(52,211,153,.3);color:#34d399":""}">${pct}%</div></div>
    <div class="section" style="padding:0 2px">
      <div style="height:4px;border-radius:4px;background:rgba(255,255,255,.07)"><div style="width:${pct}%;height:100%;border-radius:4px;background:${pct===100?"#34d399":"var(--accent)"};transition:width .4s ease"></div></div>
      <div class="row" style="justify-content:space-between;margin-top:6px"><div class="muted small">${doneSets} of ${totalSets} sets complete</div><div class="muted small" style="font-style:italic">${workout.recovery_cue||""}</div></div>
    </div>
    <!-- SESSION INTEL WIDGET -->
    ${sessionIntelWidget(state.intelReport)}
    <div class="list section">${exCards}</div>
    ${pct===100?`<div class="card section" style="text-align:center;padding:24px 16px;background:rgba(52,211,153,.07);border-color:rgba(52,211,153,.2)"><div style="font-size:36px;margin-bottom:10px">🎯</div><div class="title-md" style="color:#34d399">Session Complete</div><div class="muted" style="margin-top:6px;margin-bottom:16px">All sets logged. Finish the session below.</div><button data-action="end-session" style="background:rgba(52,211,153,.9);color:#052a1c">Finish Session</button></div>`:""}
  </div>`;
}

function progressView(state){
  const{prs,readinessTrend}=state;
  const recentWorkouts=state.recentWorkouts??[];
  const completed=recentWorkouts.filter(w=>w.completed_at);
  const avg=readinessTrend.length?Math.round(readinessTrend.reduce((s,r)=>s+r.score,0)/readinessTrend.length):null;
  const trendVals=readinessTrend.map(r=>r.score);
  const last=trendVals[trendVals.length-1]??null;const prev=trendVals[trendVals.length-2]??null;
  const arrow=last===null||prev===null?"":last>prev?" ↑":last<prev?" ↓":" →";
  let streak=0;
  const sorted=[...recentWorkouts].filter(w=>w.completed_at).sort((a,b)=>b.scheduled_date.localeCompare(a.scheduled_date));
  if(sorted.length){streak=1;let pr=sorted[0].scheduled_date;for(let i=1;i<sorted.length;i++){const diff=(new Date(pr)-new Date(sorted[i].scheduled_date))/86400000;if(diff<=2){streak++;pr=sorted[i].scheduled_date;}else break;}}
  const pillars=[
    {label:"Avg Readiness",value:avg!==null?`${avg}`:"—",sub:avg!==null?`${arrow} last 14 days`:"No data yet",color:avg===null?"var(--muted)":avg>=80?"#34d399":avg>=65?"#fbbf24":"#f87171",bar:avg},
    {label:"Sessions",value:completed.length||"0",sub:"completed this month",color:"#ff6b35",bar:null},
    {label:"Streak",value:streak?`${streak}`:"0",sub:streak?"days in a row 🔥":"start one today",color:streak>=5?"#fbbf24":"#53b5ff",bar:null},
  ];
  const pillarCards=pillars.map(p=>`<div class="card"><div class="muted small" style="margin-bottom:4px">${p.label}</div><div class="metric-sm" style="color:${p.color}">${p.value}</div><div class="muted small" style="margin-top:4px;font-size:11px">${p.sub}</div>${p.bar!==null?`<div style="margin-top:8px;height:3px;border-radius:3px;background:rgba(255,255,255,.07)"><div style="width:${p.bar}%;height:100%;border-radius:3px;background:${p.color};opacity:.7"></div></div>`:""}</div>`).join("");
  const trendCard=readinessTrend.length>=2?`<div class="card section"><div class="space"><div class="title-md">Readiness Trend</div><span class="muted small">14 days</span></div>${sparkline(trendVals)}<div class="row" style="justify-content:space-between;margin-top:10px;flex-wrap:wrap;gap:6px"><span class="stat-chip" style="font-size:11px">Low ${Math.min(...trendVals)}</span><span class="stat-chip" style="font-size:11px">High ${Math.max(...trendVals)}</span><span class="stat-chip" style="font-size:11px">Avg ${avg}</span><span class="stat-chip" style="font-size:11px">${trendVals.length} logs</span></div></div>`:`<div class="card section" style="opacity:.6;text-align:center;padding:24px 16px"><div style="font-size:32px;margin-bottom:8px">📈</div><div class="title-md">No Trend Yet</div><div class="muted" style="font-size:13px;margin-top:6px">Log readiness on 2+ days to see your trend chart.</div></div>`;
  const history=completed.length?completed.slice(0,8).map(w=>{const date=new Date(w.scheduled_date).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});const ex=w.exercises?.length??0;const c={power:"#fbbf24",recovery:"#34d399",build:"#53b5ff"}[w.day_type]??"var(--muted)";return`<div class="item space"><div><div style="font-weight:600;font-size:14px">${w.title}</div><div class="muted small">${date} · ${ex} exercise${ex!==1?"s":""}</div></div><span class="pill" style="font-size:11px;color:${c};border-color:${c}33">${w.day_type??"session"}</span></div>`;}).join(""):`<div>${EMPTY_STATES.noHistory()}</div>`;
  const prItems=prs.length?prs.slice(0,10).map(pr=>`<div class="item space"><div><div style="font-weight:600">${pr.exercise_id.replace(/_/g," ")}</div><div class="muted small">${pr.label}</div></div><div style="text-align:right"><div style="font-weight:700;color:#34d399">${pr.value} ${pr.unit??""}</div><div class="muted small">${pr.set_at}</div></div></div>`).join(""):`<div>${EMPTY_STATES.noPRs()}</div>`;
  return`<div class="screen"><div class="topbar"><div><div class="muted">Progress</div><div class="title-xl">Depth Over Noise</div></div><div class="row" style="gap:6px"><button class="secondary sm" data-action="export-csv-readiness">📊 CSV</button><button class="secondary sm" data-action="export-csv-sessions">🏋️ CSV</button><button class="secondary sm" data-action="export-pdf">📄 PDF</button></div></div><div class="grid three section">${pillarCards}</div>${microcycleTemplatesCard(state.profile)}${readinessSummaryCard(readinessTrend,avg)}${trendCard}<div class="card section"><div class="space" style="margin-bottom:12px"><div class="title-md">Session History</div><span class="muted small">${completed.length} sessions</span></div><div class="list">${history}</div></div><div class="card section"><div class="space" style="margin-bottom:12px"><div class="title-md">Personal Records</div><div class="row" style="gap:6px"><span class="muted small">${prs.length} recorded</span><button class="secondary sm" data-action="export-prs-csv" style="font-size:10px">⬇ CSV</button></div></div><div class="list">${prItems}</div></div></div>`;
}

  return`<div class="screen">

      <div class="card" style="text-align:center"><div class="metric-sm" style="color:#53b5ff">${state.prs?.length??0}</div><div class="muted small">PRs</div></div>

// COACH WORKOUT BUILDER
// ─────────────────────────────────────────────────────────────────────────────
const PATTERNS = ['power','strength_lower','hinge','speed','core'];
const PATTERN_LABELS = {power:'⚡ Power',strength_lower:'🏋️ Strength',hinge:'🔄 Hinge',speed:'💨 Speed',core:'🎯 Core'};
const DAY_TYPES = ['power','build','recovery','speed','conditioning'];

function getBuilderDraft(){
  return STATE.ui.builderDraft || {
    title:'',sport:'basketball',day_type:'power',notes:'',recovery_cue:'',
    exercises:[],assignTo:[],assignDate:todayStr(),saveAsTemplate:false,templateName:''
  };
}

function builderView(state){
  if(!isCoach())return'';
  const draft=getBuilderDraft();
  const SPORTS=['basketball','football','soccer','baseball','volleyball','track'];
  const team=state.team;

  // Step indicators
  const steps=['Build','Configure','Assign'];
  const stepDots=steps.map((s,i)=>{
    const active=state.ui.builderStep===i+1;
    const done=state.ui.builderStep>i+1;
    return `<div style="display:flex;align-items:center;gap:6px">
      <div style="width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:800;background:${done?'#34d399':active?'var(--accent)':'rgba(255,255,255,.08)'};color:${done||active?'#05111e':'var(--muted)'}">${done?'✓':i+1}</div>
      <span style="font-size:12px;font-weight:600;color:${active?'var(--text)':'var(--muted)'}">${s}</span>
    </div>`;
  }).join('<div style="flex:1;height:1px;background:var(--line);margin:0 4px"></div>');

  if(state.ui.builderStep===1) return builderStep1(draft,stepDots,SPORTS);
  if(state.ui.builderStep===2) return builderStep2(draft,stepDots);
  if(state.ui.builderStep===3) return builderStep3(draft,stepDots,state);
  return '';
}

function builderStep1(draft,stepDots,SPORTS){
  const libBySport=EXERCISES.filter(x=>x.sport===draft.sport);
  const byPattern={};
  PATTERNS.forEach(p=>{byPattern[p]=libBySport.filter(x=>x.pattern===p);});
  const selectedIds=(draft.exercises||[]).map(e=>e.id);

  const patternSections=PATTERNS.map(p=>{
    if(!byPattern[p].length)return'';
    const items=byPattern[p].map(ex=>{
      const sel=selectedIds.includes(ex.id);
      return `<div class="ex-picker-item${sel?' selected':''}" data-pick-ex="${ex.id}">
        <div style="font-weight:700;font-size:13px">${ex.title}</div>
        <div class="muted" style="font-size:11px;margin-top:2px">${ex.equipment}</div>
        ${sel?'<div style="font-size:10px;color:var(--accent);margin-top:4px;font-weight:700">✓ Added</div>':''}
      </div>`;
    }).join('');
    return `<div class="section">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:8px">${PATTERN_LABELS[p]}</div>
      <div class="ex-picker-grid">${items}</div>
    </div>`;
  }).join('');

  const selectedCards=(draft.exercises||[]).map((ex,idx)=>{
    const meta=getExercise(ex.id);
    return `<div class="builder-exercise" draggable="true" data-drag-idx="${idx}">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="drag-handle">⠿</span>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:14px">${meta?.title||ex.id}</div>
          <div class="muted" style="font-size:12px">${PATTERN_LABELS[meta?.pattern]||meta?.pattern} · ${meta?.equipment}</div>
        </div>
        <button class="secondary sm" data-remove-ex="${idx}" style="flex-shrink:0;color:var(--red);border-color:rgba(248,113,113,.25)">✕</button>
      </div>
    </div>`;
  }).join('');

  return `<div class="screen">
    <div class="topbar"><div><div class="muted">Builder</div><div class="title-xl">New Workout</div></div></div>
    <div class="row section" style="gap:8px">${stepDots}</div>

    <div class="card section">
      <div class="title-md" style="margin-bottom:12px">Workout Details</div>
      <div class="list" style="gap:10px">
        <label class="input-row"><span style="font-weight:500;min-width:80px">Title</span><input id="b-title" type="text" value="${draft.title||''}" placeholder="e.g. Monday Power Block" style="text-align:right;border:none;background:transparent;padding:4px 0"/></label>
        <label class="input-row"><span style="font-weight:500;min-width:80px">Sport</span><select id="b-sport" class="select-input">${['basketball','football','soccer','baseball','volleyball','track'].map(s=>`<option value="${s}"${draft.sport===s?' selected':''}>${s[0].toUpperCase()+s.slice(1)}</option>`).join('')}</select></label>
        <label class="input-row"><span style="font-weight:500;min-width:80px">Type</span><select id="b-daytype" class="select-input">${DAY_TYPES.map(t=>`<option value="${t}"${draft.day_type===t?' selected':''}>${t[0].toUpperCase()+t.slice(1)}</option>`).join('')}</select></label>
        <label class="input-row"><span style="font-weight:500;min-width:80px">Notes</span><input id="b-notes" type="text" value="${draft.notes||''}" placeholder="Session focus…" style="text-align:right;border:none;background:transparent;padding:4px 0"/></label>
        <label class="input-row"><span style="font-weight:500;min-width:80px">Cue</span><input id="b-cue" type="text" value="${draft.recovery_cue||''}" placeholder="Recovery intent…" style="text-align:right;border:none;background:transparent;padding:4px 0"/></label>
      </div>
    </div>

    ${selectedIds.length?
      `<div class="card section">
        <div class="space" style="margin-bottom:10px">
          <div class="title-md">Selected Exercises</div>
          <span class="muted small">${selectedIds.length} added · drag to reorder</span>
        </div>
        ${selectedCards}
      </div>`:''}

    <div class="card section">
      <div class="space" style="margin-bottom:12px">
        <div class="title-md">Exercise Library</div>
        <select id="b-sport-filter" class="select-input" data-action="builder-filter-sport">
          ${SPORTS.map(s=>`<option value="${s}"${draft.sport===s?' selected':''}>${s[0].toUpperCase()+s.slice(1)}</option>`).join('')}
        </select>
      </div>
      ${patternSections}
    </div>

    <div style="height:80px"></div>
    <div style="position:fixed;bottom:calc(var(--nav-h) + max(env(safe-area-inset-bottom,8px),8px) + 10px);left:12px;right:12px;z-index:75">
      <button style="width:100%;border-radius:18px" data-action="builder-next-1" ${selectedIds.length?'':'disabled'}>Configure Sets & Reps →</button>
    </div>
  </div>`;
}

function builderStep2(draft,stepDots){
  const exCards=(draft.exercises||[]).map((ex,idx)=>{
    const meta=getExercise(ex.id);
    const sets=ex.sets||[{reps:'5',weight:'',rest:'60'}];
    const setRows=sets.map((s,si)=>`
      <div class="set-config-row">
        <div style="text-align:center">
          <div class="muted" style="font-size:10px;margin-bottom:3px">SET ${si+1}</div>

// ─────────────────────────────────────────────────────────────────────────────
// PWA ENGINE — Service Worker, Push, Offline, Install
// ─────────────────────────────────────────────────────────────────────────────
const PWA = {
  // ── Service Worker Registration ──────────────────────────────────────────
  async registerSW() {
    if (!('serviceWorker' in navigator)) return;
    try {
      const reg = await navigator.serviceWorker.register('./sw.js', { scope: './' });
      STATE.ui.swRegistered = true;
      console.log('[PIQ] SW registered:', reg.scope);
      // Listen for messages from SW (e.g. sync requested)
      navigator.serviceWorker.addEventListener('message', e => {
        if (e.data?.type === 'SYNC_REQUESTED') PWA.flushOfflineQueue();
      });
    } catch (e) {
      console.warn('[PIQ] SW registration failed:', e);
    }
  },

  // ── Push Notification Permission ─────────────────────────────────────────
  async requestNotifyPermission() {
    if (!('Notification' in window)) return 'unsupported';
    if (Notification.permission === 'granted') return 'granted';
    const result = await Notification.requestPermission();
    STATE.ui.notifyPermission = result;
    render();
    return result;
  },

  getNotifyPermission() {
    if (!('Notification' in window)) return 'unsupported';
    return Notification.permission;
  },

  // ── Show local notification (no server push needed) ──────────────────────
  isQuietHours() {
    const h = new Date().getHours();
    return h < 7 || h >= 22; // 10pm – 7am quiet
  },
  async notify(title, body, tag = 'piq', url = './') {
    if (this.isQuietHours() && !tag.includes('risk') && !tag.includes('complete')) return; // suppress non-urgent during quiet hours
    if (!('Notification' in window)) return;
    if (Notification.permission !== 'granted') return;
    try {
      const reg = await navigator.serviceWorker.ready;
      await reg.showNotification(title, {
        body, tag, icon: './icon-192.png', badge: './icon-192.png',
        vibrate: [200, 100, 200],
        data: { url }
      });
    } catch {
      // Fallback to basic Notification API
      try { new Notification(title, { body, tag, icon: './icon-192.png' }); } catch {}
    }
  },

  // ── Schedule daily readiness reminder ────────────────────────────────────
  scheduleDailyReminder() {
    if (Notification.permission !== 'granted') return;
    // Use localStorage to track last scheduled
    const key = 'piq_reminder_scheduled';
    const today = todayStr();
    if (lsGet(key) === today) return; // already scheduled today
    lsSet(key, today);
    // Schedule for 8am — calculate ms until then
    const now = new Date();
    const target = new Date(now);
    target.setHours(8, 0, 0, 0);
    if (target <= now) target.setDate(target.getDate() + 1); // tomorrow
    const ms = target - now;
    setTimeout(() => {
      // Only fire if no check-in today
      const todaysReadiness = solo.getTodaysReadiness();
      if (!todaysReadiness) {
        PWA.notify(
          'PerformanceIQ — Daily Check-in',
          'Log your readiness to get your training recommendation.',
          'piq-checkin', './'
        );
      }
    }, ms);
    console.log('[PIQ] Reminder scheduled in', Math.round(ms/60000), 'min');
  },

  // ── Notify: coach assigned workout ───────────────────────────────────────
  notifyWorkoutAssigned(workoutTitle, coachName = 'Your coach') {
    PWA.notify(
      'New Workout Assigned',
      coachName + ' assigned: ' + workoutTitle,
      'piq-workout', './'
    );
  },

  // ── Notify: session complete ──────────────────────────────────────────────
  notifySessionComplete(workoutTitle) {
    PWA.notify(
      'Session Complete 🎯',
      workoutTitle + ' — great work today.',
      'piq-complete', './'
    );
  },

  // ── Notify: high risk alert ───────────────────────────────────────────────
  notifyHighRisk(riskLevel) {
    if (riskLevel !== 'High') return;
    PWA.notify(
      'High Injury Risk Detected ⚠️',
      'Your readiness signals suggest reducing training intensity today.',
      'piq-risk', './'
    );
  },

  // ── Online/Offline detection ─────────────────────────────────────────────
  initNetworkDetection() {
    const update = () => {
      const wasOffline = !STATE.ui.isOnline;
      STATE.ui.isOnline = navigator.onLine;
      if (wasOffline && STATE.ui.isOnline) {
        // Just came back online — flush queue
        setToast('Back online — syncing...', 'success');
        PWA.flushOfflineQueue();
      }
      render();
    };
    window.addEventListener('online', update);
    window.addEventListener('offline', update);
    STATE.ui.isOnline = navigator.onLine;
  },

  // ── Offline queue flush ───────────────────────────────────────────────────
  async flushOfflineQueue() {
    if (isSolo() || !STATE.session) return;
    const queue = lsGet('piq_offline_queue', []);
    if (!queue.length) return;
    let flushed = 0, failed = 0;
    const remaining = [];
    for (const op of queue) {
      try {
        if (op.type === QUEUE_OPS.UPSERT_READINESS) await DB.upsertReadiness(op.data);
        else if (op.type === QUEUE_OPS.CREATE_WORKOUT) await DB.createWorkout(op.data);
        else if (op.type === QUEUE_OPS.UPDATE_WORKOUT) await DB.updateWorkout(op.data.id, op.data.updates);
        else if (op.type === QUEUE_OPS.UPSERT_PROFILE) await DB.upsertProfile(op.data);
        else if (op.type === QUEUE_OPS.ASSIGN_WORKOUT) await DB.assignWorkout(op.data);
        flushed++;
      } catch (e) {
        console.warn('[PIQ] Queue flush error:', op.type, e.message);
        failed++;
        remaining.push(op); // keep failed ops for retry
      }
    }
    lsSet('piq_offline_queue', remaining);
    STATE.ui.offlineQueue = remaining;
    if (flushed > 0) {
      setToast(flushed + ' change' + (flushed !== 1 ? 's' : '') + ' synced' + (failed ? ', ' + failed + ' pending' : '') + '.', 'success');
      await loadCloudData(STATE.session.user.id);
      render();
    }
  },

  // ── Background sync registration ─────────────────────────────────────────
  async registerSync() {
    try {
      const reg = await navigator.serviceWorker.ready;
      if ('sync' in reg) await reg.sync.register('piq-sync');
    } catch {}
  },

  // ── PWA Install prompt ────────────────────────────────────────────────────
  installPrompt: null,
  initInstallPrompt() {
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      PWA.installPrompt = e;
      render(); // show install banner
    });
    window.addEventListener('appinstalled', () => {
      PWA.installPrompt = null;
      setToast('PerformanceIQ installed! 🎉', 'success');
      render();
    });
  },
  async triggerInstall() {
    if (!PWA.installPrompt) return;
    PWA.installPrompt.prompt();
    const { outcome } = await PWA.installPrompt.userChoice;
    if (outcome === 'accepted') PWA.installPrompt = null;
    render();
  }
};

// ── Rest Timer ───────────────────────────────────────────────────────────────
const RestTimer = {
  interval: null,
  remaining: 0,
  total: 0,
  start(seconds) {
    this.stop();
    this.total = seconds;
    this.remaining = seconds;
    STATE.ui.restTimerActive = true;
    STATE.ui.restTimerRemaining = seconds;
    STATE.ui.restTimerTotal = seconds;
    render();
    this.interval = setInterval(() => {
      this.remaining--;
      STATE.ui.restTimerRemaining = this.remaining;
      if (this.remaining <= 0) {
        this.stop();
        PWA.notify('Rest Complete ⏱️', 'Time to go — next set is ready.', 'piq-timer');
        setToast('Rest complete. Next set!', 'success');
      }
      // Update timer display without full re-render
      const el = document.getElementById('rest-timer-val');
      const ring = document.getElementById('rest-timer-ring');
      if (el) el.textContent = this.remaining > 0 ? this.remaining : '✓';
      if (ring) {
        const pct = this.remaining / this.total;
        const circ = 2 * Math.PI * 18;
        ring.style.strokeDashoffset = circ * (1 - pct);
      }
      if (this.remaining <= 0) render();
    }, 1000);
  },
  stop() {
    if (this.interval) { clearInterval(this.interval); this.interval = null; }
    STATE.ui.restTimerActive = false;
    STATE.ui.restTimerRemaining = 0;
  },
  skip() { this.stop(); render(); }
};

function restTimerBar() {
  if (!STATE.ui.restTimerActive) return '';
  const r = STATE.ui.restTimerRemaining || 0;
  const total = STATE.ui.restTimerTotal || 60;
  const pct = Math.max(0, r / total);
  const circ = 2 * Math.PI * 18;
  const dash = circ * (1 - pct);
  const color = r > 10 ? '#53b5ff' : r > 5 ? '#fbbf24' : '#f87171';
  return `<div class="rest-timer-bar">
    <div class="timer-ring">
      <svg width="44" height="44" viewBox="0 0 44 44">
        <circle cx="22" cy="22" r="18" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="3"/>
        <circle id="rest-timer-ring" cx="22" cy="22" r="18" fill="none" stroke="${color}" stroke-width="3"
          stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${dash.toFixed(1)}"
          stroke-linecap="round" style="transition:stroke-dashoffset .9s linear,stroke .3s"/>
      </svg>
      <div class="timer-ring-val" id="rest-timer-val" style="color:${color}">${r}</div>
    </div>
    <div style="flex:1">
      <div style="font-weight:700;font-size:14px">Rest Timer</div>
      <div class="muted" style="font-size:12px">${r}s remaining · next set ready soon</div>
    </div>
    <button class="secondary sm" onclick="RestTimer.skip();render()">Skip</button>
  </div>`;
}

const HealthKit = {
  supported: typeof window !== 'undefined' && 'DeviceMotionEvent' in window,
  async requestAppleHealth() {
    // Apple Health via Web API (limited — HRV/sleep via HealthKit bridge on iOS PWA)
    // On iOS 16.4+ installed PWAs can request health permissions
    if (!window.webkit?.messageHandlers?.healthKit) {
      return { success: false, reason: 'Apple Health requires iOS 16.4+ with app installed to home screen.' };
    }
    try {
      window.webkit.messageHandlers.healthKit.postMessage({ action: 'requestPermissions', types: ['HRV','sleepAnalysis','activeEnergyBurned'] });
      return { success: true };
    } catch(e) { return { success: false, reason: e.message }; }
  },
  async requestGoogleFit() {
    // Google Fit via Web OAuth (requires app registration)
    // For now: guide user to manual entry with auto-fill
    return { success: false, reason: 'Google Fit integration requires OAuth setup. Use manual HRV entry for now.' };
  },
  // Pull from Web APIs available in browser
  async getBatteryLevel() {
    try {
      if ('getBattery' in navigator) {
        const b = await navigator.getBattery();
        return Math.round(b.level * 100);
      }
    } catch {}
    return null;
  }
};

// ── PR Detection ──────────────────────────────────────────────────────────────
function checkAndRecordPR(exerciseId, weight, reps, athleteId) {
  if (!weight || !reps) return false;
  const w = parseFloat(weight), r = parseInt(reps);
  if (isNaN(w) || isNaN(r) || w <= 0) return false;

  // Estimate 1RM using Epley formula
  const est1RM = r === 1 ? w : w * (1 + r / 30);

  const existing = STATE.prs.filter(p => p.exercise_id === exerciseId);
  const best = existing.reduce((max, p) => {
    const e = p.value || 0;
    return e > max ? e : max;
  }, 0);

  if (est1RM > best) {
    const pr = {
      exercise_id: exerciseId,
      value: Math.round(est1RM * 10) / 10,
      unit: 'lb',
      label: w + 'lb × ' + r,
      set_at: todayStr(),
      athlete_id: athleteId || 'solo',
    };
    // Save PR
    if (isSolo()) {
      const all = lsGet('piq_prs', []);
      all.unshift(pr);
      lsSet('piq_prs', all);
      STATE.prs = all;
    } else {
      DB.insertPR ? DB.insertPR(pr).catch(() => {}) : null;
    }
    return true; // New PR!
  }
  return false;
}

// ─────────────────────────────────────────────────────────────────────────────
// REALTIME ENGINE — Supabase Realtime + Polling Fallback
// ─────────────────────────────────────────────────────────────────────────────
const Realtime = {
  channels: {},
  pollInterval: null,
  POLL_MS: 30000, // 30s polling fallback

  // ── Start all subscriptions ───────────────────────────────────────────────
  async start(userId, teamId) {
    if (!STATE.session) return;
    this.stop(); // clean up any existing

    // Try Supabase Realtime first
    try {
      await this._subscribeReadiness(userId, teamId);
      await this._subscribeWorkouts(userId);
      if (isCoach() && teamId) await this._subscribeTeamReadiness(teamId);
      STATE.ui.realtimeConnected = true;
      console.log('[PIQ Realtime] Connected');
    } catch(e) {
      console.warn('[PIQ Realtime] WebSocket failed, falling back to polling:', e.message);
      STATE.ui.realtimeConnected = false;
    }

    // Always run polling as fallback/supplement
    this._startPolling(userId, teamId);
    STATE.ui.lastSyncTime = new Date();
    render();
  },

  stop() {
    Object.values(this.channels).forEach(ch => {
      try { sb.removeChannel(ch); } catch {}
    });
    this.channels = {};
    if (this.pollInterval) { clearInterval(this.pollInterval); this.pollInterval = null; }
    STATE.ui.realtimeConnected = false;
  },

  // ── Supabase Realtime: athlete's own readiness ────────────────────────────
  async _subscribeReadiness(userId) {
    const ch = sb.channel('readiness:'+userId)
      .on('postgres_changes', {
        event: '*', schema: 'public', table: 'readiness_logs',
        filter: 'athlete_id=eq.'+userId
      }, payload => {
        if (payload.new) {
          const prev = STATE.readiness?.score;
          STATE.readiness = payload.new;
          // Re-run trend
          DB.getReadinessTrend(userId, 14).then(t => {
            STATE.readinessTrend = t;
            refreshIntelReport();
          }).catch(() => {});
          // Visual flash if score changed
          if (prev && prev !== payload.new.score) {
            setTimeout(() => {
              const el = document.querySelector('.metric');
              if (el) el.classList.add('score-flash');
              setTimeout(() => el && el.classList.remove('score-flash'), 500);
            }, 50);
          }
          Realtime._addFeedItem('readiness', 'Readiness updated', 'Score: '+payload.new.score, 'self');
          STATE.ui.lastSyncTime = new Date();
          render();
        }
      })
      .subscribe();
    this.channels['readiness'] = ch;
  },

  // ── Supabase Realtime: athlete's workouts ─────────────────────────────────
  async _subscribeWorkouts(userId) {
    const ch = sb.channel('workouts:'+userId)
      .on('postgres_changes', {
        event: '*', schema: 'public', table: 'workouts',
        filter: 'athlete_id=eq.'+userId
      }, payload => {
        if (payload.new) {
          // New workout assigned by coach
          if (payload.eventType === 'INSERT' && payload.new.assigned_by) {
            Realtime._addFeedItem('workout', 'New workout assigned', payload.new.title, 'coach');
            PWA.notify('New Workout Assigned', payload.new.title + ' — tap to view.');
            // Reload today workout
            DB.getTodaysWorkout(userId).then(w => { STATE.workout = w; render(); }).catch(() => {});
          }
          STATE.ui.lastSyncTime = new Date();
          render();
        }
      })
      .subscribe();
    this.channels['workouts'] = ch;
  },

  // ── Supabase Realtime: team readiness (coach) ─────────────────────────────
  async _subscribeTeamReadiness(teamId) {
    const ch = sb.channel('team_readiness:'+teamId)
      .on('postgres_changes', {
        event: '*', schema: 'public', table: 'readiness_logs'
      }, payload => {
        if (!payload.new) return;
        const athleteId = payload.new.athlete_id;
        const score = payload.new.score;

        // Update teamReadiness array
        const idx = STATE.teamReadiness.findIndex(r => r.athlete_id === athleteId);
        if (idx >= 0) STATE.teamReadiness[idx] = { ...STATE.teamReadiness[idx], ...payload.new };
        else STATE.teamReadiness.push(payload.new);

        // Mark as recently updated for visual pulse
        STATE.ui.recentlyUpdatedAthletes[athleteId] = Date.now();
        setTimeout(() => {
          delete STATE.ui.recentlyUpdatedAthletes[athleteId];
          render();
        }, 3000);

        const name = STATE.teamReadiness[idx]?.profiles?.name || 'Athlete';
        Realtime._addFeedItem('readiness', name + ' checked in', 'Score: '+score, score < 65 ? 'warning' : 'info');
        STATE.ui.lastSyncTime = new Date();
        render();
      })
      .subscribe();
    this.channels['team_readiness'] = ch;
  },

  // ── Polling fallback ──────────────────────────────────────────────────────
  _startPolling(userId, teamId) {
    this.pollInterval = setInterval(async () => {
      if (!STATE.session || !STATE.ui.isOnline) return;
      try {
        // Poll latest readiness
        const r = await DB.getTodaysReadiness(userId);
        if (r && r.score !== STATE.readiness?.score) {
          STATE.readiness = r;
          refreshIntelReport();
          render();
        }
        // Poll today workout
        const w = await DB.getTodaysWorkout(userId);
        if (w && w.id !== STATE.workout?.id) {
          STATE.workout = w;
          render();
        }
        // Coach: poll team readiness
        if (isCoach() && teamId) {
          const tr = await DB.getTeamReadiness(teamId);
          if (tr) { STATE.teamReadiness = tr; render(); }
        }
        STATE.ui.lastSyncTime = new Date();
      } catch(e) {
        console.warn('[PIQ Poll] Error:', e.message);
      }
    }, Realtime.POLL_MS);
  },

  // ── Activity Feed ─────────────────────────────────────────────────────────
  _addFeedItem(type, title, detail, source) {
    const item = { id: Date.now(), type, title, detail, source, time: new Date() };
    STATE.ui.activityFeed = [item, ...(STATE.ui.activityFeed || [])].slice(0, 20);
    STATE.ui.newFeedCount = (STATE.ui.newFeedCount || 0) + 1;
  },

  clearFeedBadge() {
    STATE.ui.newFeedCount = 0;
    render();
  }
};

function athleteScoreRing(score) {
