<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f1827">
  <meta name="description" content="PerformanceIQ — Elite training analytics for coaches, athletes, and programs.">
  <title>PerformanceIQ</title>

  <!--
    BASE TAG — critical for GitHub Pages subdirectory hosting.
    Sets the base URL so ALL relative paths (CSS, JS, assets) resolve
    from /performanceiq-platform/ not from the domain root.
    Update this if the repo name ever changes.
  -->
  <base href="/performanceiq-platform/">

  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="favicon.ico">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Logo inlined to keep it out of JS module parse chain -->
  <img id="piq-logo-data" src="" alt="" style="display:none" aria-hidden="true">

  <!-- Boot loader shown while JS initialises -->
  <div id="piq-loader">
    <div class="loader-inner">
      <div class="loader-logo">
        <span style="font-family:'Oswald',sans-serif;font-size:32px;font-weight:700;color:#22c955;letter-spacing:4px">PIQ</span>
      </div>
      <div class="loader-bar-track">
        <div class="loader-bar" id="splash-bar"></div>
      </div>
      <div class="loader-label" id="splash-label">Loading…</div>
    </div>
  </div>

  <!-- App root — app.js builds the shell here -->
  <div id="piq-root"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
