<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PerformanceIQ — Elite Training. Smart Results.</title>
  <meta name="description" content="PerformanceIQ turns daily wellness data into a readiness score, personalised workout, and injury-risk flag — in under 60 seconds." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Barlow+Condensed:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/nav-bar.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/onboarding.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>

  <!-- Boot loader — visible while JS modules initialise -->
  <div id="piq-loader">
    <div class="loader-inner">
      <div class="loader-logo">
        <svg width="48" height="48" viewBox="0 0 40 40" fill="none" aria-hidden="true">
          <defs>
            <linearGradient id="lg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#103050"/>
              <stop offset="100%" stop-color="#204060"/>
            </linearGradient>
          </defs>
          <path d="M5 32 L9 10 L28 6 L36 20 L21 26 L13 34 Z" fill="url(#lg)" stroke="rgba(111,217,79,0.25)" stroke-width="1"/>
          <path d="M9 28 L12 14 L25 11 L31 21 L20 25 Z" fill="rgba(255,255,255,0.04)"/>
          <path d="M28 6 L36 20 L29 17 Z" fill="#6FD94F"/>
          <line x1="13" y1="20" x2="22" y2="18" stroke="rgba(111,217,79,0.3)" stroke-width="1" stroke-linecap="round"/>
          <line x1="12" y1="24" x2="19" y2="22" stroke="rgba(111,217,79,0.18)" stroke-width="0.8" stroke-linecap="round"/>
          <circle cx="15" cy="24" r="1.5" fill="rgba(111,217,79,0.45)"/>
        </svg>
        <div class="splash-tagline">Elite Training. Smart Results.</div>
      </div>
      <div class="loader-bar-track">
        <div class="loader-bar" id="splash-bar"></div>
      </div>
      <div class="loader-label" id="splash-label">Loading…</div>
    </div>
  </div>

  <!-- App root — app.js injects the full shell HTML here -->
  <div id="piq-root"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
