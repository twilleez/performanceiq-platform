<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PerformanceIQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
/* ============================================
   PerformanceIQ — Design System
   Dark athletic theme, Barlow Condensed display
   ============================================ */

:root {
  /* Core palette */
  --bg-base: #0a0b0f;
  --bg-surface: #111318;
  --bg-card: #161920;
  --bg-elevated: #1c2028;
  --bg-hover: #222630;

  /* Borders */
  --border-subtle: rgba(255,255,255,0.06);
  --border-default: rgba(255,255,255,0.10);
  --border-strong: rgba(255,255,255,0.18);

  /* Brand accent */
  --accent: #00e5a0;
  --accent-dim: rgba(0,229,160,0.12);
  --accent-mid: rgba(0,229,160,0.3);

  /* Status colors */
  --green: #00e5a0;
  --yellow: #f5c518;
  --orange: #ff7a35;
  --red: #ff3b3b;
  --blue: #4da6ff;

  /* Text */
  --text-primary: #f0f2f5;
  --text-secondary: #8a9ab5;
  --text-muted: #4a5568;
  --text-accent: #00e5a0;

  /* Typography */
  --font-display: 'Barlow Condensed', sans-serif;
  --font-body: 'Barlow', sans-serif;

  /* Spacing */
  --sidebar-width: 220px;
  --topbar-height: 56px;
  --radius-sm: 6px;
  --radius: 10px;
  --radius-lg: 16px;
  --radius-xl: 24px;

  /* Shadows */
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
  --shadow: 0 4px 20px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.6);
  --glow-accent: 0 0 20px rgba(0,229,160,0.25);
}

/* Reset */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg-base);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

a { text-decoration: none; color: inherit; }
button { border: none; background: none; cursor: pointer; font: inherit; }
input, select, textarea { font: inherit; }
svg { display: block; }

/* ============================================
   SIDEBAR
   ============================================ */
#sidebar {
  width: var(--sidebar-width);
  min-height: 100vh;
  background: var(--bg-surface);
  border-right: 1px solid var(--border-subtle);
  display: flex;
  flex-direction: column;
  position: fixed;
  left: 0; top: 0; bottom: 0;
  z-index: 100;
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
}

.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 20px 20px 24px;
  border-bottom: 1px solid var(--border-subtle);
}
.logo-mark {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 22px;
  color: var(--accent);
  letter-spacing: -1px;
  line-height: 1;
}
.logo-text {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 14px;
  color: var(--text-secondary);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.nav-links {
  flex: 1;
  padding: 12px 10px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-size: 14px;
  font-weight: 500;
  transition: all 0.15s ease;
  position: relative;
}
.nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
.nav-item:hover {
  color: var(--text-primary);
  background: var(--bg-hover);
}
.nav-item.active {
  color: var(--accent);
  background: var(--accent-dim);
}
.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 20%; bottom: 20%;
  width: 3px;
  background: var(--accent);
  border-radius: 0 2px 2px 0;
}

/* Hide coach-only items in athlete mode */
body[data-role="athlete"] [data-coach-only] { display: none; }
body[data-role="coach"] [data-coach-only] { display: flex; }

.sidebar-footer {
  padding: 16px 12px;
  border-top: 1px solid var(--border-subtle);
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.role-switcher {
  display: flex;
  background: var(--bg-card);
  border-radius: var(--radius-sm);
  padding: 3px;
  gap: 2px;
}
.role-btn {
  flex: 1;
  padding: 6px 8px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 600;
  font-family: var(--font-display);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  transition: all 0.15s ease;
}
.role-btn.active {
  background: var(--accent);
  color: #000;
}

.user-profile {
  display: flex;
  align-items: center;
  gap: 10px;
}
.avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #0099cc);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 13px;
  color: #000;
  flex-shrink: 0;
}
.user-name {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
}
.user-role {
  display: block;
  font-size: 11px;
  color: var(--text-muted);
}

/* ============================================
   TOPBAR (mobile)
   ============================================ */
#topbar {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--topbar-height);
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border-subtle);
  z-index: 99;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
}
#menu-toggle {
  color: var(--text-secondary);
  padding: 4px;
}
#menu-toggle svg { width: 22px; height: 22px; }
.topbar-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 18px;
  color: var(--accent);
  flex: 1;
}
#topbar-piq-score {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 22px;
  color: var(--accent);
}

/* ============================================
   MAIN CONTENT
   ============================================ */
#main-content {
  margin-left: var(--sidebar-width);
  flex: 1;
  min-height: 100vh;
  background: var(--bg-base);
}
#view-container {
  padding: 32px;
  max-width: 1280px;
  animation: fadeIn 0.25s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

#nav-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 99;
}

/* ============================================
   TYPOGRAPHY SYSTEM
   ============================================ */
.page-header {
  margin-bottom: 28px;
}
.page-title {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 36px;
  line-height: 1;
  color: var(--text-primary);
  letter-spacing: -0.5px;
  text-transform: uppercase;
}
.page-subtitle {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 6px;
}

.section-label {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 12px;
}

/* ============================================
   CARD SYSTEM
   ============================================ */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 20px;
}
.card-sm { padding: 16px; border-radius: var(--radius); }
.card-xl { padding: 28px; border-radius: var(--radius-xl); }

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.card-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-secondary);
}

/* ============================================
   GRID HELPERS
   ============================================ */
.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.grid-auto { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }

/* ============================================
   PIQ RING (hero element)
   ============================================ */
.piq-ring-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
}
.piq-ring-svg {
  transform: rotate(-90deg);
  filter: drop-shadow(0 0 12px rgba(0,229,160,0.4));
}
.piq-ring-track { fill: none; stroke: var(--bg-elevated); }
.piq-ring-fill {
  fill: none;
  stroke: var(--accent);
  stroke-linecap: round;
  transition: stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1);
}
.piq-ring-inner {
  position: absolute;
  text-align: center;
  pointer-events: none;
}
.piq-score-number {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 52px;
  line-height: 1;
  color: var(--text-primary);
  letter-spacing: -2px;
}
.piq-score-label {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-top: 2px;
}

/* ============================================
   READINESS BANNER
   ============================================ */
.readiness-banner {
  border-radius: var(--radius);
  padding: 14px 18px;
  display: flex;
  align-items: flex-start;
  gap: 14px;
  border-left: 4px solid;
}
.readiness-banner.green { background: rgba(0,229,160,0.08); border-color: var(--green); }
.readiness-banner.yellow { background: rgba(245,197,24,0.08); border-color: var(--yellow); }
.readiness-banner.orange { background: rgba(255,122,53,0.08); border-color: var(--orange); }
.readiness-banner.red { background: rgba(255,59,59,0.08); border-color: var(--red); }

.readiness-banner .banner-icon {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.readiness-banner.green .banner-icon { background: rgba(0,229,160,0.2); }
.readiness-banner.yellow .banner-icon { background: rgba(245,197,24,0.2); }
.readiness-banner.orange .banner-icon { background: rgba(255,122,53,0.2); }
.readiness-banner.red .banner-icon { background: rgba(255,59,59,0.2); }

.banner-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 16px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.banner-why {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 3px;
  line-height: 1.5;
}

/* ============================================
   STAT CELLS
   ============================================ */
.stat-cell {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.stat-value {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 32px;
  line-height: 1;
  color: var(--text-primary);
  letter-spacing: -1px;
}
.stat-value.sm {
  font-size: 22px;
}
.stat-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
}
.stat-delta {
  font-size: 12px;
  font-weight: 500;
}
.stat-delta.up { color: var(--green); }
.stat-delta.down { color: var(--red); }
.stat-delta.neutral { color: var(--text-muted); }

/* ============================================
   WELLNESS SLIDERS & INPUTS
   ============================================ */
.wellness-item {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.wellness-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.wellness-label { font-size: 13px; font-weight: 500; color: var(--text-secondary); }
.wellness-val {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 18px;
  color: var(--text-primary);
  min-width: 24px;
  text-align: right;
}

input[type="range"] {
  width: 100%;
  height: 4px;
  appearance: none;
  background: var(--bg-elevated);
  border-radius: 2px;
  outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  appearance: none;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  box-shadow: 0 0 8px rgba(0,229,160,0.4);
}

/* ============================================
   EXERCISE CARDS
   ============================================ */
.exercise-card {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  padding: 16px;
  display: flex;
  align-items: flex-start;
  gap: 14px;
  transition: border-color 0.15s ease;
}
.exercise-card:hover { border-color: var(--border-default); }
.exercise-card.completed { opacity: 0.5; }
.exercise-card.completed .ex-name { text-decoration: line-through; }

.ex-index {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 28px;
  line-height: 1;
  color: var(--text-muted);
  min-width: 36px;
  letter-spacing: -1px;
}
.ex-content { flex: 1; }
.ex-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 4px;
}
.ex-meta {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.ex-sets {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.ex-set-badge {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 13px;
  padding: 3px 10px;
  background: var(--bg-elevated);
  border-radius: 20px;
  color: var(--text-secondary);
  letter-spacing: 0.03em;
}
.ex-tag {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 3px;
  background: var(--bg-elevated);
  color: var(--text-muted);
  margin-right: 4px;
}
.ex-tag.power { background: rgba(255,122,53,0.15); color: var(--orange); }
.ex-tag.strength { background: rgba(77,166,255,0.15); color: var(--blue); }
.ex-tag.speed { background: rgba(245,197,24,0.15); color: var(--yellow); }
.ex-tag.recovery { background: rgba(0,229,160,0.15); color: var(--green); }

.ex-actions {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.btn-swap, .btn-complete {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.05em;
  padding: 5px 10px;
  border-radius: 4px;
  transition: all 0.15s ease;
}
.btn-swap {
  color: var(--text-muted);
  background: var(--bg-elevated);
}
.btn-swap:hover { color: var(--accent); background: var(--accent-dim); }
.btn-complete {
  color: var(--accent);
  background: var(--accent-dim);
}
.btn-complete:hover { background: var(--accent-mid); }
.btn-complete.done { background: var(--accent); color: #000; }

/* ============================================
   TRAFFIC LIGHT (Team Readiness)
   ============================================ */
.traffic-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  display: inline-block;
  flex-shrink: 0;
}
.traffic-dot.green { background: var(--green); box-shadow: 0 0 6px rgba(0,229,160,0.6); }
.traffic-dot.yellow { background: var(--yellow); box-shadow: 0 0 6px rgba(245,197,24,0.6); }
.traffic-dot.orange { background: var(--orange); box-shadow: 0 0 6px rgba(255,122,53,0.6); }
.traffic-dot.red { background: var(--red); box-shadow: 0 0 6px rgba(255,59,59,0.6); }

.athlete-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  transition: background 0.15s ease;
}
.athlete-row:hover { background: var(--bg-hover); }
.athlete-row .av { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 700; font-size: 12px; color: #000; flex-shrink: 0; }
.athlete-row .ar-name { flex: 1; font-size: 14px; font-weight: 500; }
.athlete-row .ar-score { font-family: var(--font-display); font-weight: 900; font-size: 20px; letter-spacing: -0.5px; }
.athlete-row .ar-why { font-size: 11px; color: var(--text-muted); flex: 1; }

/* ============================================
   PHASE BADGE
   ============================================ */
.phase-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  border-radius: 20px;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.phase-badge.offseason { background: rgba(77,166,255,0.12); color: var(--blue); border: 1px solid rgba(77,166,255,0.25); }
.phase-badge.preseason { background: rgba(245,197,24,0.12); color: var(--yellow); border: 1px solid rgba(245,197,24,0.25); }
.phase-badge.inseason { background: rgba(0,229,160,0.12); color: var(--green); border: 1px solid rgba(0,229,160,0.25); }
.phase-badge.postseason { background: rgba(255,122,53,0.12); color: var(--orange); border: 1px solid rgba(255,122,53,0.25); }

/* ============================================
   DEVELOPMENT STAGE BADGE
   ============================================ */
.dev-stage {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  border-radius: 20px;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: var(--bg-elevated);
  color: var(--text-secondary);
  border: 1px solid var(--border-default);
}

/* ============================================
   PIQ SCORE HISTORY CHART
   ============================================ */
.sparkline-container {
  width: 100%;
  height: 60px;
  position: relative;
}
.sparkline-svg { width: 100%; height: 100%; }

/* ============================================
   PROGRESS BARS
   ============================================ */
.progress-bar-wrap {
  width: 100%;
  height: 6px;
  background: var(--bg-elevated);
  border-radius: 3px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
}
.progress-bar-fill.accent { background: var(--accent); }
.progress-bar-fill.blue { background: var(--blue); }
.progress-bar-fill.yellow { background: var(--yellow); }
.progress-bar-fill.orange { background: var(--orange); }
.progress-bar-fill.red { background: var(--red); }

/* ============================================
   BUTTONS
   ============================================ */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  font-weight: 600;
  font-size: 14px;
  transition: all 0.15s ease;
  letter-spacing: 0.02em;
}
.btn-primary {
  background: var(--accent);
  color: #000;
  font-weight: 700;
}
.btn-primary:hover { background: #00ffb3; box-shadow: var(--glow-accent); }
.btn-secondary {
  background: var(--bg-elevated);
  color: var(--text-secondary);
  border: 1px solid var(--border-default);
}
.btn-secondary:hover { color: var(--text-primary); border-color: var(--border-strong); }
.btn-ghost {
  color: var(--accent);
  background: var(--accent-dim);
}
.btn-ghost:hover { background: var(--accent-mid); }

.btn-sm { padding: 7px 14px; font-size: 12px; }
.btn-lg { padding: 14px 28px; font-size: 16px; }

/* ============================================
   ACWR LOAD INDICATOR
   ============================================ */
.acwr-gauge {
  display: flex;
  align-items: center;
  gap: 10px;
}
.acwr-value {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 28px;
  letter-spacing: -1px;
}
.acwr-value.optimal { color: var(--green); }
.acwr-value.high { color: var(--orange); }
.acwr-value.danger { color: var(--red); }
.acwr-value.low { color: var(--blue); }
.acwr-label { font-size: 12px; color: var(--text-muted); }

/* ============================================
   TABS
   ============================================ */
.tab-bar {
  display: flex;
  gap: 4px;
  background: var(--bg-surface);
  padding: 4px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-subtle);
  width: fit-content;
  margin-bottom: 20px;
}
.tab-btn {
  padding: 7px 16px;
  border-radius: 4px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  transition: all 0.15s ease;
  font-family: var(--font-display);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-size: 12px;
}
.tab-btn.active {
  background: var(--bg-elevated);
  color: var(--text-primary);
}
.tab-btn:hover:not(.active) { color: var(--text-secondary); }

/* ============================================
   FORM ELEMENTS
   ============================================ */
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
.form-input, .form-select {
  background: var(--bg-elevated);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: 14px;
  color: var(--text-primary);
  outline: none;
  transition: border-color 0.15s ease;
  width: 100%;
}
.form-input:focus, .form-select:focus {
  border-color: var(--accent);
}
.form-select { appearance: none; cursor: pointer; }
.form-select option { background: var(--bg-elevated); }

/* ============================================
   ALERT / NOTICE
   ============================================ */
.alert {
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  border-left: 3px solid;
  line-height: 1.5;
}
.alert-info { background: rgba(77,166,255,0.08); border-color: var(--blue); color: var(--text-secondary); }
.alert-warning { background: rgba(245,197,24,0.08); border-color: var(--yellow); color: var(--text-secondary); }
.alert-danger { background: rgba(255,59,59,0.08); border-color: var(--red); color: var(--text-secondary); }
.alert-success { background: rgba(0,229,160,0.08); border-color: var(--green); color: var(--text-secondary); }

/* ============================================
   DIVIDERS
   ============================================ */
.divider { height: 1px; background: var(--border-subtle); margin: 20px 0; }

/* ============================================
   RESPONSIVE
   ============================================ */
@media (max-width: 900px) {
  #sidebar {
    transform: translateX(-100%);
  }
  #sidebar.open {
    transform: translateX(0);
    box-shadow: var(--shadow-lg);
  }
  #topbar { display: flex; }
  #main-content { margin-left: 0; padding-top: var(--topbar-height); }
  #view-container { padding: 20px 16px; }
  #nav-overlay.active { display: block; }
  .grid-4 { grid-template-columns: repeat(2, 1fr); }
  .grid-3 { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 600px) {
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  .page-title { font-size: 28px; }
  .piq-score-number { font-size: 40px; }
}

/* ============================================
   LOADING SKELETON
   ============================================ */
.skeleton {
  background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-elevated) 50%, var(--bg-card) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: var(--radius-sm);
}
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ============================================
   COACH OS SPECIFIC
   ============================================ */
.readiness-summary-bar {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 16px;
}
.rs-block {
  flex: 1;
  height: 8px;
  border-radius: 4px;
  transition: all 0.3s ease;
}
.rs-block.green { background: var(--green); }
.rs-block.yellow { background: var(--yellow); }
.rs-block.orange { background: var(--orange); }
.rs-block.red { background: var(--red); }

.team-alert {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 12px 14px;
  background: var(--bg-elevated);
  border-radius: var(--radius-sm);
  border-left: 3px solid var(--orange);
}
.team-alert-icon { color: var(--orange); font-size: 16px; flex-shrink: 0; }
.team-alert-msg { font-size: 13px; color: var(--text-secondary); line-height: 1.4; }
.team-alert-msg strong { color: var(--text-primary); font-weight: 600; }

/* ============================================
   SCROLLBAR
   ============================================ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg-elevated); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

/* ============================================
   SWAP MODAL
   ============================================ */
.swap-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.swap-modal-content {
  background: var(--bg-card);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-xl);
  padding: 28px;
  max-width: 480px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  animation: fadeIn 0.2s ease;
}

</style>

// js/engine/readinessEngine.js
// Readiness scoring with full explainability layer — the #1 trust driver

/**
 * Compute readiness score from wellness inputs.
 * Returns score (0-100) + human-readable why + recommendation.
 */
function computeReadiness(wellness) {
  const { sleep_hours, soreness, stress, energy, mood } = wellness;

  // ── Component scores ──
  const sleepScore   = calcSleepScore(sleep_hours);
  const sorenessScore = calcSorenessScore(soreness);
  const stressScore  = calcStressScore(stress);
  const energyScore  = calcEnergyScore(energy);
  const moodScore    = calcMoodScore(mood);

  // Weighted composite (out of 100)
  const rawScore =
    sleepScore   * 0.30 +
    sorenessScore * 0.25 +
    stressScore  * 0.20 +
    energyScore  * 0.15 +
    moodScore    * 0.10;

  const score = Math.round(Math.min(100, Math.max(0, rawScore)));

  // ── Identify what drove the score ──
  const factors = buildFactors({ sleep_hours, soreness, stress, energy, mood, sleepScore, sorenessScore, stressScore, energyScore, moodScore });
  const { recommendation, intensity_mod } = getRecommendation(score, factors);
  const why = buildWhyCopy(score, factors, sleep_hours, soreness, stress, energy);

  return {
    score,
    components: { sleepScore, sorenessScore, stressScore, energyScore, moodScore },
    factors,
    why,
    recommendation,
    intensity_mod,  // multiplier for session load (0.5–1.0)
  };
}

// ── Sub-scorers ──

function calcSleepScore(hours) {
  if (hours >= 9.0) return 100;
  if (hours >= 8.0) return 95;
  if (hours >= 7.5) return 85;
  if (hours >= 7.0) return 75;
  if (hours >= 6.5) return 60;
  if (hours >= 6.0) return 45;
  if (hours >= 5.5) return 30;
  return 15;
}

function calcSorenessScore(soreness) {
  // Inverted — high soreness = low score
  return Math.max(0, 100 - (soreness - 1) * 12);
}

function calcStressScore(stress) {
  // Inverted
  return Math.max(0, 100 - (stress - 1) * 11);
}

function calcEnergyScore(energy) {
  return Math.round((energy / 10) * 100);
}

function calcMoodScore(mood) {
  return Math.round((mood / 10) * 100);
}

// ── Factor identification ──

function buildFactors({ sleep_hours, soreness, stress, energy, mood, sleepScore, sorenessScore, stressScore, energyScore, moodScore }) {
  const factors = [];

  if (sleepScore >= 85)     factors.push({ key: 'sleep', valence: 'positive', text: `strong sleep (${sleep_hours}h)` });
  else if (sleepScore >= 60) factors.push({ key: 'sleep', valence: 'neutral',  text: `adequate sleep (${sleep_hours}h)` });
  else                       factors.push({ key: 'sleep', valence: 'negative', text: `limited sleep (${sleep_hours}h)` });

  if (sorenessScore >= 75)  factors.push({ key: 'soreness', valence: 'positive', text: 'muscles feel fresh' });
  else if (sorenessScore >= 50) factors.push({ key: 'soreness', valence: 'neutral', text: `moderate soreness (${soreness}/10)` });
  else                       factors.push({ key: 'soreness', valence: 'negative', text: `elevated soreness (${soreness}/10)` });

  if (stressScore >= 75)    factors.push({ key: 'stress', valence: 'positive', text: 'stress levels are low' });
  else if (stressScore >= 50) factors.push({ key: 'stress', valence: 'neutral', text: `moderate stress (${stress}/10)` });
  else                       factors.push({ key: 'stress', valence: 'negative', text: `high stress load (${stress}/10)` });

  if (energyScore >= 70)    factors.push({ key: 'energy', valence: 'positive', text: `energy is high (${energy}/10)` });
  else if (energyScore >= 50) factors.push({ key: 'energy', valence: 'neutral', text: `moderate energy (${energy}/10)` });
  else                       factors.push({ key: 'energy', valence: 'negative', text: `low energy (${energy}/10)` });

  return factors;
}

// ── Why copy generator ──

function buildWhyCopy(score, factors, sleep_hours, soreness, stress, energy) {
  const negatives = factors.filter(f => f.valence === 'negative');
  const positives = factors.filter(f => f.valence === 'positive');

  if (score >= 85) {
    const pos = positives.slice(0, 2).map(f => f.text).join(' and ');
    return `Your body is primed today — ${pos}. This is a great day to push intensity.`;
  }

  if (score >= 70) {
    if (negatives.length === 0) {
      return `All markers are in a good range. A normal training session is appropriate.`;
    }
    const neg = negatives[0].text;
    return `Most markers look good, but ${neg} is nudging your score down. Train normally and monitor how you feel.`;
  }

  if (score >= 55) {
    const negs = negatives.slice(0, 2).map(f => f.text).join(' and ');
    return `Your score dropped due to ${negs}. Reduce intensity by 15–20% and avoid max-effort sets today.`;
  }

  // Low score
  const negs = negatives.map(f => f.text).join(', ');
  return `Recovery is incomplete — ${negs}. A full training session would increase injury risk. Stick to active recovery work.`;
}

// ── Recommendation ──

function getRecommendation(score, factors) {
  if (score >= 80) {
    return {
      recommendation: 'Full session. Target intensity is on point.',
      intensity_mod: 1.0,
    };
  }
  if (score >= 65) {
    return {
      recommendation: 'Normal session. Listen to your body and back off if you feel worse than expected.',
      intensity_mod: 0.9,
    };
  }
  if (score >= 50) {
    return {
      recommendation: 'Reduced load session. Drop working weights by 15–20% and skip max-effort sets.',
      intensity_mod: 0.75,
    };
  }
  return {
    recommendation: 'Active recovery only. Movement, stretching, and foam rolling — no heavy lifting.',
    intensity_mod: 0.5,
  };
}

// ── Recovery score (separate from readiness — focuses on bounce-back) ──
function computeRecoveryScore(wellness, prevWellness) {
  if (!prevWellness) return 70; // default if no history
  const sorenessImproved = prevWellness.soreness - wellness.soreness;
  const energyImproved   = wellness.energy - prevWellness.energy;
  const sleepOk          = wellness.sleep_hours >= 7.0;
  let score = 60;
  score += sorenessImproved * 5;
  score += energyImproved * 4;
  if (sleepOk) score += 10;
  return Math.min(100, Math.max(0, Math.round(score)));
}

// ── Fatigue score ──
function computeFatigueScore(wellness) {
  const { soreness, stress, energy, sleep_hours } = wellness;
  const fatigueRaw =
    (soreness / 10) * 35 +
    (stress / 10)   * 25 +
    ((10 - energy) / 10) * 25 +
    (Math.max(0, 8 - sleep_hours) / 8) * 15;
  return Math.min(100, Math.round(fatigueRaw));
}

/**
 * Generate a complete training session.
 * @param {object} athlete - profile with sport, development_stage, season_phase, etc.
 * @param {object} readiness - computed readiness object {score, intensity_mod}
 * @returns {object} session with sections: warmup, main, accessory, conditioning, cooldown
 */
function generateSession(athlete, readiness) {
  const pool   = SPORT_POOLS[athlete.sport] || SPORT_POOLS.default;
  const phase  = PHASE_RULES[athlete.season_phase] || PHASE_RULES.inseason;
  const stage  = STAGE_RULES[athlete.development_stage] || STAGE_RULES.performance;

  // Combined intensity modifier
  const intensityMod = phase.intensity_mod * stage.max_intensity * (readiness?.intensity_mod ?? 1.0);
  const volumeMod    = phase.volume_mod;

  const session = {
    title:       getSessionTitle(athlete, phase),
    phase_note:  phase.focus,
    stage_note:  stage.note,
    intensity_mod: intensityMod,
    sections: {
      warmup:      buildWarmup(pool, stage),
      main:        buildMain(pool, stage, phase, volumeMod, intensityMod),
      accessory:   buildAccessory(pool, stage, volumeMod),
      conditioning: buildConditioning(pool, phase, stage),
      cooldown:    buildCooldown(),
    },
  };

  return session;
}

// ── Section builders ──

function buildWarmup(pool, stage) {
  const ids = pool.warmup.slice(0, 4);
  return ids.map((id, i) => {
    const ex = getEx(id);
    return {
      ...ex,
      session_sets: 1,
      reps: '8-10',
      load: 'bodyweight',
      notes: i === 0 ? '5 min general movement prep' : null,
    };
  });
}

function buildMain(pool, stage, phase, volumeMod, intensityMod) {
  const useOly   = stage.allow_oly && phase !== PHASE_RULES.postseason;
  const usePower = stage.allow_power;

  const exercises = [];

  // Primary strength: 1 lower, 1 upper
  const lowerEx = getEx(pickRandom(pool.strength_lower));
  const upperEx = getEx(pickRandom(pool.strength_upper));

  const [setsLow, setsHigh] = stage.sets_range;
  const sets = Math.round(lerp(setsLow, setsHigh, volumeMod));
  const [repLow, repHigh]   = stage.rep_range;
  const reps = repLow === repHigh ? repLow : `${repLow}-${repHigh}`;

  exercises.push({
    ...lowerEx,
    session_sets: sets,
    reps,
    load: describeLoad(intensityMod),
    rpe: describeRPE(intensityMod),
    notes: `Primary lower — ${describeLoad(intensityMod)} effort`,
  });

  exercises.push({
    ...upperEx,
    session_sets: sets,
    reps,
    load: describeLoad(intensityMod),
    rpe: describeRPE(intensityMod),
    notes: `Primary upper — pair with lower if time allows`,
  });

  // Power exercise (if allowed)
  if (usePower && pool.power_pool.length > 0) {
    const powerEx = getEx(pickRandom(pool.power_pool));
    exercises.push({
      ...powerEx,
      session_sets: Math.max(3, sets - 1),
      reps: stage.allow_oly ? '3-5' : '4-6',
      load: 'moderate — focus on speed of movement',
      rpe: '7-8',
      notes: 'Do before main lifts when fresh, or after warm-up.',
    });
  }

  return exercises;
}

function buildAccessory(pool, stage, volumeMod) {
  const count = volumeMod >= 1.0 ? 3 : 2;
  const selected = shuffle(pool.accessory).slice(0, count);
  return selected.map(id => {
    const ex = getEx(id);
    return {
      ...ex,
      session_sets: 2,
      reps: '10-15',
      load: 'light-moderate',
      rpe: '6-7',
      notes: 'Controlled tempo, no failure',
    };
  });
}

function buildConditioning(pool, phase, stage) {
  if (phase.conditioning_load === 'minimal') return [];
  if (stage.development_stage === 'foundation') return [];

  const count = phase.conditioning_load === 'high' ? 2 : 1;
  const selected = shuffle(pool.conditioning).slice(0, count);
  return selected.map((id, i) => {
    const ex = getEx(id);
    const scheme = getConditioningScheme(ex, phase.conditioning_load);
    return {
      ...ex,
      session_sets: scheme.sets,
      reps: scheme.work,
      load: scheme.rest,
      notes: scheme.note,
    };
  });
}

function buildCooldown() {
  return [
    { ...getEx('e081'), session_sets: 1, reps: '60s per side', load: 'gentle pressure', notes: 'Roll out areas of soreness' },
    { ...getEx('e085'), session_sets: 1, reps: '45s per side', load: 'passive stretch', notes: 'Breathe into the stretch' },
    { ...getEx('e080'), session_sets: 1, reps: '60s per side', load: 'passive stretch', notes: 'Work through internal/external rotation' },
  ];
}

// ── Helpers ──

function getEx(id) {
  return exercises.find(e => e.id === id) || exercises[0];
}

function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function lerp(a, b, t) { return a + (b - a) * Math.min(1, Math.max(0, t)); }

function describeLoad(intensityMod) {
  if (intensityMod >= 0.95) return '85-90% 1RM';
  if (intensityMod >= 0.85) return '75-85% 1RM';
  if (intensityMod >= 0.75) return '65-75% 1RM';
  return '50-65% 1RM';
}

function describeRPE(intensityMod) {
  if (intensityMod >= 0.95) return '8-9';
  if (intensityMod >= 0.85) return '7-8';
  if (intensityMod >= 0.75) return '6-7';
  return '5-6';
}

function getConditioningScheme(ex, load) {
  if (load === 'high') {
    return { sets: 6, work: '20s on', rest: 'Rest: 40s between', note: 'Max effort each interval' };
  }
  if (load === 'moderate') {
    return { sets: 4, work: '30s on', rest: 'Rest: 90s between', note: 'Sustainable hard pace' };
  }
  return { sets: 3, work: '4 min easy', rest: 'Rest: 2 min', note: 'Low intensity flush — keep HR < 140' };
}

function getSessionTitle(athlete, phase) {
  const phaseNames = {
    offseason:  'Off-Season Strength',
    preseason:  'Pre-Season Power',
    inseason:   'In-Season Maintenance',
    postseason: 'Post-Season Recovery',
  };
  return phaseNames[athlete.season_phase] || 'Training Session';
}


// js/engine/swapEngine.js
// Intelligent exercise swap — matches movement_pattern + equipment, respects restrictions

/**
 * Find valid swaps for an exercise.
 * @param {string} exerciseId - The exercise to swap out
 * @param {object} constraints - { equipment_available, injury_restrictions, difficulty, sport }
 * @returns {Array} up to 3 ranked swap candidates with reason text
 */
function findSwaps(exerciseId, constraints = {}) {
  const original = exercises.find(e => e.id === exerciseId);
  if (!original) return [];

  const {
    equipment_available = null,  // null = all available
    injury_restrictions = [],    // e.g. ['knees', 'shoulders']
    prefer_difficulty = null,    // 'easier' | 'same' | 'harder'
    sport = null,
  } = constraints;

  let candidates = exercises.filter(e => {
    if (e.id === exerciseId) return false;

    // Must match movement pattern
    if (e.movement_pattern !== original.movement_pattern) return false;

    // Equipment filter
    if (equipment_available && !equipment_available.includes(e.equipment) && e.equipment !== 'none') return false;

    // Injury restrictions
    if (injury_restrictions.length > 0) {
      const muscleStr = [e.primary_muscle, e.movement_pattern].join(' ').toLowerCase();
      for (const restriction of injury_restrictions) {
        if (isContraindicated(muscleStr, restriction)) return false;
      }
    }

    return true;
  });

  // Score candidates by fit
  candidates = candidates.map(e => ({
    ...e,
    score: scoreCandidate(e, original, { sport, prefer_difficulty }),
    reason: buildSwapReason(e, original, constraints),
  }));

  // Sort by score descending
  candidates.sort((a, b) => b.score - a.score);

  return candidates.slice(0, 3);
}

function scoreCandidate(candidate, original, { sport, prefer_difficulty }) {
  let score = 50;

  // Same category = big bonus
  if (candidate.category === original.category) score += 20;

  // Sport relevance
  if (sport && (candidate.sport_tags.includes(sport) || candidate.sport_tags.includes('all'))) score += 10;

  // Difficulty preference
  const diffOrder = { beginner: 1, intermediate: 2, advanced: 3 };
  const origDiff  = diffOrder[original.difficulty] || 2;
  const candDiff  = diffOrder[candidate.difficulty] || 2;
  if (prefer_difficulty === 'easier' && candDiff < origDiff) score += 15;
  else if (prefer_difficulty === 'harder' && candDiff > origDiff) score += 15;
  else if (!prefer_difficulty && candDiff === origDiff) score += 10;

  // Same primary muscle group = bonus
  if (candidate.primary_muscle === original.primary_muscle) score += 15;

  // Same equipment preferred (easier transition)
  if (candidate.equipment === original.equipment) score += 8;

  return score;
}

function buildSwapReason(candidate, original, { equipment_available, injury_restrictions }) {
  const reasons = [];

  if (candidate.equipment === 'none') reasons.push('no equipment needed');
  else if (candidate.equipment !== original.equipment) reasons.push(`uses ${candidate.equipment}`);

  if (candidate.difficulty !== original.difficulty) {
    const dirs = { beginner: 'easier', intermediate: 'moderate', advanced: 'harder' };
    reasons.push(dirs[candidate.difficulty] || candidate.difficulty);
  }

  if (candidate.primary_muscle === original.primary_muscle) reasons.push('same target muscle');

  if (injury_restrictions.length > 0) reasons.push('joint-friendly');

  if (reasons.length === 0) reasons.push('same movement pattern');

  return reasons.join(' · ');
}

function isContraindicated(muscleStr, restriction) {
  const map = {
    knees:     ['squat', 'lunge', 'quads'],
    shoulders: ['push', 'pull', 'chest', 'shoulders', 'rear_delt'],
    back:      ['hinge', 'posterior', 'back', 'hamstrings'],
    hips:      ['hinge', 'hip_flexors', 'hips'],
    ankles:    ['jump', 'sprint', 'agility'],
  };
  const targets = map[restriction.toLowerCase()] || [];
  return targets.some(t => muscleStr.includes(t));
}


// js/engine/scoringEngine.js
// PIQ Score = 30% readiness + 25% compliance + 20% performance + 15% recovery + 10% nutrition

/**
 * Compute today's PIQ score.
 * All inputs are 0-100 subscores.
 */
function computePIQScore({ readiness, compliance, performance, recovery, nutrition }) {
  const score = Math.round(
    (readiness   ?? 70) * 0.30 +
    (compliance  ?? 80) * 0.25 +
    (performance ?? 75) * 0.20 +
    (recovery    ?? 70) * 0.15 +
    (nutrition   ?? 70) * 0.10
  );
  return Math.min(100, Math.max(0, score));
}

/**
 * Compute ACWR (Acute:Chronic Workload Ratio).
 * Optimal: 0.8–1.3 | Risk: > 1.5 | Undertrained: < 0.8
 */
function computeACWR(acuteLoad, chronicLoad) {
  if (!chronicLoad || chronicLoad === 0) return 1.0;
  return Math.round((acuteLoad / chronicLoad) * 100) / 100;
}

/**
 * Compute compliance score from session completions.
 * @param {Array} sessions - last 7 sessions with {completed: boolean}
 */
function computeCompliance(sessions) {
  if (!sessions || sessions.length === 0) return 80; // default
  const completed = sessions.filter(s => s.completed).length;
  return Math.round((completed / sessions.length) * 100);
}

/**
 * Normalize a performance test result to 0-100 scale.
 * Uses percentile bands by sport + test type.
 */
function normalizePerformance(testName, value, sport = 'general') {
  // Simplified normalization — in production this would use sport-specific norms
  const norms = {
    'Vertical Jump':   { min: 16, max: 40, higherBetter: true },
    '40-Yard Dash':    { min: 4.3, max: 5.5, higherBetter: false },
    'Bench Press':     { min: 95, max: 315, higherBetter: true },
    'Squat 1RM':       { min: 135, max: 500, higherBetter: true },
  };

  const norm = norms[testName];
  if (!norm) return 70;

  const normalized = norm.higherBetter
    ? (value - norm.min) / (norm.max - norm.min)
    : (norm.max - value) / (norm.max - norm.min);

  return Math.min(100, Math.max(0, Math.round(normalized * 100)));
}

/**
 * Derive overall performance subscore from multiple test results.
 */
function computePerformanceScore(testResults) {
  if (!testResults || testResults.length === 0) return 75;
  const scores = testResults.map(r => normalizePerformance(r.test, r.value));
  return Math.round(scores.reduce((a, b) => a + b, 0) / scores.length);
}

function renderSparkline(history, todayScore) {
  const points = history.map((d, i) => ({ x: i, y: d.score }));
  const n = points.length;
  const w = 200, h = 60;
  const xScale = w / (n - 1);
  const minY = Math.min(...points.map(p => p.y)) - 5;
  const maxY = Math.max(...points.map(p => p.y)) + 5;
  const yScale = h / (maxY - minY);

  const pathD = points.map((p, i) => {
    const x = i * xScale;
    const y = h - (p.y - minY) * yScale;
    return `${i === 0 ? 'M' : 'L'} ${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');

  const lastX = (n - 1) * xScale;
  const lastY = h - (todayScore - minY) * yScale;

  return `
    <svg class="sparkline-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
      <defs>
        <linearGradient id="sparkGrad" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.3"/>
          <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="${pathD} L ${lastX},${h} L 0,${h} Z" fill="url(#sparkGrad)"/>
      <path d="${pathD}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${lastX}" cy="${lastY}" r="4" fill="var(--accent)"/>
    </svg>
  `;
}

function afterRenderDashboard() {
  // Animate PIQ number count-up
  const el = document.getElementById('piq-number');
  if (!el) return;
  const target = parseInt(el.dataset.target || el.textContent) || state.piqHistory[state.piqHistory.length - 1].score;
  // Read actual target from DOM
  const piqFill = document.getElementById('piq-fill-circle');
  if (!piqFill) return;
  const circumference = 2 * Math.PI * 68;
  const finalOffset = parseFloat(piqFill.style.strokeDashoffset || piqFill.getAttribute('stroke-dashoffset'));
  const finalScore  = Math.round((1 - finalOffset / circumference) * 100);

  el.textContent = '0';
  let current = 0;
  const step = Math.ceil(finalScore / 40);
  const timer = setInterval(() => {
    current = Math.min(current + step, finalScore);
    el.textContent = current;
    if (current >= finalScore) clearInterval(timer);
  }, 25);
}

  if (modal) modal.style.display = 'none';
}

function countExercises(session) {
  return Object.values(session.sections).reduce((sum, arr) => sum + (arr?.length || 0), 0);
}

function describeIntensityMod(mod) {
  if (mod >= 0.9) return 'Full intensity';
  if (mod >= 0.75) return 'Reduced ~15-20%';
  if (mod >= 0.6) return 'Significantly reduced';
  return 'Active recovery only';
}

function renderReadinessPreview(w) {
  const r = computeReadiness(w);
  const levels = { green: 'var(--green)', yellow: 'var(--yellow)', orange: 'var(--orange)', red: 'var(--red)' };
  const levelMap = { green: 'GO', yellow: 'MODERATE', orange: 'CAUTION', red: 'RECOVER' };
  const levelEmoji = { green: '⚡', yellow: '⚠️', orange: '🔶', red: '🛑' };

  const rl = r.score >= 80 ? 'green' : r.score >= 65 ? 'yellow' : r.score >= 50 ? 'orange' : 'red';

  return `
    <p class="section-label" style="margin-bottom:12px;">Live Readiness Preview</p>
    <div style="text-align:center;margin-bottom:16px;">
      <div style="font-family:var(--font-display);font-weight:900;font-size:64px;line-height:1;color:${levels[rl]};" id="preview-score">${r.score}</div>
      <div style="font-family:var(--font-display);font-weight:700;font-size:14px;letter-spacing:0.12em;text-transform:uppercase;color:${levels[rl]};margin-top:4px;">${levelEmoji[rl]} ${levelMap[rl]}</div>
    </div>
    <div style="font-size:13px;color:var(--text-secondary);line-height:1.5;margin-bottom:12px;" id="preview-why">${r.why}</div>
    <div style="background:var(--bg-elevated);border-radius:var(--radius-sm);padding:10px 12px;">
      <p style="font-size:12px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;">Recommendation</p>
      <p style="font-size:13px;color:var(--text-secondary);" id="preview-rec">${r.recommendation}</p>
    </div>
  `;
}

function afterRenderWellness() {
  const sliders = [
    { id: 'slider-sleep',    val: 'val-sleep',    key: 'sleep_hours', format: v => `${v}h`, why: getSleepWhy,    whyId: 'why-sleep' },
    { id: 'slider-soreness', val: 'val-soreness', key: 'soreness',    format: v => v,       why: getSorenessWhy, whyId: 'why-soreness' },
    { id: 'slider-stress',   val: 'val-stress',   key: 'stress',      format: v => v,       why: getStressWhy,  whyId: 'why-stress' },
    { id: 'slider-energy',   val: 'val-energy',   key: 'energy',      format: v => v,       why: null,          whyId: null },
    { id: 'slider-mood',     val: 'val-mood',     key: 'mood',        format: v => v,       why: null,          whyId: null },
  ];

  sliders.forEach(({ id, val, key, format, why, whyId }) => {
    const slider = document.getElementById(id);
    if (!slider) return;
    slider.addEventListener('input', () => {
      const value = parseFloat(slider.value);
      document.getElementById(val).textContent = format(value);
      state.wellness[key] = value;

      // Update why copy
      if (why && whyId) {
        const el = document.getElementById(whyId);
        if (el) el.textContent = why(value);
      }

      // Update live preview
      const preview = document.getElementById('readiness-preview');
      if (preview) preview.innerHTML = renderReadinessPreview(state.wellness);
    });
  });

  document.getElementById('save-wellness')?.addEventListener('click', () => {
    state.wellness.logged = true;
    const confirm = document.getElementById('save-confirm');
    if (confirm) {
      confirm.style.display = 'block';
      setTimeout(() => { confirm.style.display = 'none'; }, 3000);
    }
  });
}

function getSleepWhy(hours) {
  if (hours >= 8.5) return '💚 Excellent recovery sleep. Your CNS is well-rested.';
  if (hours >= 7.5) return '✅ Good sleep quality. Minor fatigue is unlikely.';
  if (hours >= 6.5) return '⚠️ Slightly under target. Expect a small readiness penalty.';
  if (hours >= 5.5) return '🔶 Sub-optimal sleep. Load will be reduced today.';
  return '🛑 Significant sleep deficit. Recovery session strongly recommended.';
}

function getSorenessWhy(soreness) {
  if (soreness <= 2) return '💚 Muscles feel fresh — ready for a high-intensity session.';
  if (soreness <= 4) return '✅ Normal DOMS. This is within the healthy training range.';
  if (soreness <= 6) return '⚠️ Elevated soreness. Reduce heavy loading and avoid failure sets.';
  if (soreness <= 8) return '🔶 High soreness — muscles need more recovery time. Active recovery only.';
  return '🛑 Severe soreness detected. No training recommended today.';
}

function getStressWhy(stress) {
  if (stress <= 2) return '💚 Low stress — your nervous system is ready to perform.';
  if (stress <= 4) return '✅ Manageable stress load. Normal training is fine.';
  if (stress <= 6) return '⚠️ Moderate stress will blunt training adaptations. Scale back if needed.';
  if (stress <= 8) return '🔶 High stress elevates cortisol, reducing recovery. Lighter session today.';
  return '🛑 Extreme stress load. Training under this state increases injury risk significantly.';
}

function renderAthleteRow(athlete) {
  const rl = getReadinessLevel(athlete.readiness);
  const scoreColor = {
    green: 'var(--green)', yellow: 'var(--yellow)',
    orange: 'var(--orange)', red: 'var(--red)'
  }[rl.level];

  const whyParts = [];
  if (athlete.wellness.sleep < 6.5) whyParts.push('poor sleep');
  if (athlete.wellness.soreness >= 7) whyParts.push('high soreness');
  if (athlete.wellness.stress >= 7) whyParts.push('high stress');
  if (athlete.wellness.energy <= 3) whyParts.push('low energy');
  const why = whyParts.length > 0 ? whyParts.join(', ') : 'all markers in range';

  return `
    <div class="athlete-row">
      <div class="av" style="background:${athlete.color};">${athlete.initials}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:14px;font-weight:600;color:var(--text-primary);">${athlete.name}</div>
        <div style="font-size:11px;color:var(--text-muted);">${athlete.position} · ${why}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="traffic-dot ${rl.level}"></div>
        <div class="ar-score" style="color:${scoreColor};">${athlete.readiness}</div>
      </div>
    </div>
  `;
}

function buildAlerts(athletes) {
  const alerts = [];
  athletes.filter(a => a.readiness < 50).forEach(a => {
    const reasons = [];
    if (a.wellness.sleep < 6) reasons.push('sleep under 6h');
    if (a.wellness.soreness >= 8) reasons.push('soreness 8+');
    if (a.wellness.stress >= 8) reasons.push('high stress');
    alerts.push(`<strong>${a.name}</strong> (${a.position}) — Readiness ${a.readiness}. ${reasons.join(', ')}. Recovery session only.`);
  });

  // ACWR alerts would go here too
  return alerts;
}

function getTeamRecommendation(avgReadiness, redCount, orangeCount) {
  if (avgReadiness >= 80 && redCount === 0) {
    return 'Team is primed. Full-intensity practice is appropriate. Push competitive scenarios.';
  }
  if (avgReadiness >= 70 && redCount <= 1) {
    return `Most athletes are ready. ${redCount > 0 ? 'Pull red-status players to recovery work.' : ''} Normal practice load is safe for the group.`;
  }
  if (avgReadiness >= 60) {
    return `${redCount + orangeCount} athletes are fatigued. Consider reducing contact/collision drills. Skill work and film over conditioning today.`;
  }
  return `Team fatigue is high — ${redCount} athletes at recovery status. Light skill session only. Pushing intensity today risks injury and worsens cumulative load.`;
}

function renderTeamWellnessAvg(athletes) {
  const n = athletes.length;
  const avg = {
    sleep:    athletes.reduce((s, a) => s + a.wellness.sleep, 0) / n,
    soreness: athletes.reduce((s, a) => s + a.wellness.soreness, 0) / n,
    stress:   athletes.reduce((s, a) => s + a.wellness.stress, 0) / n,
    energy:   athletes.reduce((s, a) => s + a.wellness.energy, 0) / n,
  };

  const items = [
    { label: 'Avg Sleep', value: `${avg.sleep.toFixed(1)}h`, bar: (avg.sleep / 10) * 100, color: 'blue' },
    { label: 'Avg Soreness', value: avg.soreness.toFixed(1), bar: (avg.soreness / 10) * 100, color: avg.soreness > 6 ? 'red' : avg.soreness > 4 ? 'orange' : 'accent' },
    { label: 'Avg Stress', value: avg.stress.toFixed(1), bar: (avg.stress / 10) * 100, color: avg.stress > 6 ? 'red' : avg.stress > 4 ? 'orange' : 'accent' },
    { label: 'Avg Energy', value: avg.energy.toFixed(1), bar: (avg.energy / 10) * 100, color: 'yellow' },
  ];

  return items.map(item => `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">
      <span style="font-size:11px;color:var(--text-muted);width:80px;flex-shrink:0;">${item.label}</span>
      <div style="flex:1;"><div class="progress-bar-wrap"><div class="progress-bar-fill ${item.color}" style="width:${item.bar}%"></div></div></div>
      <span style="font-family:var(--font-display);font-weight:700;font-size:14px;min-width:28px;text-align:right;">${item.value}</span>
    </div>
  `).join('');
}

        </div>

          <div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:2px;">Stress</div>
          <div style="font-family:var(--font-display);font-weight:700;font-size:16px;color:${athlete.wellness.stress > 6 ? 'var(--red)' : 'var(--text-primary)'};">${athlete.wellness.stress}<span style="font-size:11px;font-weight:400;color:var(--text-muted)">/10</span></div>

        </div>
      </div>
    </div>
  `;
}

function assignStage(athlete) {
  // Simple heuristic — in production this would come from athlete_profiles.development_stage
  if (athlete.wellness.energy >= 8 && athlete.readiness >= 85) return 'Elite';
  if (athlete.readiness >= 75) return 'Performance';
  return 'Development';
}

function renderPIQChart() {
  const history = state.piqHistory;
  const n = history.length;
  const w = 800, h = 160;
  const pad = { left: 30, right: 10, top: 10, bottom: 10 };
  const iw = w - pad.left - pad.right;
  const ih = h - pad.top - pad.bottom;
  const xStep = iw / (n - 1);
  const minY = 50, maxY = 100;

  const toX = i => pad.left + i * xStep;
  const toY = v => pad.top + ih - ((v - minY) / (maxY - minY)) * ih;

  const pathParts = history.map((d, i) => {
    const x = toX(i).toFixed(1);
    const y = toY(d.score).toFixed(1);
    return `${i === 0 ? 'M' : 'L'} ${x},${y}`;
  });

  const fillPath = [...pathParts, `L ${toX(n-1).toFixed(1)},${(pad.top + ih).toFixed(1)}`, `L ${pad.left.toFixed(1)},${(pad.top + ih).toFixed(1)}`, 'Z'].join(' ');
  const linePath = pathParts.join(' ');

  // Grid lines at 60, 70, 80, 90
  const gridLines = [60, 70, 80, 90].map(v => {
    const y = toY(v).toFixed(1);
    return `<line x1="${pad.left}" y1="${y}" x2="${w - pad.right}" y2="${y}" stroke="var(--border-subtle)" stroke-width="1"/>
            <text x="${(pad.left - 4).toFixed(0)}" y="${(parseFloat(y) + 4).toFixed(0)}" fill="var(--text-muted)" font-size="9" text-anchor="end" font-family="Barlow Condensed">${v}</text>`;
  }).join('');

  // Dot for today
  const lastX = toX(n-1).toFixed(1);
  const lastY = toY(history[n-1].score).toFixed(1);

  return `
    <svg width="100%" height="180" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="overflow:visible;">
      <defs>
        <linearGradient id="piqGrad" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.25"/>
          <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/>
        </linearGradient>
      </defs>
      ${gridLines}
      <path d="${fillPath}" fill="url(#piqGrad)"/>
      <path d="${linePath}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${lastX}" cy="${lastY}" r="5" fill="var(--accent)" filter="drop-shadow(0 0 6px rgba(0,229,160,0.6))"/>
      <text x="${lastX}" y="${(parseFloat(lastY) - 10).toFixed(0)}" fill="var(--accent)" font-size="11" text-anchor="middle" font-family="Barlow Condensed" font-weight="700">${history[n-1].score}</text>
    </svg>
  `;
}

function renderACWRZones(acwr) {
  const zones = [
    { label: 'Undertrained', range: '< 0.8', min: 0, max: 0.8, color: 'var(--blue)' },
    { label: 'Optimal', range: '0.8–1.3', min: 0.8, max: 1.3, color: 'var(--green)' },
    { label: 'High Risk', range: '1.3–1.5', min: 1.3, max: 1.5, color: 'var(--orange)' },
    { label: 'Danger', range: '> 1.5', min: 1.5, max: 2.0, color: 'var(--red)' },
  ];

  return zones.map(z => {
    const active = acwr >= z.min && acwr < z.max;
    return `
      <div style="display:flex;align-items:center;gap:8px;padding:4px 0;${active ? 'opacity:1' : 'opacity:0.4'}">
        <div style="width:8px;height:8px;border-radius:50%;background:${z.color};${active ? `box-shadow:0 0 6px ${z.color}` : ''}"></div>
        <span style="font-size:12px;${active ? 'color:var(--text-primary);font-weight:600' : 'color:var(--text-muted)'};">${z.label}</span>
        <span style="font-size:11px;color:var(--text-muted);margin-left:auto;">${z.range}</span>
      </div>
    `;
  }).join('');
}

function renderTestRow(r) {
  const pct = normalizePerformance(r.test, r.value);
  return `

}

// js/app.js — Application entry point and router

const views = {
  dashboard: { render: renderDashboard, after: afterRenderDashboard },
  train:     { render: renderTrain,     after: afterRenderTrain },
  wellness:  { render: renderWellness,  after: afterRenderWellness },
  team:      { render: renderTeam,      after: afterRenderTeam },
  athletes:  { render: renderAthletes,  after: afterRenderAthletes },
  analytics: { render: renderAnalytics, after: afterRenderAnalytics },
};

function navigateTo(viewName) {
  const v = views[viewName];
  if (!v) return;

  state.currentView = viewName;

  // Update nav active states
  document.querySelectorAll('.nav-item').forEach(item => {
    item.classList.toggle('active', item.dataset.view === viewName);
  });

  // Render view
  const container = document.getElementById('view-container');
  container.innerHTML = v.render();
  container.scrollTop = 0;
  window.scrollTo(0, 0);

  // Run after-render hooks (event bindings, animations)
  if (v.after) v.after();

  // Update topbar score
  updateTopbarScore();
}

function updateTopbarScore() {
  const el = document.getElementById('topbar-piq-score');
  if (!el) return;
  const readiness = computeReadiness(state.wellness);
  const recovery = Math.max(0, 100 - computeFatigueScore(state.wellness));
  const perf = computePerformanceScore(state.performanceResults);
  const piq = computePIQScore({ readiness: readiness.score, compliance: 85, performance: perf, recovery, nutrition: 70 });
  el.textContent = piq;
}

function initRoleSwitch() {
  document.querySelectorAll('.role-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const role = btn.dataset.role;
      state.role = role;
      document.body.setAttribute('data-role', role);
      document.querySelectorAll('.role-btn').forEach(b => b.classList.toggle('active', b.dataset.role === role));

      // If coach switches and is on a coach-only view, stay; if athlete switches away from coach view, redirect
      if (role === 'athlete' && (state.currentView === 'team' || state.currentView === 'athletes')) {
        navigateTo('dashboard');
      } else {
        navigateTo(state.currentView);
      }
    });
  });
}

function initNavigation() {
  // Nav link clicks
  document.addEventListener('click', (e) => {
    const navItem = e.target.closest('[data-view]');
    if (navItem) {
      e.preventDefault();
      const viewName = navItem.dataset.view;
      navigateTo(viewName);
      closeMobileNav();
    }
  });

  // Hash-based routing
  window.addEventListener('hashchange', () => {
    const hash = window.location.hash.slice(1);
    if (views[hash]) navigateTo(hash);
  });
}

function initMobileNav() {
  const toggle  = document.getElementById('menu-toggle');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('nav-overlay');

  toggle?.addEventListener('click', () => {
    sidebar.classList.toggle('open');
    overlay.classList.toggle('active');
  });

  overlay?.addEventListener('click', closeMobileNav);
}

function closeMobileNav() {
  document.getElementById('sidebar')?.classList.remove('open');
  document.getElementById('nav-overlay')?.classList.remove('active');
}

// ── Boot ──
function init() {
  initNavigation();
  initRoleSwitch();
  initMobileNav();

  // Pre-compute readiness
  state.readiness = computeReadiness(state.wellness);

  // Navigate to initial view
  const hash = window.location.hash.slice(1);
  navigateTo(views[hash] ? hash : 'dashboard');
}

document.addEventListener('DOMContentLoaded', init);

</script>
