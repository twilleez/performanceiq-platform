# PIQ Recovery - Add Files to performanceiq-platform
#
# HOW TO USE:
# 1. Save as .github/workflows/add-piq-recovery.yml
# 2. Commit and push to your main branch
# 3. Go to: Actions tab -> 'Add PIQ Recovery Files' -> Run workflow
# No extra secrets needed - uses built-in GITHUB_TOKEN.

name: Add PIQ Recovery Files

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Branch name for the PR'
        required: true
        default: 'feature/piq-recovery-phase-0-4'

jobs:
  add-recovery-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ github.event.inputs.branch_name }}"

      - name: Decode and write all 26 PIQ Recovery files
        run: |
          echo '' | base64 -d > /tmp/write_piq.py
          python3 /tmp/write_piq.py

      - name: Commit and push branch
        run: |
          git add -A
          git status --short
          git commit -m "feat: Add PIQ Recovery Phase 0-4 (26 files)"
          git push origin "${{ github.event.inputs.branch_name }}"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_BODY=$(echo '' | base64 -d)
          gh pr create \
            --title "feat: PIQ Recovery Phase 0-4 (26 files)" \
            --head "${{ github.event.inputs.branch_name }}" \
            --base "main" \
            --body "$PR_BODY"
          echo "Pull Request created successfully."
