# PIQ Recovery Phase 1 - Complete (40 files)
# Save as .github/workflows/add-piq-recovery.yml
# Actions -> Add PIQ Recovery Files -> Run workflow

name: Add PIQ Recovery Files

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Branch name for the PR'
        required: true
        default: 'feature/piq-phase-1-complete'

jobs:
  add-recovery-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ github.event.inputs.branch_name }}"

      - name: Write all 40 PIQ Phase 1 files
        run: |
          echo '' | base64 -d > /tmp/write_piq.py
          python3 /tmp/write_piq.py

      - name: Commit and push
        run: |
          git add -A
          git status --short
          git commit -m "feat: PIQ Recovery Phase 1 complete (40 files)"
          git push origin "${{ github.event.inputs.branch_name }}"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_BODY=$(echo '' | base64 -d)
          gh pr create \
            --title "feat: PIQ Recovery Phase 1 complete (40 files)" \
            --head "${{ github.event.inputs.branch_name }}" \
            --base "main" \
            --body "$PR_BODY"
          echo "Pull Request created."
