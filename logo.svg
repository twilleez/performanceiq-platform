<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 56" fill="none">
  <!-- Logo mark: Minimal Motion Arc on navy pill -->
  <rect width="56" height="56" rx="14" fill="#0d1b3e"/>

  <!-- Outer track ring -->
  <circle cx="28" cy="28" r="18" stroke="rgba(57,230,107,0.15)" stroke-width="3" fill="none"/>

  <!-- Motion arc — primary green -->
  <circle cx="28" cy="28" r="18"
    stroke="#39e66b" stroke-width="3" fill="none"
    stroke-dasharray="70 43"
    stroke-dashoffset="0"
    stroke-linecap="round"
    transform="rotate(-90 28 28)"/>

  <!-- Inner speed lines — velocity accent -->
  <line x1="18" y1="28" x2="25" y2="28" stroke="#39e66b" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="20" y1="23" x2="25" y2="28" stroke="#39e66b" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="20" y1="33" x2="25" y2="28" stroke="#39e66b" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <!-- Arrow tip -->
  <circle cx="30" cy="28" r="2.5" fill="#39e66b"/>

  <!-- Wordmark -->
  <text x="68" y="22" font-family="Oswald, sans-serif" font-weight="700" font-size="20" letter-spacing="3" fill="white" text-rendering="optimizeLegibility">PERFORMANCE</text>
  <text x="68" y="42" font-family="Barlow Condensed, sans-serif" font-weight="700" font-size="14" letter-spacing="8" fill="#39e66b" text-rendering="optimizeLegibility">IQ PLATFORM</text>
</svg>
