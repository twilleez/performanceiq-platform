<!-- PerformanceIQ Primary Logo — Minimal Elite Motion -->
<!-- Usage: splash, marketing, nav header. Min height: 40px. Clear space: height of "P" arc on all sides -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 80" fill="none" aria-label="PerformanceIQ">
  <defs>
    <linearGradient id="body-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d1b3e"/>
      <stop offset="60%" stop-color="#1f3370"/>
      <stop offset="100%" stop-color="#2a9df4"/>
    </linearGradient>
    <linearGradient id="tip-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#39e66b"/>
      <stop offset="100%" stop-color="#22c955"/>
    </linearGradient>
  </defs>

  <!-- Upper wing sweep -->
  <path d="M 10 52 Q 40 18 110 28 Q 155 33 195 14"
    stroke="url(#body-grad)" stroke-width="14"
    fill="none" stroke-linecap="round"/>

  <!-- Lower wing sweep (shadow/depth layer) -->
  <path d="M 10 58 Q 42 30 110 40 Q 152 45 192 28"
    stroke="#0d1b3e" stroke-width="6"
    fill="none" stroke-linecap="round" opacity="0.55"/>

  <!-- Arrow tip — electric green -->
  <polygon points="195,6 218,26 200,38" fill="url(#tip-grad)"/>
  <!-- Tip shadow for 3D depth -->
  <polygon points="205,30 218,26 200,38" fill="#0d1b3e" opacity="0.22"/>

  <!-- Wordmark: PERFORMANCE in white, IQ in green -->
  <text x="10" y="72"
    font-family="Oswald, sans-serif"
    font-weight="700"
    font-size="18"
    letter-spacing="2"
    fill="white">PERFORMANCE</text>
  <text x="181" y="72"
    font-family="Oswald, sans-serif"
    font-weight="800"
    font-size="18"
    letter-spacing="0.5"
    fill="#39e66b">IQ</text>
</svg>
