<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e5c158;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="emeraldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle (dark charcoal) -->
  <circle cx="100" cy="100" r="98" fill="#0a0e14" stroke="#d4af37" stroke-width="2"/>
  
  <!-- Main icon: Upward arrow (performance, growth) -->
  <g transform="translate(100, 100)">
    <!-- Arrow shaft -->
    <rect x="-8" y="-35" width="16" height="50" rx="4" fill="url(#goldGradient)" filter="url(#glow)"/>
    
    <!-- Arrow head (triangle) -->
    <polygon points="0,-45 -15,-20 15,-20" fill="url(#goldGradient)" filter="url(#glow)"/>
    
    <!-- Pulse rings (readiness indicator) -->
    <circle cx="0" cy="0" r="30" fill="none" stroke="url(#emeraldGradient)" stroke-width="2" opacity="0.6"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="url(#emeraldGradient)" stroke-width="1.5" opacity="0.3"/>
    
    <!-- Center dot (PIQ core) -->
    <circle cx="0" cy="0" r="4" fill="url(#goldGradient)"/>
  </g>
  
  <!-- Text: "Performance IQ" -->
  <text x="100" y="165" font-family="Inter, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#d4af37" letter-spacing="1">
    PERFORMANCE IQ
  </text>
  
  <!-- Tagline: "ELITE TRAINING" -->
  <text x="100" y="182" font-family="Inter, sans-serif" font-size="9" font-weight="600" text-anchor="middle" fill="#10b981" letter-spacing="2" opacity="0.8">
    ELITE TRAINING
  </text>
</svg>
